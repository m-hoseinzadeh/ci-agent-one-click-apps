slug = "lago"
name = "Lago"
category = "App"
description = "Open source billing API for product-led SaaS"
keywords = ["lago"]
http_port = 80
compose = '''
services:
  lago:
    image: getlago/front:{{LAGO_VERSION}}
    environment:
      API_URL: '{{LAGO_API_URL}}'
      APP_ENV: '{{LAGO_ENVIRONMENT}}'
      CODEGEN_API: '{{LAGO_API_URL}}'
      LAGO_DISABLE_SIGNUP: '{{LAGO_DISABLE_SIGNUP}}'
    depends_on:
    - lago-api
    ports:
    - '{{HTTP_PORT}}:80'
  lago-migrate:
    image: getlago/api:{{LAGO_VERSION}}
    command: ./scripts/migrate.sh
    restart: "no"
    environment:
      DATABASE_URL: postgresql://{{POSTGRES_USER}}:{{POSTGRES_PASSWORD}}@lago-db/{{POSTGRES_DB}}
      RAILS_ENV: '{{LAGO_ENVIRONMENT}}'
      SECRET_KEY_BASE: '{{LAGO_API_SECRET_KEY_BASE}}'
      ENCRYPTION_PRIMARY_KEY: '{{LAGO_API_ENCRYPTION_PRIMARY_KEY}}'
      ENCRYPTION_DETERMINISTIC_KEY: '{{LAGO_API_ENCRYPTION_DETERMINISTIC_KEY}}'
      ENCRYPTION_KEY_DERIVATION_SALT: '{{LAGO_API_ENCRYPTION_KEY_DERIVATION_SALT}}'
    depends_on:
    - lago-db
  lago-api:
    image: getlago/api:{{LAGO_VERSION}}
    command: ./scripts/start.api.sh
    environment:
      LAGO_API_URL: '{{LAGO_API_URL}}'
      DATABASE_URL: postgresql://{{POSTGRES_USER}}:{{POSTGRES_PASSWORD}}@lago-db/{{POSTGRES_DB}}
      REDIS_URL: redis://lago-cache:6379
      SECRET_KEY_BASE: '{{LAGO_API_SECRET_KEY_BASE}}'
      RAILS_ENV: '{{LAGO_ENVIRONMENT}}'
      RAILS_LOG_TO_STDOUT: '{{LAGO_API_LOG_TO_STDOUT}}'
      SENTRY_DSN: '{{LAGO_API_SENTRY_DSN}}'
      LAGO_FRONT_URL: '{{LAGO_FRONT_URL}}'
      RSA_PRIVATE_KEY: '{{LAGO_API_RSA_PRIVATE_KEY}}'
      LAGO_RSA_PRIVATE_KEY: '{{LAGO_API_RSA_PRIVATE_KEY}}'
      LAGO_SIDEKIQ_WEB: '{{LAGO_API_SIDEKIQ_WEB}}'
      ENCRYPTION_PRIMARY_KEY: '{{LAGO_API_ENCRYPTION_PRIMARY_KEY}}'
      ENCRYPTION_DETERMINISTIC_KEY: '{{LAGO_API_ENCRYPTION_DETERMINISTIC_KEY}}'
      ENCRYPTION_KEY_DERIVATION_SALT: '{{LAGO_API_ENCRYPTION_KEY_DERIVATION_SALT}}'
      LAGO_USE_AWS_S3: '{{LAGO_API_USE_AWS_S3}}'
      LAGO_AWS_S3_ACCESS_KEY_ID: '{{LAGO_API_AWS_S3_ACCESS_KEY_ID}}'
      LAGO_AWS_S3_SECRET_ACCESS_KEY: '{{LAGO_API_AWS_S3_SECRET_ACCESS_KEY}}'
      LAGO_AWS_S3_REGION: '{{LAGO_API_AWS_S3_REGION}}'
      LAGO_AWS_S3_BUCKET: '{{LAGO_API_AWS_S3_BUCKET}}'
      LAGO_AWS_S3_ENDPOINT: '{{LAGO_API_AWS_S3_ENDPOINT}}'
      LAGO_PDF_URL: http://lago-pdf:3000
      LAGO_REDIS_CACHE_URL: redis://lago-cache:6379
      LAGO_DISABLE_SEGMENT: '{{LAGO_API_DISABLE_SEGMENT}}'
    volumes:
    - lago-api-storage-data:/app/storage
    depends_on:
    - lago-db
    - lago-cache
    - lago-migrate
  lago-api-worker:
    image: getlago/api:{{LAGO_VERSION}}
    command: ./scripts/start.worker.sh
    environment:
      LAGO_API_URL: '{{LAGO_API_URL}}'
      DATABASE_URL: postgresql://{{POSTGRES_USER}}:{{POSTGRES_PASSWORD}}@lago-db/{{POSTGRES_DB}}
      REDIS_URL: redis://lago-cache:6379
      SECRET_KEY_BASE: '{{LAGO_API_SECRET_KEY_BASE}}'
      RAILS_ENV: '{{LAGO_ENVIRONMENT}}'
      RAILS_LOG_TO_STDOUT: '{{LAGO_API_LOG_TO_STDOUT}}'
      SENTRY_DSN: '{{LAGO_API_SENTRY_DSN}}'
      LAGO_RSA_PRIVATE_KEY: '{{LAGO_API_RSA_PRIVATE_KEY}}'
      RSA_PRIVATE_KEY: '{{LAGO_API_RSA_PRIVATE_KEY}}'
      ENCRYPTION_PRIMARY_KEY: '{{LAGO_API_ENCRYPTION_PRIMARY_KEY}}'
      ENCRYPTION_DETERMINISTIC_KEY: '{{LAGO_API_ENCRYPTION_DETERMINISTIC_KEY}}'
      ENCRYPTION_KEY_DERIVATION_SALT: '{{LAGO_API_ENCRYPTION_KEY_DERIVATION_SALT}}'
      LAGO_USE_AWS_S3: '{{LAGO_API_USE_AWS_S3}}'
      LAGO_AWS_S3_ACCESS_KEY_ID: '{{LAGO_API_AWS_S3_ACCESS_KEY_ID}}'
      LAGO_AWS_S3_SECRET_ACCESS_KEY: '{{LAGO_API_AWS_S3_SECRET_ACCESS_KEY}}'
      LAGO_AWS_S3_REGION: '{{LAGO_API_AWS_S3_REGION}}'
      LAGO_AWS_S3_BUCKET: '{{LAGO_API_AWS_S3_BUCKET}}'
      LAGO_AWS_S3_ENDPOINT: '{{LAGO_API_AWS_S3_ENDPOINT}}'
      LAGO_PDF_URL: http://lago-pdf:3000
      LAGO_REDIS_CACHE_URL: redis://lago-cache:6379
      LAGO_DISABLE_SEGMENT: '{{LAGO_API_DISABLE_SEGMENT}}'
    volumes:
    - lago-api-storage-data:/app/storage
    depends_on:
    - lago-api
  lago-api-clock:
    image: getlago/api:{{LAGO_VERSION}}
    command: ./scripts/start.clock.sh
    environment:
      LAGO_API_URL: '{{LAGO_API_URL}}'
      DATABASE_URL: postgresql://{{POSTGRES_USER}}:{{POSTGRES_PASSWORD}}@lago-db/{{POSTGRES_DB}}
      REDIS_URL: redis://lago-cache:6379
      SECRET_KEY_BASE: '{{LAGO_API_SECRET_KEY_BASE}}'
      RAILS_ENV: '{{LAGO_ENVIRONMENT}}'
      RAILS_LOG_TO_STDOUT: '{{LAGO_API_LOG_TO_STDOUT}}'
      SENTRY_DSN: '{{LAGO_API_SENTRY_DSN}}'
      LAGO_RSA_PRIVATE_KEY: '{{LAGO_API_RSA_PRIVATE_KEY}}'
      RSA_PRIVATE_KEY: '{{LAGO_API_RSA_PRIVATE_KEY}}'
      ENCRYPTION_PRIMARY_KEY: '{{LAGO_API_ENCRYPTION_PRIMARY_KEY}}'
      ENCRYPTION_DETERMINISTIC_KEY: '{{LAGO_API_ENCRYPTION_DETERMINISTIC_KEY}}'
      ENCRYPTION_KEY_DERIVATION_SALT: '{{LAGO_API_ENCRYPTION_KEY_DERIVATION_SALT}}'
    depends_on:
    - lago-api
  lago-pdf:
    image: getlago/lago-gotenberg:{{GOTENBERG_VERSION}}
  lago-db:
    image: getlago/postgres-partman:{{POSTGRES_VERSION}}
    environment:
      POSTGRES_DB: '{{POSTGRES_DB}}'
      POSTGRES_USER: '{{POSTGRES_USER}}'
      POSTGRES_PASSWORD: '{{POSTGRES_PASSWORD}}'
      PGDATA: '{{POSTGRES_PGDATA}}'
    volumes:
    - lago-db-data:/data/postgres
  lago-cache:
    image: redis:{{REDIS_VERSION}}
    volumes:
    - lago-cache-data:/data
volumes:
  lago-api-storage-data:
  lago-db-data:
  lago-cache-data:
'''

[[variables]]
key = "GOTENBERG_VERSION"
label = "General | Gotenberg Version"
default = "7.8.2"
description = "Check out their valid tags at https://hub.docker.com/r/getlago/lago-gotenberg/tags"

[[variables]]
key = "LAGO_API_AWS_S3_ACCESS_KEY_ID"
label = "API | AWS S3 Access Key ID"
default = ""
description = "AWS access key ID that has access to S3. Leave blank unless using S3 file storage."

[[variables]]
key = "LAGO_API_AWS_S3_BUCKET"
label = "API | AWS S3 Bucket"
default = ""
description = "AWS S3 bucket name. Leave blank unless using S3 file storage."

[[variables]]
key = "LAGO_API_AWS_S3_ENDPOINT"
label = "API | AWS S3 Endpoint"
default = ""
description = "S3 compatible storage endpoint. Set only if using another provider than AWS S3."

[[variables]]
key = "LAGO_API_AWS_S3_REGION"
label = "API | AWS S3 Region"
default = ""
description = "AWS S3 region (e.g. `us-east-1`). Leave blank unless using S3 file storage."

[[variables]]
key = "LAGO_API_AWS_S3_SECRET_ACCESS_KEY"
label = "API | AWS S3 Secret Access Key"
default = ""
description = "AWS secret access key that has access to S3. Leave blank unless using S3 file storage."

[[variables]]
key = "LAGO_API_DISABLE_SEGMENT"
label = "API | Disable Tracking"
default = "true"
description = "Whether to opt-out of analytics."

[[variables]]
key = "LAGO_API_ENCRYPTION_DETERMINISTIC_KEY"
label = "API | Encryption Deterministic Key"
generate = true
description = "Encryption deterministic key used to secure sensitive values stored in the database."

[[variables]]
key = "LAGO_API_ENCRYPTION_KEY_DERIVATION_SALT"
label = "API | Encryption Key Derivation Salt"
generate = true
description = "Encryption key salt used to secure sensitive values stored in the database."

[[variables]]
key = "LAGO_API_ENCRYPTION_PRIMARY_KEY"
label = "API | Encryption Primary Key"
generate = true
description = "Encryption primary key used to secure sensitive values stored in the database."

[[variables]]
key = "LAGO_API_LOG_TO_STDOUT"
label = "API | Output Log"
default = "true"
description = "Whether to log output to `stdout`. Should be left untouched."

[[variables]]
key = "LAGO_API_RSA_PRIVATE_KEY"
label = "API | RSA Private Key"
generate = true
description = "Base64-encoded RSA private key used for webhook signatures. Generate one with `openssl genrsa 2048 | base64`."

[[variables]]
key = "LAGO_API_SECRET_KEY_BASE"
label = "API | Secret Key"
generate = true
description = "Secret key used for session encryption."

[[variables]]
key = "LAGO_API_SENTRY_DSN"
label = "API | Sentry DSN"
default = ""
description = "Sentry DSN key for error and performance tracking. Leave blank to disable."

[[variables]]
key = "LAGO_API_SIDEKIQ_WEB"
label = "API | Sidekiq Web"
default = "false"
description = "Activate the Sidekiq web UI, disabled by default."

[[variables]]
key = "LAGO_API_URL"
label = "API | Public URL"
default = ""
description = "Public URL the browser uses to reach the Lago API (e.g. https://lago-api.example.com). Set after assigning a domain to this project."

[[variables]]
key = "LAGO_API_USE_AWS_S3"
label = "API | Use AWS S3"
default = "false"
description = "Whether to use AWS S3 for file storage."

[[variables]]
key = "LAGO_DISABLE_SIGNUP"
label = "Application | Disable Sign-Up"
default = "false"
description = "Whether to disable registration."

[[variables]]
key = "LAGO_ENVIRONMENT"
label = "General | Environment"
default = "production"
description = "Environment of the application. Should be left untouched."

[[variables]]
key = "LAGO_FRONT_URL"
label = "Application | Public Front URL"
default = ""
description = "Public URL of the Lago web front-end (e.g. https://lago.example.com). Set after assigning a domain to this project."

[[variables]]
key = "LAGO_VERSION"
label = "General | Lago Version"
default = "v1.48.1"
description = "Check out their valid tags at https://hub.docker.com/r/getlago/api/tags"

[[variables]]
key = "POSTGRES_DB"
label = "Database | Name"
default = "lago"
description = "Name of the PostgreSQL database."

[[variables]]
key = "POSTGRES_PASSWORD"
label = "Database | User Password"
generate = true
description = "Password of the PostgreSQL user."

[[variables]]
key = "POSTGRES_PGDATA"
label = "Database | Data Directory"
default = "/data/postgres"
description = "Path to the data directory within PostgreSQL."

[[variables]]
key = "POSTGRES_USER"
label = "Database | User Name"
default = "lago"
description = "Name of the PostgreSQL user."

[[variables]]
key = "POSTGRES_VERSION"
label = "General | PostgreSQL Version"
default = "15.0-alpine"
description = "Tag for the getlago/postgres-partman image (Lago requires the pg_partman extension)."

[[variables]]
key = "REDIS_VERSION"
label = "General | Redis Version"
default = "7-alpine"
description = "Check out their valid tags at https://hub.docker.com/_/redis/tags"
