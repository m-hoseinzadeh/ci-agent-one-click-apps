slug = "plex-arm"
name = "Plex Media Server (ARM)"
category = "App"
description = "Plex organizes video, music and photos from personal media libraries and streams them to smart TVs, streaming boxes and mobile devices."
keywords = ["(arm)", "arm", "media", "plex", "server"]
http_port = 32400
compose = '''
services:
  plex-arm:
    image: linuxserver/plex:{{PLEX_VERSION}}
    environment:
      TZ: '{{TZ}}'
      PLEX_CLAIM: '{{PLEX_TOKEN}}'
      ADVERTISE_IP: '{{APP_URL}}'
    ports:
    - '{{HTTP_PORT}}:32400'
    volumes:
    - plex-arm-config:/config
    - plex-arm-transcode:/transcode
    - plex-arm-movies:/movies
    - plex-arm-tv:/tv
volumes:
  plex-arm-config:
  plex-arm-transcode:
  plex-arm-movies:
  plex-arm-tv:
'''

[[variables]]
key = "PLEX_TOKEN"
label = "Plex Claim Token"
default = ""
description = "Claim token to bind this server to your Plex account. Obtain it from https://www.plex.tv/claim and paste it within 4 minutes. Leave blank to claim later from the web UI."

[[variables]]
key = "PLEX_VERSION"
label = "Plex Version"
default = "latest"
description = "Image tag for linuxserver/plex. Check the valid tags at https://hub.docker.com/r/linuxserver/plex/tags"

[[variables]]
key = "APP_URL"
label = "Advertised URL"
default = ""
description = "Optional public URL Plex advertises to clients (e.g. http://your-domain/). Set after the project domain is assigned, or leave blank."

[[variables]]
key = "TZ"
label = "Time Zone"
default = "Europe/Copenhagen"
description = "Get yours from https://en.wikipedia.org/wiki/List_of_tz_database_time_zones"
