slug = "formio"
name = "Formio"
category = "App"
description = "form.io is a combined Form and Data Management platform for form-based Progressive web applications."
keywords = ["formio"]
http_port = 3001
compose = '''
services:
  formio-mongodb:
    # Taken from https://hub.docker.com/_/mongo
    image: mongo:{{MONGO_VERSION}}
    volumes:
    - formio-db-data:/data/db
  formio:
    # Taken from https://hub.docker.com/r/calipseo/formio
    depends_on:
    - formio-mongodb
    image: calipseo/formio:{{FORMIO_VERSION}}
    volumes:
    - formio-data:/app
    environment:
      APP_URL: '{{APP_URL}}'
      API_URL: '{{APP_URL}}'
      MONGO: mongodb://formio-mongodb:27017/formio
      ROOT_EMAIL: '{{ADMIN_EMAIL}}'
      ROOT_PASSWORD: '{{ADMIN_PASS}}'
      SMTP_HOST: '{{SMTP_HOST}}'
      SMTP_PORT: '{{SMTP_PORT}}'
      SMTP_USERNAME: '{{SMTP_USER}}'
      SMTP_PASSWORD: '{{SMTP_PASS}}'
    ports:
    - '{{HTTP_PORT}}:3001'
volumes:
  formio-db-data:
  formio-data:
'''

[[variables]]
key = "APP_URL"
label = "Public URL"
default = ""
description = "Public base URL used by Formio to build API and app URLs (e.g. https://formio.example.com). Leave blank to set after the project gets its domain."

[[variables]]
key = "ADMIN_EMAIL"
label = "Formio default admin email"
default = "admin@example.com"
description = "Admin email for Formio (set on first startup only)."

[[variables]]
key = "ADMIN_PASS"
label = "Admin password"
generate = true
description = "Password for the default admin user (set on first startup only)."

[[variables]]
key = "FORMIO_VERSION"
label = "Formio Version"
default = "1.90.7"
description = "https://hub.docker.com/r/calipseo/formio/tags"

[[variables]]
key = "MONGO_VERSION"
label = "Mongo (database) version"
default = "4.1"
description = "Check out their Docker page for the valid tags https://hub.docker.com/_/mongo?tab=tags"

[[variables]]
key = "SMTP_HOST"
label = "SMTP host"
default = ""
description = "The host for your SMTP server. Leave blank to disable outbound email."

[[variables]]
key = "SMTP_PORT"
label = "SMTP port"
default = ""
description = "The port for your SMTP server. Leave blank to disable outbound email."

[[variables]]
key = "SMTP_USER"
label = "SMTP user"
default = ""
description = "The username for your SMTP server. Leave blank if not using SMTP."

[[variables]]
key = "SMTP_PASS"
label = "SMTP password"
default = ""
description = "The password for your SMTP server. Leave blank if not using SMTP."
