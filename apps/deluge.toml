slug = "deluge"
name = "Deluge"
category = "App"
description = "A lightweight, Free Software, cross-platform BitTorrent client with Full Encryption, WebUI, Plugin System, etc."
keywords = ["deluge"]
http_port = 8112
compose = '''
services:
  deluge:
    image: linuxserver/deluge:{{VERSION}}
    environment:
      TZ: '{{TZ}}'
      PUID: '{{PUID}}'
      PGID: '{{PGID}}'
    volumes:
    - deluge-config:/config
    - deluge-downloads:/downloads
    - deluge-watch:/watch
    ports:
    - '{{HTTP_PORT}}:8112'
volumes:
  deluge-config:
  deluge-downloads:
  deluge-watch:
'''

[[variables]]
key = "PGID"
label = "PGID"
default = "1000"
description = "Group ID"

[[variables]]
key = "PUID"
label = "PUID"
default = "1000"
description = "User ID"

[[variables]]
key = "TZ"
label = "Time Zone"
default = "Europe/Paris"
description = "Get yours from https://en.wikipedia.org/wiki/List_of_tz_database_time_zones"

[[variables]]
key = "VERSION"
label = "Deluge Version"
default = "2.1.1"
description = "Check out their Docker page for the valid tags https://hub.docker.com/r/linuxserver/deluge/tags"
