slug = "ghost"
name = "Ghost"
category = "CMS"
description = "Ghost is a free and open source blogging platform written in JavaScript and distributed under the MIT License"
keywords = ["ghost"]
compose = '''
services:
  ghost:
    environment:
      NODE_ENV: production
      url: https://{{GHOST_HOST}}
      database__client: mysql
      database__connection__host: ghost-db
      database__connection__user: ghost
      database__connection__password: '{{DB_PASSWORD}}'
      database__connection__database: ghost
      mail__transport: SMTP
      mail__options__host: '{{SMTP_HOST}}'
      mail__options__port: '{{SMTP_PORT}}'
      mail__options__secure: '{{SMTP_SECURE}}'
      mail__options__auth__user: '{{SMTP_USER}}'
      mail__options__auth__pass: '{{SMTP_PASSWORD}}'
      mail__from: '{{SMTP_FROM}}'
    image: ghost:{{GHOST_VERSION}}
    restart: always
    volumes:
    - ghost-data:/var/lib/ghost/content
    depends_on:
    - ghost-db
    ports:
    - '{{HTTP_PORT}}:2368'
  ghost-db:
    environment:
      MYSQL_ROOT_PASSWORD: '{{DB_ROOT_PASSWORD}}'
      MYSQL_USER: ghost
      MYSQL_PASSWORD: '{{DB_PASSWORD}}'
      MYSQL_DATABASE: ghost
    image: mysql:8.0
    restart: always
    volumes:
    - ghost-db-data:/var/lib/mysql
volumes:
  ghost-data:
  ghost-db-data:
'''

[[variables]]
key = "DB_PASSWORD"
label = "MySQL Ghost password"
generate = true
description = "Password for the Ghost database user"

[[variables]]
key = "DB_ROOT_PASSWORD"
label = "MySQL root password"
generate = true
description = "Root password for MySQL"

[[variables]]
key = "GHOST_HOST"
label = "Ghost Host"
default = "blog.example.com"
description = "Your custom domain (e.g. blog.example.com)"

[[variables]]
key = "GHOST_VERSION"
label = "Ghost Version"
default = "6.44.0-alpine"
description = "Check available tags at https://hub.docker.com/_/ghost/tags"

[[variables]]
key = "SMTP_FROM"
label = "SMTP from address"
default = "'Ghost' <support@example.com>"
description = "From address for emails"

[[variables]]
key = "SMTP_HOST"
label = "SMTP host"
default = "smtp.example.com"
description = "SMTP server host"

[[variables]]
key = "SMTP_PASSWORD"
label = "SMTP password"
description = "SMTP password"

[[variables]]
key = "SMTP_PORT"
label = "SMTP port"
default = "587"
description = "SMTP server port"

[[variables]]
key = "SMTP_SECURE"
label = "SMTP secure"
default = "false"
description = "Use TLS/SSL (true for port 465, false for port 587)"

[[variables]]
key = "SMTP_USER"
label = "SMTP user"
default = "support@example.com"
description = "SMTP username"
