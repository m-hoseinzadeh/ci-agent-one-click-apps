slug = "ollama"
name = "Ollama"
category = "AI"
description = "Run large language models locally. Ollama exposes an HTTP API (default port 11434) for pulling and running models like Llama, Mistral and Gemma; other projects can reach it over the shared network as `ollama`."
keywords = ["ollama", "llm", "ai", "inference"]
http_port = 11434
compose = '''
services:
  ollama:
    image: ollama/ollama:{{OLLAMA_VERSION}}
    environment:
      OLLAMA_KEEP_ALIVE: '{{OLLAMA_KEEP_ALIVE}}'
    volumes:
    - ollama-data:/root/.ollama
    ports:
    - '{{HTTP_PORT}}:11434'
volumes:
  ollama-data:
'''

[[variables]]
key = "OLLAMA_VERSION"
label = "Ollama Version Tag"
default = "0.30.10"
description = "Check out their Docker page for the valid tags https://hub.docker.com/r/ollama/ollama/tags. Use the `-rocm` tag for AMD GPUs."

[[variables]]
key = "OLLAMA_KEEP_ALIVE"
label = "Model keep-alive"
default = "5m"
description = "How long a model stays loaded in memory after its last request (e.g. 5m, 1h, or -1 to keep loaded indefinitely)."
