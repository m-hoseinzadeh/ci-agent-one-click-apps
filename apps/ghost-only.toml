slug = "ghost-only"
name = "Ghost - No Database"
category = "Database"
description = "Ghost is a free and open source blogging platform written in JavaScript and distributed under the MIT License. This variant expects an external MySQL/MariaDB database."
keywords = ["database", "ghost", "no", "only"]
compose = '''
services:
  ghost-only:
    environment:
      NODE_ENV: production
      url: https://{{GHOST_HOST}}
      database__client: mysql
      database__connection__host: '{{DB_HOST}}'
      database__connection__port: '{{DB_PORT}}'
      database__connection__user: '{{DB_USER}}'
      database__connection__password: '{{DB_PASSWORD}}'
      database__connection__database: '{{DB_NAME}}'
      mail__transport: SMTP
      mail__options__host: '{{SMTP_HOST}}'
      mail__options__port: '{{SMTP_PORT}}'
      mail__options__secure: '{{SMTP_SECURE}}'
      mail__options__auth__user: '{{SMTP_USER}}'
      mail__options__auth__pass: '{{SMTP_PASSWORD}}'
      mail__from: '{{SMTP_FROM}}'
    image: ghost:{{GHOST_VERSION}}
    restart: always
    volumes:
    - ghost-only-data:/var/lib/ghost/content
    ports:
    - '{{HTTP_PORT}}:2368'
volumes:
  ghost-only-data:
'''

[[variables]]
key = "DB_HOST"
label = "DB Host"
description = "Database host (e.g. srv-captain--your-db)"

[[variables]]
key = "DB_NAME"
label = "DB name"
default = "ghost"
description = "Database name"

[[variables]]
key = "DB_PASSWORD"
label = "DB password"
description = "Database password"

[[variables]]
key = "DB_PORT"
label = "DB port"
default = "3306"
description = "Database port"

[[variables]]
key = "DB_USER"
label = "DB user"
default = "ghost"
description = "Database user"

[[variables]]
key = "GHOST_HOST"
label = "Ghost Host"
default = "blog.example.com"
description = "Your custom domain (e.g. blog.example.com)"

[[variables]]
key = "GHOST_VERSION"
label = "Ghost Version"
default = "6.44.0-alpine"
description = "Check available tags at https://hub.docker.com/_/ghost/tags"

[[variables]]
key = "SMTP_FROM"
label = "SMTP from address"
default = "'Ghost' <support@example.com>"
description = "SMTP from address for emails"

[[variables]]
key = "SMTP_HOST"
label = "SMTP host"
default = "smtp.example.com"
description = "SMTP server host"

[[variables]]
key = "SMTP_PASSWORD"
label = "SMTP password"
description = "SMTP password"

[[variables]]
key = "SMTP_PORT"
label = "SMTP port"
default = "587"
description = "SMTP server port"

[[variables]]
key = "SMTP_SECURE"
label = "SMTP secure"
default = "false"
description = "Use TLS/SSL (true for port 465, false for port 587)"

[[variables]]
key = "SMTP_USER"
label = "SMTP user"
default = "support@example.com"
description = "SMTP username"
