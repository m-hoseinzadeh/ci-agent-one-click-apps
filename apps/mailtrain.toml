slug = "mailtrain"
name = "Mailtrain V2(Beta)"
category = "Marketing"
description = "Mailtrain is a self hosted newsletter application built on Node.js (v10+) and MySQL (v8+) or MariaDB (v10+)."
keywords = ["mailtrain", "newsletter", "email"]
http_port = 3000
compose = '''
services:
  mailtrain-db:
    image: mariadb:{{MARIADB_VERSION}}
    volumes:
    - mailtrain-db-data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: '{{MARIADB_ROOT_PASSWORD}}'
      MYSQL_DATABASE: mailtrain
      MYSQL_USER: mailtrain
      MYSQL_PASSWORD: '{{MARIADB_PASSWORD}}'
  mailtrain-redis:
    image: redis:{{REDIS_VERSION}}
    volumes:
    - mailtrain-redis-data:/data
  mailtrain-mongo:
    image: mongo:{{MONGO_VERSION}}
    volumes:
    - mailtrain-mongo-data:/data/db
  mailtrain:
    image: mailtrain/mailtrain:{{MAILTRAIN_VERSION}}
    depends_on:
    - mailtrain-db
    - mailtrain-redis
    - mailtrain-mongo
    volumes:
    - mailtrain-files:/app/server/files
    environment:
      URL_BASE_TRUSTED: '{{URL_BASE_TRUSTED}}'
      URL_BASE_SANDBOX: '{{URL_BASE_SANDBOX}}'
      URL_BASE_PUBLIC: '{{URL_BASE_PUBLIC}}'
      WWW_PROXY: 'true'
      MONGO_HOST: mailtrain-mongo
      REDIS_HOST: mailtrain-redis
      MYSQL_HOST: mailtrain-db
      MYSQL_DATABASE: mailtrain
      MYSQL_USER: mailtrain
      MYSQL_PASSWORD: '{{MARIADB_PASSWORD}}'
    ports:
    - '{{HTTP_PORT}}:3000'
volumes:
  mailtrain-db-data:
  mailtrain-redis-data:
  mailtrain-mongo-data:
  mailtrain-files:
'''

[[variables]]
key = "URL_BASE_TRUSTED"
label = "Trusted URL base"
default = "http://localhost:3000"
description = "External URL of the main UI (trusted) endpoint. Set to your project domain after creation, e.g. https://mail.example.com."

[[variables]]
key = "URL_BASE_SANDBOX"
label = "Sandbox URL base"
default = "http://localhost:3003"
description = "External URL of the sandbox endpoint that hosts the WYSIWYG template editors. Set to your sandbox domain after creation."

[[variables]]
key = "URL_BASE_PUBLIC"
label = "Public URL base"
default = "http://localhost:3004"
description = "External URL of the public endpoint used for subscription/list pages. Set to your public domain after creation."

[[variables]]
key = "MAILTRAIN_VERSION"
label = "Mailtrain Version"
default = "latest"
description = "Check out their Docker page for the valid tags https://hub.docker.com/r/mailtrain/mailtrain/tags"

[[variables]]
key = "MARIADB_ROOT_PASSWORD"
label = "MariaDB root password"
generate = true
description = "Internal MariaDB root password (auto-generated)."

[[variables]]
key = "MARIADB_PASSWORD"
label = "MariaDB user password"
generate = true
description = "Internal MariaDB password for the mailtrain database user (auto-generated)."

[[variables]]
key = "MARIADB_VERSION"
label = "Mariadb Version"
default = "10.5.4"
description = "Check out their Docker page for the valid tags https://hub.docker.com/_/mariadb?tab=tags"

[[variables]]
key = "MONGO_VERSION"
label = "Mongo Version"
default = "4.4.0-rc11"
description = "Check out their Docker page for the valid tags https://hub.docker.com/_/mongo?tab=tags"

[[variables]]
key = "REDIS_VERSION"
label = "Redis Version"
default = "alpine3.12"
description = "Check out their Docker page for the valid tags https://hub.docker.com/_/redis?tab=tags"
