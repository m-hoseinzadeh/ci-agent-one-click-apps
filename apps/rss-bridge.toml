slug = "rss-bridge"
name = "RSS Bridge"
category = "App"
description = "RSS-Bridge is a PHP project capable of generating RSS and Atom feeds for websites that don't have one. It can be used on webservers or as a stand-alone application in CLI mode."
keywords = ["bridge", "rss"]
compose = '''
services:
  rss-bridge:
    image: rssbridge/rss-bridge:{{APP_VERSION}}
    restart: always
    environment:
      APP_URL: http://rss-bridge.{{ROOT_DOMAIN}}
    volumes:
    - rss-bridge-config:/config
    ports:
    - '{{HTTP_PORT}}:80'
volumes:
  rss-bridge-config:
'''

[[variables]]
key = "APP_VERSION"
label = "RSS Bridge"
default = "2021-04-25"
description = "Check out their docker page for the valid tags https://hub.docker.com/r/rssbridge/rss-bridge/tags"

[[variables]]
key = "ROOT_DOMAIN"
label = "Public domain"
default = ""
description = "Domain used to build public URLs (set your project domain)."
