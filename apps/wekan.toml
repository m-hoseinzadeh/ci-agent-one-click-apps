slug = "wekan"
name = "WeKan"
category = "App"
description = "WeKan ® is an completely Open Source and Free software collaborative kanban board application with MIT license."
keywords = ["wekan"]
http_port = 8080
compose = '''
services:
  wekan-db:
    image: mongo:6
    command: mongod --oplogSize 128
    volumes:
    - wekan-mongo:/data/db
    - wekan-db-data-dump:/dump
  wekan:
    depends_on:
    - wekan-db
    image: wekanteam/wekan:{{WEKAN_VERSION}}
    environment:
      WRITABLE_PATH: /data
      MONGO_URL: mongodb://wekan-db:27017/wekan
      ROOT_URL: {{APP_URL}}
      WITH_API: "true"
      PORT: "8080"
    volumes:
    - wekan-data:/data
    ports:
    - '{{HTTP_PORT}}:8080'
volumes:
  wekan-mongo:
  wekan-db-data-dump:
  wekan-data:
'''

[[variables]]
key = "WEKAN_VERSION"
label = "WeKan version"
default = "v7.60"
description = "Check out their Docker page for the valid tags https://hub.docker.com/r/wekanteam/wekan/tags"

[[variables]]
key = "APP_URL"
label = "Public URL"
default = "http://localhost"
description = "Root URL Wekan uses to build links (ROOT_URL). Set this to your project's public domain after the project is created, e.g. https://wekan.example.com."
