slug = "yagpdb"
name = "YAGPDB"
category = "App"
description = "Yet another general purpose Discord bot, with a Postgres and Redis backend."
keywords = ["yagpdb", "discord", "bot"]
http_port = 80
compose = '''
services:
  yagpdb:
    image: teyker/yagpdb:{{YAGPDB_VERSION}}
    command: ["/app/yagpdb", "-all", "-pa", "-exthttps=true", "-https=false"]
    depends_on:
    - yagpdb-redis
    - yagpdb-postgres
    environment:
      YAGPDB_OWNER: '{{YAGPDB_BOT_OWNER}}'
      YAGPDB_CLIENTID: '{{YAGPDB_BOT_CLIENT_ID}}'
      YAGPDB_CLIENTSECRET: '{{YAGPDB_BOT_CLIENT_SECRET}}'
      YAGPDB_BOTTOKEN: Bot {{YAGPDB_BOT_TOKEN}}
      YAGPDB_HOST: '{{YAGPDB_HOST}}'
      YAGPDB_PQHOST: yagpdb-postgres
      YAGPDB_PQUSERNAME: yagpdb
      YAGPDB_PQDB: yagpdb_production
      YAGPDB_PQPASSWORD: '{{POSTGRES_PASSWORD}}'
      YAGPDB_REDIS: yagpdb-redis:6379
    ports:
    - '{{HTTP_PORT}}:80'
    volumes:
    - yagpdb-soundboard:/app/soundboard
  yagpdb-redis:
    image: redis:6.2.5-alpine
    volumes:
    - yagpdb-redis-data:/data
  yagpdb-postgres:
    image: postgres:12-alpine
    environment:
      POSTGRES_USER: yagpdb
      POSTGRES_DB: yagpdb_production
      POSTGRES_PASSWORD: '{{POSTGRES_PASSWORD}}'
    volumes:
    - yagpdb-db-data:/var/lib/postgresql/data
volumes:
  yagpdb-soundboard:
  yagpdb-redis-data:
  yagpdb-db-data:
'''

[[variables]]
key = "YAGPDB_VERSION"
label = "YAGPDB image tag"
default = "v2.80.2"
description = "Tag of the teyker/yagpdb community image to deploy (YAGPDB has no official image; this is the commonly-used community build). See https://hub.docker.com/r/teyker/yagpdb/tags"

[[variables]]
key = "POSTGRES_PASSWORD"
label = "Postgres Password"
generate = true
description = "Password for the bundled Postgres database. Must be at least 12 characters; leave blank to auto-generate."

[[variables]]
key = "YAGPDB_HOST"
label = "Public hostname"
default = ""
description = "Bare hostname (no scheme) the bot is reached at, used to build OAuth redirect URLs (e.g. yagpdb.example.com). Set after a domain is assigned to the project; can be left blank initially."

[[variables]]
key = "YAGPDB_BOT_CLIENT_ID"
label = "Discord bot OAuth2 client ID"
default = ""
description = "OAuth2 client ID from your Discord application. Obtain it at https://discord.com/developers/applications"

[[variables]]
key = "YAGPDB_BOT_CLIENT_SECRET"
label = "Discord bot OAuth2 client secret"
default = ""
description = "OAuth2 client secret from your Discord application. Obtain it at https://discord.com/developers/applications"

[[variables]]
key = "YAGPDB_BOT_OWNER"
label = "Discord owner user ID"
default = ""
description = "Your Discord user ID, granted bot owner privileges. Enable Developer Mode in Discord and copy your user ID."

[[variables]]
key = "YAGPDB_BOT_TOKEN"
label = "Discord bot token"
default = ""
description = "Bot token from your Discord application (the value after 'Bot ' is added automatically). Obtain it at https://discord.com/developers/applications"
