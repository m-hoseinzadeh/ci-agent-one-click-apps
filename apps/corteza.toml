slug = "corteza"
name = "Corteza"
category = "App"
description = "Corteza is a free, open-source, Low Code platform for building your organisation key applications, growing its productivity and protecting its data and the privacy of all those concerned."
keywords = ["corteza"]
http_port = 80
compose = '''
services:
  corteza:
    image: cortezaproject/corteza:{{CORTEZA_VERSION}}
    depends_on:
    - corteza-db
    volumes:
    - corteza-data:/data
    environment:
      DB_DSN: postgres://{{POSTGRE_USERNAME}}:{{POSTGRE_PASSWORD}}@corteza-db:5432/{{POSTGRE_DB_NAME}}?sslmode=disable
      HTTP_WEBAPP_ENABLED: "true"
      DOMAIN: '{{CORTEZA_DOMAIN}}'
    ports:
    - '{{HTTP_PORT}}:80'
  corteza-db:
    image: postgres:{{POSTGRES_VERSION}}
    volumes:
    - corteza-postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: '{{POSTGRE_USERNAME}}'
      POSTGRES_PASSWORD: '{{POSTGRE_PASSWORD}}'
      POSTGRES_DB: '{{POSTGRE_DB_NAME}}'
volumes:
  corteza-data:
  corteza-postgres-data:
'''

[[variables]]
key = "CORTEZA_VERSION"
label = "Corteza version"
default = "2024.9.9"
description = "cortezaproject/corteza image tag to deploy."

[[variables]]
key = "POSTGRES_VERSION"
label = "PostgreSQL version"
default = "16"

[[variables]]
key = "CORTEZA_DOMAIN"
label = "Public domain"
default = ""
description = "Domain Corteza uses to build public URLs (e.g. corteza.example.com). Leave empty and set it after the project gets its domain."

[[variables]]
key = "POSTGRE_DB_NAME"
label = "PostgreSQL Database name"
default = "corteza"

[[variables]]
key = "POSTGRE_PASSWORD"
label = "PostgreSQL Password"
generate = true

[[variables]]
key = "POSTGRE_USERNAME"
label = "PostgreSQL username"
default = "cortezaUser"
