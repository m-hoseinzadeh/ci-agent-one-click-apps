slug = "shopware"
name = "Shopware"
category = "App"
description = "Shopware is a trendsetting ecommerce platform to power your online business."
keywords = ["shopware"]
compose = '''
services:
  shopware-db:
    image: mysql:5.7
    volumes:
    - shopware-db-data:/var/lib/mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: '{{DB_PASS}}'
      MYSQL_DATABASE: shopware
      MYSQL_USER: '{{DB_USER}}'
      MYSQL_PASSWORD: '{{DB_PASS}}'
    ports:
    - '{{HTTP_PORT}}:3306'
  shopware-shopware:
    depends_on:
    - shopware-db
    image: shyim/shopware:{{SW_VERSION}}
    restart: always
    environment:
      DATABASE_HOST: shopware-db:3306
      DATABASE_URL: mysql://{{DB_USER}}:{{DB_PASS}}@shopware-db:3306/shopware
      DB_USER: '{{DB_USER}}'
      DB_PASSWORD: '{{DB_PASS}}'
      APP_URL: http://shopware-shopware.{{ROOT_DOMAIN}}
      APP_SECRET: '{{APP_SCRET}}'
      INSTANCE_ID: '{{INSTANCE_ID}}'
      MAILER_URL: '{{MAILER_URL}}'
      INSTALL_LOCALE: '{{SW_LOCALE}}'
      INSTALL_CURRENCY: '{{SW_CURRENCY}}'
      INSTALL_ADMIN_USERNAME: '{{SW_ADMIN_USERNAME}}'
      INSTALL_ADMIN_PASSWORD: '{{SW_ADMIN_PASSWORD}}'
    volumes:
    - shopware-state:/state
    - shopware-custom-plugins:/var/www/html/custom/plugins
    - shopware-files:/var/www/html/files
    - shopware-logs:/var/www/html/var/logs
    - shopware-theme:/var/www/html/public/theme
    - shopware-media:/var/www/html/public/media
    - shopware-bundles:/var/www/html/public/bundles
    - shopware-sitemap:/var/www/html/public/sitemap
    - shopware-thumbnail:/var/www/html/public/thumbnail
    - shopware-jwt:/var/www/html/config/jwt
volumes:
  shopware-db-data:
  shopware-state:
  shopware-custom-plugins:
  shopware-files:
  shopware-logs:
  shopware-theme:
  shopware-media:
  shopware-bundles:
  shopware-sitemap:
  shopware-thumbnail:
  shopware-jwt:
'''

[[variables]]
key = "APP_SCRET"
label = "App Secret (Can be generated with openssl rand -hex 32)"
default = "440dec3766de53010c5ccf6231c182acfc90bd25cff82e771245f736fd276518"

[[variables]]
key = "DB_PASS"
label = "Database password"

[[variables]]
key = "DB_USER"
label = "Database user"
default = "shopwareuser"

[[variables]]
key = "INSTANCE_ID"
label = "Instance ID (Can be generated with openssl rand -hex 32)"
default = "10612e3916e153dd3447850e944a03fabe89440970295447a30a75b151bd844e"

[[variables]]
key = "MAILER_URL"
label = "Mailer URL"
default = "null://localhost"

[[variables]]
key = "ROOT_DOMAIN"
label = "Public domain"
default = ""
description = "Domain used to build public URLs (set your project domain)."

[[variables]]
key = "SW_ADMIN_PASSWORD"
label = "Admin Password"
default = "shopware"

[[variables]]
key = "SW_ADMIN_USERNAME"
label = "Admin Username"
default = "admin"

[[variables]]
key = "SW_CURRENCY"
label = "Currency"
default = "EUR"

[[variables]]
key = "SW_LOCALE"
label = "Locale"
default = "en-GB"

[[variables]]
key = "SW_VERSION"
label = "Shopware Version"
default = "6.2.0"
description = "Check out their Docker page for the valid tags https://hub.docker.com/r/shyim/shopware/tags/"
