slug = "influxdb"
name = "InfluxDB"
category = "Database"
description = "InfluxDB is a time series database. It stores large amounts of timestamped data, including DevOps monitoring, application metrics, IoT sensor data, and real-time analytics. Standalone database: leave the port blank to keep it internal-only, or set one to expose 8086."
keywords = ["influxdb", "timeseries", "database", "metrics"]
compose = '''
services:
  influxdb:
    image: influxdb:{{INFLUX_VERSION}}
    volumes:
    - influxdb-data:/var/lib/influxdb
    ports:
    - '{{HTTP_PORT}}:8086'
    environment:
      INFLUXDB_DB: '{{INFLUX_DB}}'
      INFLUXDB_HTTP_AUTH_ENABLED: '{{INFLUX_AUTH_ENABLED}}'
      INFLUXDB_ADMIN_USER: '{{INFLUX_ADMIN_USER}}'
      INFLUXDB_ADMIN_PASSWORD: '{{INFLUX_ADMIN_PASSWORD}}'
      INFLUXDB_USER: '{{INFLUX_USER}}'
      INFLUXDB_USER_PASSWORD: '{{INFLUX_USER_PASSWORD}}'
      INFLUXDB_READ_USER: '{{INFLUX_READ_USER}}'
      INFLUXDB_READ_USER_PASSWORD: '{{INFLUX_READ_USER_PASSWORD}}'
      INFLUXDB_WRITE_USER: '{{INFLUX_WRITE_USER}}'
      INFLUXDB_WRITE_USER_PASSWORD: '{{INFLUX_WRITE_USER_PASSWORD}}'
volumes:
  influxdb-data:
'''

[[variables]]
key = "INFLUX_VERSION"
label = "InfluxDB version"
default = "1.8"
description = "InfluxDB 1.x image tag. See https://hub.docker.com/_/influxdb/tags for valid tags. These init variables apply to the 1.x line."

[[variables]]
key = "INFLUX_DB"
label = "Initial database name"
default = "mydb"
description = "Automatically creates a database with this name on first boot."

[[variables]]
key = "INFLUX_AUTH_ENABLED"
label = "Auth enabled (true/false)"
default = "true"
description = "Enables HTTP authentication. Required for the user/password options below to take effect."

[[variables]]
key = "INFLUX_ADMIN_USER"
label = "Admin user"
default = "admin"
description = "Name of the admin user created on first boot."

[[variables]]
key = "INFLUX_ADMIN_PASSWORD"
label = "Admin password"
generate = true
description = "Password for the admin user. Auto-generated; the app mints this internally."

[[variables]]
key = "INFLUX_USER"
label = "Application user"
default = "influx"
description = "A user with read+write on the initial database (no privileges if no database is set)."

[[variables]]
key = "INFLUX_USER_PASSWORD"
label = "Application user password"
generate = true
description = "Password for the application user. Auto-generated."

[[variables]]
key = "INFLUX_READ_USER"
label = "Read-only user"
default = "influx-read"
description = "A user with read privileges on the initial database."

[[variables]]
key = "INFLUX_READ_USER_PASSWORD"
label = "Read-only user password"
generate = true
description = "Password for the read-only user. Auto-generated."

[[variables]]
key = "INFLUX_WRITE_USER"
label = "Write-only user"
default = "influx-write"
description = "A user with write privileges on the initial database."

[[variables]]
key = "INFLUX_WRITE_USER_PASSWORD"
label = "Write-only user password"
generate = true
description = "Password for the write-only user. Auto-generated."
