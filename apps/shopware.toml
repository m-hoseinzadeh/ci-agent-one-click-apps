slug = "shopware"
name = "Shopware"
category = "App"
description = "Shopware is a trendsetting ecommerce platform to power your online business."
keywords = ["shopware"]
http_port = 80
compose = '''
services:
  shopware-db:
    image: mysql:5.7
    volumes:
    - shopware-db-data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: '{{DB_ROOT_PASS}}'
      MYSQL_DATABASE: '{{DB_NAME}}'
      MYSQL_USER: '{{DB_USER}}'
      MYSQL_PASSWORD: '{{DB_PASS}}'
  shopware-shopware:
    depends_on:
    - shopware-db
    image: shyim/shopware:{{SW_VERSION}}
    environment:
      DATABASE_HOST: shopware-db:3306
      DATABASE_URL: mysql://{{DB_USER}}:{{DB_PASS}}@shopware-db:3306/{{DB_NAME}}
      DB_USER: '{{DB_USER}}'
      DB_PASSWORD: '{{DB_PASS}}'
      APP_URL: '{{APP_URL}}'
      APP_SECRET: '{{APP_SECRET}}'
      INSTANCE_ID: '{{INSTANCE_ID}}'
      MAILER_URL: '{{MAILER_URL}}'
      INSTALL_LOCALE: '{{SW_LOCALE}}'
      INSTALL_CURRENCY: '{{SW_CURRENCY}}'
      INSTALL_ADMIN_USERNAME: '{{SW_ADMIN_USERNAME}}'
      INSTALL_ADMIN_PASSWORD: '{{SW_ADMIN_PASSWORD}}'
    ports:
    - '{{HTTP_PORT}}:80'
    volumes:
    - shopware-state:/state
    - shopware-custom-plugins:/var/www/html/custom/plugins
    - shopware-files:/var/www/html/files
    - shopware-logs:/var/www/html/var/logs
    - shopware-theme:/var/www/html/public/theme
    - shopware-media:/var/www/html/public/media
    - shopware-bundles:/var/www/html/public/bundles
    - shopware-sitemap:/var/www/html/public/sitemap
    - shopware-thumbnail:/var/www/html/public/thumbnail
    - shopware-jwt:/var/www/html/config/jwt
volumes:
  shopware-db-data:
  shopware-state:
  shopware-custom-plugins:
  shopware-files:
  shopware-logs:
  shopware-theme:
  shopware-media:
  shopware-bundles:
  shopware-sitemap:
  shopware-thumbnail:
  shopware-jwt:
'''

[[variables]]
key = "APP_SECRET"
label = "App Secret"
generate = true
description = "Internal application secret, generated automatically."

[[variables]]
key = "INSTANCE_ID"
label = "Instance ID"
generate = true
description = "Internal instance identifier, generated automatically."

[[variables]]
key = "DB_ROOT_PASS"
label = "Database root password"
generate = true
description = "MySQL root password, generated automatically."

[[variables]]
key = "DB_PASS"
label = "Database password"
generate = true
description = "Password for the Shopware database user, generated automatically."

[[variables]]
key = "DB_USER"
label = "Database user"
default = "shopwareuser"

[[variables]]
key = "DB_NAME"
label = "Database name"
default = "shopware"

[[variables]]
key = "APP_URL"
label = "App URL"
default = ""
description = "Public base URL of the shop (e.g. https://shop.example.com). Set after assigning a domain; leave blank to default to http://localhost."

[[variables]]
key = "MAILER_URL"
label = "Mailer URL"
default = "null://localhost"
description = "SMTP/mailer DSN. Defaults to a null mailer that discards mail."

[[variables]]
key = "SW_ADMIN_PASSWORD"
label = "Admin Password"
generate = true
description = "Initial admin account password, generated automatically."

[[variables]]
key = "SW_ADMIN_USERNAME"
label = "Admin Username"
default = "admin"

[[variables]]
key = "SW_CURRENCY"
label = "Currency"
default = "EUR"

[[variables]]
key = "SW_LOCALE"
label = "Locale"
default = "en-GB"

[[variables]]
key = "SW_VERSION"
label = "Shopware Version"
default = "6.2.0"
description = "Check out their Docker page for the valid tags https://hub.docker.com/r/shyim/shopware/tags/"
