slug = "pydio"
name = "Pydio Cells"
category = "App"
description = "Privacy-conscious file sharing platform that connects all your teams in one place."
keywords = ["cells", "pydio"]
compose = '''
services:
  pydio:
    image: pydio/cells:{{PYDIO_VERSION}}
    environment:
      CELLS_LOG_LEVEL: production
      CELLS_BIND: :8811
      CELLS_NO_TLS: '1'
      CELLS_EXTERNAL: https://pydio.{{ROOT_DOMAIN}}
    volumes:
    - pydio-data:/var/cells/data
    - pydio-cellsdir:/var/cells
    ports:
    - '{{HTTP_PORT}}:8811'
  pydio-mariadb:
    image: mariadb:{{MARIADB_VERSION}}
    environment:
      MYSQL_RANDOM_ROOT_PASSWORD: '1'
      MYSQL_DATABASE: '{{MARIADB}}-db'
      MYSQL_USER: '{{MARIADB}}-user'
      MYSQL_PASSWORD: '{{MARIADB}}-pass'
    volumes:
    - pydio-mariadb-data:/var/lib/mysql
volumes:
  pydio-data:
  pydio-cellsdir:
  pydio-mariadb-data:
'''

[[variables]]
key = "MARIADB"
label = "Mariadb"
default = ""

[[variables]]
key = "MARIADB_VERSION"
label = "MariaDB Version"
default = "10.6.1"
description = "Checkout their docker page for the valid tags https://hub.docker.com/r/library/mariadb/tags/"

[[variables]]
key = "PYDIO_VERSION"
label = "Pydio Version"
default = "2.2.8"
description = "Checkout their docker page for the valid tags https://hub.docker.com/r/pydio/cells/tags"

[[variables]]
key = "ROOT_DOMAIN"
label = "Public domain"
default = ""
description = "Domain used to build public URLs (set your project domain)."
