slug = "formbricks"
name = "Formbricks"
category = "App"
description = "Formbricks - The Open Source Survey & Experience Management solution for fast growing companies"
keywords = ["formbricks"]
http_port = 3000
compose = '''
services:
  formbricks-db:
    image: pgvector/pgvector:{{POSTGRES_VERSION}}
    volumes:
    - formbricks-db-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: formbricks
      POSTGRES_PASSWORD: '{{POSTGRES_PASSWORD}}'
      POSTGRES_DB: '{{POSTGRES_DB}}'
  formbricks:
    image: formbricks/formbricks:{{FORMBRICKS_TAG}}
    depends_on:
    - formbricks-db
    environment:
      DATABASE_URL: postgresql://formbricks:{{POSTGRES_PASSWORD}}@formbricks-db:5432/{{POSTGRES_DB}}?schema=public
      WEBAPP_URL: '{{APP_URL}}'
      NEXTAUTH_URL: '{{APP_URL}}'
      NEXTAUTH_SECRET: '{{NEXTAUTH_SECRET}}'
      ENCRYPTION_KEY: '{{ENCRYPTION_KEY}}'
      CRON_SECRET: '{{CRON_SECRET}}'
      EMAIL_VERIFICATION_DISABLED: '{{EMAIL_VERIFICATION_DISABLED}}'
      MAIL_FROM: '{{MAIL_FROM}}'
      SMTP_HOST: '{{SMTP_HOST}}'
      SMTP_PORT: '{{SMTP_PORT}}'
      SMTP_SECURE_ENABLED: '{{SMTP_SECURE_ENABLED}}'
      SMTP_USER: '{{SMTP_USER}}'
      SMTP_PASSWORD: '{{SMTP_PASSWORD}}'
      PASSWORD_RESET_DISABLED: '{{PASSWORD_RESET_DISABLED}}'
      SIGNUP_DISABLED: '{{SIGNUP_DISABLED}}'
      INVITE_DISABLED: '{{INVITE_DISABLED}}'
    ports:
    - '{{HTTP_PORT}}:3000'
volumes:
  formbricks-db-data:
'''

[[variables]]
key = "APP_URL"
label = "Public URL"
default = ""
description = "Public base URL where Formbricks will be reachable (e.g. https://surveys.example.com). Used for WEBAPP_URL and NEXTAUTH_URL. Set this after assigning a domain to the project."

[[variables]]
key = "CRON_SECRET"
label = "Cron Secret"
generate = true
description = "API secret used to authenticate internal cron jobs. Auto-generated."

[[variables]]
key = "EMAIL_VERIFICATION_DISABLED"
label = "Email Verification Disabled"
default = "1"
description = "Disable email verification for new accounts. Set to 1 to disable, 0 to enable. Requires SMTP settings to be configured if enabled."

[[variables]]
key = "ENCRYPTION_KEY"
label = "Encryption Key"
generate = true
description = "32-byte hex key used to encrypt sensitive data at rest. Auto-generated."

[[variables]]
key = "FORMBRICKS_TAG"
label = "Formbricks Version"
default = "2.1.1"
description = "Check out the docker page for the valid tags https://hub.docker.com/r/formbricks/formbricks/tags"

[[variables]]
key = "INVITE_DISABLED"
label = "Invite Disabled"
default = "0"
description = "Disable the ability for invited users to create an account. Set to 1 to disable, 0 to enable."

[[variables]]
key = "MAIL_FROM"
label = "Mail From"
default = ""
description = "The email address to use as the sender for outgoing emails. Leave blank to disable email functionality."

[[variables]]
key = "NEXTAUTH_SECRET"
label = "NextAuth Secret"
generate = true
description = "Secret used to sign authentication sessions. Auto-generated."

[[variables]]
key = "PASSWORD_RESET_DISABLED"
label = "Password Reset Disabled"
default = "1"
description = "Disable the ability to reset passwords. Set to 1 to disable, 0 to enable. Requires SMTP settings to be configured if enabled."

[[variables]]
key = "POSTGRES_DB"
label = "Postgres DB"
default = "formbricks"

[[variables]]
key = "POSTGRES_PASSWORD"
label = "Postgres Password"
generate = true

[[variables]]
key = "POSTGRES_VERSION"
label = "Postgres (pgvector) Version"
default = "pg16"
description = "Tag of the pgvector/pgvector image. Formbricks requires the pgvector extension, so a pgvector-enabled Postgres image is used."

[[variables]]
key = "SIGNUP_DISABLED"
label = "Signup Disabled"
default = "1"
description = "Disable the ability for new users to create an account. Set to 1 to disable, 0 to enable."

[[variables]]
key = "SMTP_HOST"
label = "SMTP Host"
default = ""
description = "The hostname of your SMTP server. Leave blank to disable email functionality."

[[variables]]
key = "SMTP_PASSWORD"
label = "SMTP Password"
default = ""
description = "The password for your SMTP server. External credential - leave blank to disable email functionality."

[[variables]]
key = "SMTP_PORT"
label = "SMTP Port"
default = "465"
description = "The port of your SMTP server. Typically 587 for TLS or 465 for SSL."

[[variables]]
key = "SMTP_SECURE_ENABLED"
label = "SMTP Secure Enabled"
default = "1"
description = "Enable for TLS/SSL (port 465). Set to 1 to enable, 0 to disable."

[[variables]]
key = "SMTP_USER"
label = "SMTP User"
default = ""
description = "The username for your SMTP server. Leave blank to disable email functionality."
