slug = "appwrite"
name = "Appwrite"
category = "App"
description = "Secure Backend Server for Web, Mobile & Flutter Developers."
keywords = ["appwrite"]
http_port = 80
compose = '''
services:
  appwrite-redis:
    image: redis:7.0.4-alpine
    command: >-
      redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
      --maxmemory-samples 5
    volumes:
    - appwrite-redis:/data
  appwrite-mariadb:
    image: mariadb:10.7
    command: mysqld --innodb-flush-method=fsync
    volumes:
    - appwrite-mariadb:/var/lib/mysql
    environment:
      MARIADB_ROOT_PASSWORD: '{{APP_DB_ROOT_PASS}}'
      MARIADB_DATABASE: '{{APP_DB_SCHEMA}}'
      MARIADB_USER: '{{APP_DB_USER}}'
      MARIADB_PASSWORD: '{{APP_DB_PASS}}'
  appwrite-influxdb:
    image: appwrite/influxdb:1.5.0
    volumes:
    - appwrite-influxdb:/var/lib/influxdb
  appwrite-telegraf:
    image: appwrite/telegraf:1.4.0
    environment:
      _APP_INFLUXDB_HOST: appwrite-influxdb
      _APP_INFLUXDB_PORT: '{{APP_INFLUXDB_PORT}}'
  appwrite:
    image: appwrite/appwrite:{{APP_VERSION}}
    entrypoint: >-
      php -e app/http.php
      -dopcache.preload=opcache.preload=/usr/src/code/app/preload.php
    ports:
    - '{{HTTP_PORT}}:80'
    volumes:
    - appwrite-uploads:/storage/uploads
    - appwrite-cache:/storage/cache
    - appwrite-config:/storage/config
    - appwrite-certificates:/storage/certificates
    - appwrite-functions:/storage/functions
    depends_on:
    - appwrite-redis
    - appwrite-mariadb
    - appwrite-influxdb
    environment:
      _APP_ENV: '{{APP_ENV}}'
      _APP_WORKER_PER_CORE: '{{APP_WORKER_PER_CORE}}'
      _APP_LOCALE: '{{APP_LOCALE}}'
      _APP_CONSOLE_WHITELIST_ROOT: '{{APP_CONSOLE_WHITELIST_ROOT}}'
      _APP_CONSOLE_WHITELIST_EMAILS: '{{APP_CONSOLE_WHITELIST_EMAILS}}'
      _APP_CONSOLE_WHITELIST_IPS: '{{APP_CONSOLE_WHITELIST_IPS}}'
      _APP_SYSTEM_EMAIL_NAME: '{{APP_SYSTEM_EMAIL_NAME}}'
      _APP_SYSTEM_EMAIL_ADDRESS: '{{APP_SYSTEM_EMAIL_ADDRESS}}'
      _APP_SYSTEM_SECURITY_EMAIL_ADDRESS: '{{APP_SYSTEM_SECURITY_EMAIL_ADDRESS}}'
