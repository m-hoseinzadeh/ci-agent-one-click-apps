slug = "discourse"
name = "Discourse"
category = "Communication"
description = "Discourse is the 100% open source discussion platform built for the next decade of the Internet. Use it as a mailing list, discussion forum, long-form chat room, and more!"
keywords = ["discourse", "forum", "discussion", "community"]
http_port = 3000
compose = '''
services:
  discourse-postgresql:
    image: docker.io/bitnamilegacy/postgresql:{{POSTGRESQL_VERSION}}
    environment:
      POSTGRESQL_DATABASE: '{{DB_NAME}}'
      POSTGRESQL_USERNAME: '{{DB_USER}}'
      POSTGRESQL_PASSWORD: '{{DB_PASS}}'
      POSTGRESQL_POSTGRES_PASSWORD: '{{DB_PASS}}'
    volumes:
    - discourse-postgresql-data:/bitnami/postgresql
  discourse-redis:
    image: docker.io/bitnamilegacy/redis:{{REDIS_VERSION}}
    environment:
      ALLOW_EMPTY_PASSWORD: 'yes'
    volumes:
    - discourse-redis-data:/bitnami
  discourse:
    image: docker.io/bitnamilegacy/discourse:{{DISCOURSE_VERSION}}
    depends_on:
    - discourse-postgresql
    - discourse-redis
    volumes:
    - discourse-data:/bitnami
    environment:
      POSTGRESQL_HOST: discourse-postgresql
      POSTGRESQL_ROOT_USER: postgres
      POSTGRESQL_CLIENT_CREATE_DATABASE_NAME: '{{DB_NAME}}'
      POSTGRESQL_CLIENT_CREATE_DATABASE_USERNAME: '{{DB_USER}}'
      POSTGRESQL_CLIENT_CREATE_DATABASE_PASSWORD: '{{DB_PASS}}'
      POSTGRESQL_CLIENT_POSTGRES_PASSWORD: '{{DB_PASS}}'
      DISCOURSE_USERNAME: '{{ADMIN_USER}}'
      DISCOURSE_PASSWORD: '{{ADMIN_PASS}}'
      DISCOURSE_EMAIL: '{{ADMIN_EMAIL}}'
      DISCOURSE_SITENAME: '{{SITENAME}}'
      DISCOURSE_POSTGRESQL_NAME: '{{DB_NAME}}'
      DISCOURSE_POSTGRESQL_USERNAME: '{{DB_USER}}'
      DISCOURSE_POSTGRESQL_PASSWORD: '{{DB_PASS}}'
      DISCOURSE_HOSTNAME: '{{DISCOURSE_HOSTNAME}}'
      REDIS_HOST: discourse-redis
      SMTP_HOST: '{{SMTP_HOST}}'
      SMTP_PORT: '{{SMTP_PORT}}'
      SMTP_USER: '{{SMTP_USER}}'
      SMTP_PASSWORD: '{{SMTP_PASS}}'
    ports:
    - '{{HTTP_PORT}}:3000'
  discourse-sidekiq:
    image: docker.io/bitnamilegacy/discourse:{{DISCOURSE_VERSION}}
    command: /opt/bitnami/scripts/discourse-sidekiq/run.sh
    depends_on:
    - discourse
    volumes:
    - discourse-data:/bitnami
    environment:
      DISCOURSE_POSTGRESQL_NAME: '{{DB_NAME}}'
      DISCOURSE_POSTGRESQL_USERNAME: '{{DB_USER}}'
      DISCOURSE_POSTGRESQL_PASSWORD: '{{DB_PASS}}'
      DISCOURSE_HOST: discourse
      DISCOURSE_PORT: '3000'
      DISCOURSE_HOSTNAME: '{{DISCOURSE_HOSTNAME}}'
      POSTGRESQL_HOST: discourse-postgresql
      REDIS_HOST: discourse-redis
      SMTP_HOST: '{{SMTP_HOST}}'
      SMTP_PORT: '{{SMTP_PORT}}'
      SMTP_USER: '{{SMTP_USER}}'
      SMTP_PASSWORD: '{{SMTP_PASS}}'
volumes:
  discourse-postgresql-data:
  discourse-redis-data:
  discourse-data:
'''

[[variables]]
key = "ADMIN_EMAIL"
label = "Admin email"
default = ""
description = "Email address for the initial Discourse admin account."

[[variables]]
key = "ADMIN_PASS"
label = "Admin password"
generate = true
description = "Password for the initial Discourse admin account (auto-generated)."

[[variables]]
key = "ADMIN_USER"
label = "Admin username"
default = "admin"
description = "Username for the initial Discourse admin account."

[[variables]]
key = "DB_NAME"
label = "Database name"
default = "discourse_db"
description = "Name of the PostgreSQL database."

[[variables]]
key = "DB_PASS"
label = "Database password"
generate = true
description = "Password for the PostgreSQL database and postgres superuser (auto-generated)."

[[variables]]
key = "DB_USER"
label = "Database user"
default = "discourse_user"
description = "Username for the PostgreSQL database."

[[variables]]
key = "DISCOURSE_VERSION"
label = "Discourse version"
default = "2.8.11"
description = "Tag of the Discourse image."

[[variables]]
key = "POSTGRESQL_VERSION"
label = "PostgreSQL version"
default = "15.1.0"
description = "Tag of the PostgreSQL image."

[[variables]]
key = "REDIS_VERSION"
label = "Redis version"
default = "5.0"
description = "Tag of the Redis image."

[[variables]]
key = "DISCOURSE_HOSTNAME"
label = "Public hostname"
default = ""
description = "Public hostname Discourse builds URLs from. Leave blank now and set it to your project's domain after ci-agent assigns one."

[[variables]]
key = "SITENAME"
label = "Site name"
default = "My site!"
description = "Title of the site shown in the browser tab."

[[variables]]
key = "SMTP_HOST"
label = "SMTP host"
default = ""
description = "Hostname of your outgoing mail server (external; required for email/signups)."

[[variables]]
key = "SMTP_PASS"
label = "SMTP password"
default = ""
description = "Password for your SMTP server (external credential; leave blank if unused)."

[[variables]]
key = "SMTP_PORT"
label = "SMTP port"
default = "587"
description = "Port of your outgoing mail server."

[[variables]]
key = "SMTP_USER"
label = "SMTP user"
default = ""
description = "Username for your SMTP server (external; leave blank if unused)."
