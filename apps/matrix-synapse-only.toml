slug = "matrix-synapse-only"
name = "Matrix Synapse - No Database"
category = "Database"
description = "Matrix protocol homeserver (Synapse) without a bundled database; point it at an external PostgreSQL."
keywords = ["database", "matrix", "synapse", "chat", "homeserver"]
http_port = 8008
compose = '''
services:
  matrix-synapse-only:
    image: matrixdotorg/synapse:{{SYNAPSE_VERSION}}
    environment:
      TZ: '{{TIME_ZONE}}'
      SYNAPSE_SERVER_NAME: '{{SYNAPSE_SERVER_NAME}}'
      SYNAPSE_REPORT_STATS: '{{SYNAPSE_REPORT_STATS}}'
    volumes:
    - matrix-synapse-only-data:/data
    ports:
    - '{{HTTP_PORT}}:8008'
volumes:
  matrix-synapse-only-data:
'''

[[variables]]
key = "SYNAPSE_VERSION"
label = "Synapse image tag"
default = "latest"
description = "Tag of the matrixdotorg/synapse image to deploy."

[[variables]]
key = "SYNAPSE_SERVER_NAME"
label = "Server name"
default = ""
description = "Public hostname of your Matrix server (e.g. matrix.example.com). Used as part of every user/room ID and cannot be changed later. Required on first boot to generate the config."

[[variables]]
key = "SYNAPSE_REPORT_STATS"
label = "Report anonymous statistics"
default = "no"
description = "Whether to report anonymous usage statistics to matrix.org (yes or no)."

[[variables]]
key = "TIME_ZONE"
label = "Time zone"
default = "Europe/Berlin"
description = "The time zone of your server https://en.wikipedia.org/wiki/List_of_tz_database_time_zones"
