slug = "collabora-online"
name = "Collabora Online"
category = "App"
description = "Collabora Online is an online and collaborating office suite"
keywords = ["collabora", "online"]
http_port = 9980
compose = '''
services:
  collabora-online:
    image: collabora/code:{{COLLABORA_VERSION}}
    environment:
      domain: '{{WOPIHOST_DOMAIN}}'
      extra_params: --o:ssl.enable=false --o:ssl.termination=true
      username: '{{ADMIN_USER}}'
      password: '{{ADMIN_PASS}}'
    ports:
    - '{{HTTP_PORT}}:9980'
'''

[[variables]]
key = "ADMIN_PASS"
label = "Admin password"
generate = true
description = "Admin password - Please use a random string."

[[variables]]
key = "ADMIN_USER"
label = "Admin username"
default = "admin"
description = "Username for web admin interface"

[[variables]]
key = "COLLABORA_VERSION"
label = "Collabora CODE Version"
default = "25.04.2.1.1"
description = "Check out their docker page for the valid tags https://hub.docker.com/r/collabora/code/tags/"

[[variables]]
key = "WOPIHOST_DOMAIN"
label = "WOPI host domain ( Optional )"
default = ""
description = "Regex of allowed WOPI host domains, e.g. yournextcloud\\.your\\.domain\\.com - escape each dot with a backslash. Leave empty if you don't use Nextcloud or ownCloud."
