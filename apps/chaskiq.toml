slug = "chaskiq"
name = "Chaskiq"
category = "Communication"
description = "A full-featured Live Chat, Support & Marketing platform"
keywords = ["chaskiq"]
http_port = 3000
compose = '''
services:
  chaskiq-postgres:
    image: postgres:12
    volumes:
    - chaskiq-postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: chaskiq
      POSTGRES_PASSWORD: '{{CHASKIQ_POSTGRES_PASSWORD}}'
      POSTGRES_DB: chaskiq
  chaskiq-redis:
    image: redis:alpine
    command: redis-server --requirepass "{{CHASKIQ_REDIS_PASSWORD}}"
    volumes:
    - chaskiq-redis-data:/data
  chaskiq-web:
    image: chaskiq/chaskiq:{{CHASKIQ_VERSION}}
    command: sh -c "bundle exec rails db:setup; bundle exec rails admin_generator; bundle exec rails s -b 0.0.0.0 -p 3000"
    environment:
      HOST: '{{APP_URL}}'
      WS: '{{APP_URL}}/cable'
      RAILS_ENV: production
      RAILS_LOG_TO_STDOUT: 'true'
      RAILS_SERVE_STATIC_FILES: 'true'
      SECRET_KEY_BASE: '{{CHASKIQ_SECRET_KEY_BASE}}'
      ADMIN_EMAIL: '{{ADMIN_USER_EMAIL}}'
      ADMIN_PASSWORD: '{{ADMIN_PASSWORD}}'
      DATABASE_URL: postgres://chaskiq:{{CHASKIQ_POSTGRES_PASSWORD}}@chaskiq-postgres:5432/chaskiq
      REDIS_URL: redis://default:{{CHASKIQ_REDIS_PASSWORD}}@chaskiq-redis:6379
      AWS_ACCESS_KEY_ID: '{{CHASKIQ_AWS_KEY_ID}}'
      AWS_SECRET_ACCESS_KEY: '{{CHASKIQ_AWS_ACCESS_KEY}}'
      AWS_S3_BUCKET: '{{CHASKIQ_AWS_S3_BUCKET}}'
      AWS_S3_REGION: '{{CHASKIQ_AWS_S3_REGION}}'
      GEOCODER_API_KEY: '{{CHASKIQ_GEOCODER_API_KEY}}'
      DEFAULT_GEOCODER_SERVICE: '{{CHASKIQ_GEOCODER_SERVICE}}'
      SCOUT_KEY: '{{CHASKIQ_SCOUTAPP_KEY}}'
      DEFAULT_OUTGOING_EMAIL_DOMAIN: '{{CHASKIQ_DEFAULT_ONGOING_DOMAIN}}'
      DEFAULT_SENDER_EMAIL: '{{CHASKIQ_DEFAULT_SENDER_EMAIL}}'
    ports:
    - '{{HTTP_PORT}}:3000'
  chaskiq-worker:
    image: chaskiq/chaskiq:{{CHASKIQ_VERSION}}
    command: bundle exec sidekiq -C config/sidekiq.yml
    environment:
      HOST: '{{APP_URL}}'
      WS: '{{APP_URL}}/cable'
      RAILS_ENV: production
      RAILS_LOG_TO_STDOUT: 'true'
      SECRET_KEY_BASE: '{{CHASKIQ_SECRET_KEY_BASE}}'
      ADMIN_EMAIL: '{{ADMIN_USER_EMAIL}}'
      ADMIN_PASSWORD: '{{ADMIN_PASSWORD}}'
      DATABASE_URL: postgres://chaskiq:{{CHASKIQ_POSTGRES_PASSWORD}}@chaskiq-postgres:5432/chaskiq
      REDIS_URL: redis://default:{{CHASKIQ_REDIS_PASSWORD}}@chaskiq-redis:6379
      AWS_ACCESS_KEY_ID: '{{CHASKIQ_AWS_KEY_ID}}'
      AWS_SECRET_ACCESS_KEY: '{{CHASKIQ_AWS_ACCESS_KEY}}'
      AWS_S3_BUCKET: '{{CHASKIQ_AWS_S3_BUCKET}}'
      AWS_S3_REGION: '{{CHASKIQ_AWS_S3_REGION}}'
      GEOCODER_API_KEY: '{{CHASKIQ_GEOCODER_API_KEY}}'
      DEFAULT_GEOCODER_SERVICE: '{{CHASKIQ_GEOCODER_SERVICE}}'
      SCOUT_KEY: '{{CHASKIQ_SCOUTAPP_KEY}}'
      DEFAULT_OUTGOING_EMAIL_DOMAIN: '{{CHASKIQ_DEFAULT_ONGOING_DOMAIN}}'
      DEFAULT_SENDER_EMAIL: '{{CHASKIQ_DEFAULT_SENDER_EMAIL}}'
volumes:
  chaskiq-postgres-data:
  chaskiq-redis-data:
'''

[[variables]]
key = "CHASKIQ_VERSION"
label = "Chaskiq image version"
default = "9009088"
description = "The chaskiq/chaskiq image tag to deploy."

[[variables]]
key = "APP_URL"
label = "Public URL"
default = ""
description = "Public base URL used to build links (e.g. https://chat.yourdomain.com). Set after assigning a domain; leave blank to fill in later."

[[variables]]
key = "ADMIN_PASSWORD"
label = "Admin Password"
generate = true
description = "This is the admin password. Change it if you will."

[[variables]]
key = "ADMIN_USER_EMAIL"
label = "Admin Email"
default = "admin@example.com"
description = "This is the admin email. Please change it."

[[variables]]
key = "CHASKIQ_AWS_ACCESS_KEY"
label = "AWS access key"
default = ""
description = "Amazon secret access key (for file storage and email dispatching S3 / SES / SNS). Obtain from AWS; leave blank if unused."

[[variables]]
key = "CHASKIQ_AWS_KEY_ID"
label = "AWS access key id"
default = ""
description = "Amazon access key id (for file storage and email dispatching S3 / SES / SNS). Obtain from AWS; leave blank if unused."

[[variables]]
key = "CHASKIQ_AWS_S3_BUCKET"
label = "AWS S3 bucket"
default = ""
description = "Amazon S3 bucket name. Leave blank if unused."

[[variables]]
key = "CHASKIQ_AWS_S3_REGION"
label = "AWS bucket region"
default = ""
description = "AWS S3 bucket region like: us-east-1. Leave blank if unused."

[[variables]]
key = "CHASKIQ_DEFAULT_ONGOING_DOMAIN"
label = "Default deliver domain"
default = ""
description = "For multiple email deliver tasks, like mail.yourdomain.com. Leave blank if unused."

[[variables]]
key = "CHASKIQ_DEFAULT_SENDER_EMAIL"
label = "Default sender email"
default = ""
description = "Default email sender, like: notifications@mail.yourapp.com. Leave blank if unused."

[[variables]]
key = "CHASKIQ_GEOCODER_API_KEY"
label = "Geocoder API key"
default = ""
description = "Third-party geocoder API key. Leave empty if maxmind_local service is set."

[[variables]]
key = "CHASKIQ_GEOCODER_SERVICE"
label = "Geocoder service name, like (maxmind, ip_info, baidu, yandex)"
default = "maxmind_local"
description = "The complete list of services can be found at https://github.com/alexreisner/geocoder/tree/master/lib/geocoder/lookups"

[[variables]]
key = "CHASKIQ_POSTGRES_PASSWORD"
label = "Postgres Password"
generate = true
description = "Password must be at least 12 characters.  Please use a random string."

[[variables]]
key = "CHASKIQ_REDIS_PASSWORD"
label = "Redis Password"
generate = true
description = "Password must be at least 12 characters. Please use a random string."

[[variables]]
key = "CHASKIQ_SCOUTAPP_KEY"
label = "Scout app key"
default = ""
description = "Scout APM key, for performance & error monitoring (optional, third-party). Leave blank if unused."

[[variables]]
key = "CHASKIQ_SECRET_KEY_BASE"
label = "Chaskiq Secret Key Base"
generate = true
description = "The randomized string which is used to verify the integrity of signed cookies. Please use a string with more than 26 characters"
