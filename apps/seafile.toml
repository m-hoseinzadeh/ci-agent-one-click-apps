slug = "seafile"
name = "Seafile (memcached)"
category = "Storage"
description = "Seafile is an open source cloud storage system with file encryption and group sharing."
keywords = ["(memcached)", "seafile"]
compose = '''
services:
  seafile-db:
    image: mariadb:{{MARIADB_VERSION}}
    environment:
      MYSQL_ROOT_PASSWORD: '{{MARIADB_ROOT_PASSWD}}'
    volumes:
    - seafile-db-data:/var/lib/mysql
    ports:
    - '{{HTTP_PORT}}:3306'
  seafile-memcached:
    image: memcached:{{MEMCACHED_VERSION}}
    entrypoint: memcached -m 256
  seafile:
    image: seafileltd/seafile-mc:{{SEAFILE_VERSION}}
    volumes:
    - seafile-seafile-data:/shared
    environment:
      DB_HOST: seafile-db
      DB_ROOT_PASSWD: '{{MARIADB_ROOT_PASSWD}}'
      TIME_ZONE: $$cap_timezone
      SEAFILE_ADMIN_EMAIL: '{{SEAFILE_ADMIN_EMAIL}}'
      SEAFILE_ADMIN_PASSWORD: '{{SEAFILE_ADMIN_PASSWORD}}'
      SEAFILE_SERVER_HOSTNAME: '{{SEAFILE_HOSTNAME}}'
    depends_on:
      seafile-db:
        condition: service_healthy
      $$capp_appname-memcached:
        condition: service_healthy
volumes:
  seafile-db-data:
  seafile-seafile-data:
'''

[[variables]]
key = "MARIADB_ROOT_PASSWD"
label = "MariaDB Root Password"
generate = true
description = "Default password for root user of MariaDB. Must have at least 8 chars, 1 letter and 1 number"

[[variables]]
key = "MARIADB_VERSION"
label = "MariaDB Version"
default = "10.6.4"
description = "Check out their Docker page for the valid tags https://hub.docker.com/_/mariadb?tab=tags"

[[variables]]
key = "MEMCACHED_VERSION"
label = "Memcached Version"
default = "1.6.12"
description = "Check out their Docker page for the valid tags https://hub.docker.com/_/memcached?tab=tags"

[[variables]]
key = "SEAFILE_ADMIN_EMAIL"
label = "Seafile Admin Email"
default = "admin@localhost"
description = "Email for admin user of Seafile"

[[variables]]
key = "SEAFILE_ADMIN_PASSWORD"
label = "Seafile Admin Password"
generate = true
description = "Password for admin user of Seafile. Must have at least 8 chars, 1 letter and 1 number"

[[variables]]
key = "SEAFILE_HOSTNAME"
label = "Seafile Hostname"
description = "Hostname of Seafile instance (that will be used by it in future)"

[[variables]]
key = "SEAFILE_VERSION"
label = "Seafile Version"
default = "8.0.7"
description = "Check out their Docker page for the valid tags https://hub.docker.com/r/seafileltd/seafile-mc/tags"
