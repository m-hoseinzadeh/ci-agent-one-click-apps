slug = "cronicle"
name = "Cronicle"
category = "App"
description = "A simple, distributed task scheduler and runner with a web based UI."
keywords = ["cronicle"]
compose = '''
services:
  cronicle:
    image: soulteary/cronicle:{{VERSION}}
    restart: always
    volumes:
    - /etc/localtime:/etc/localtime
    - /etc/timezone:/etc/timezone
    - cronicle:/opt/cronicle/data
    - cronicle-plugins:/opt/cronicle/plugins
    environment:
    - TZ={{TIMEZONE}}
    logging:
      driver: json-file
      options:
        max-size: 10m
    ports:
    - '{{HTTP_PORT}}:3012'
volumes:
  cronicle:
  cronicle-plugins:
'''

[[variables]]
key = "TIMEZONE"
label = "Timezone"
default = "Etc/UTC"
description = "Check out all the available timezones here https://en.wikipedia.org/wiki/List_of_tz_database_time_zones"

[[variables]]
key = "VERSION"
label = "Cronicle Version"
default = "0.9.17"
description = "Check out their docker page for the valid tags https://hub.docker.com/r/soulteary/cronicle/tags"
