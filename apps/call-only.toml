slug = "call-only"
name = "Cal.com"
category = "Productivity"
description = "The open-source Calendly alternative for scheduling, bundled with its own PostgreSQL database."
keywords = ["cal.com", "calendar", "scheduling", "calendly", "booking"]
http_port = 3000
compose = '''
services:
  call-only:
    image: calcom/cal.com:{{VERSION}}
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_WEBAPP_URL: '{{APP_URL}}'
      NEXTAUTH_URL: '{{APP_URL}}'
      NEXTAUTH_SECRET: '{{NEXTAUTH_SECRET}}'
      CALENDSO_ENCRYPTION_KEY: '{{CALENDSO_ENCRYPTION_KEY}}'
      POSTGRES_USER: '{{POSTGRES_USER}}'
      POSTGRES_PASSWORD: '{{POSTGRES_PASSWORD}}'
      POSTGRES_DB: '{{POSTGRES_DB}}'
      DATABASE_HOST: database:5432
      DATABASE_URL: postgresql://{{POSTGRES_USER}}:{{POSTGRES_PASSWORD}}@database:5432/{{POSTGRES_DB}}
      DATABASE_DIRECT_URL: postgresql://{{POSTGRES_USER}}:{{POSTGRES_PASSWORD}}@database:5432/{{POSTGRES_DB}}
      GOOGLE_API_CREDENTIALS: '{}'
      EMAIL_FROM: '{{EMAIL_FROM}}'
      EMAIL_SERVER_HOST: '{{EMAIL_HOST}}'
      EMAIL_SERVER_PORT: '{{EMAIL_PORT}}'
      EMAIL_SERVER_USER: '{{EMAIL_SERVER_USER}}'
      EMAIL_SERVER_PASSWORD: '{{EMAIL_SERVER_PASSWORD}}'
    ports:
    - '{{HTTP_PORT}}:3000'
    depends_on:
    - database
  database:
    image: postgres:{{POSTGRES_VERSION}}
    environment:
      POSTGRES_USER: '{{POSTGRES_USER}}'
      POSTGRES_PASSWORD: '{{POSTGRES_PASSWORD}}'
      POSTGRES_DB: '{{POSTGRES_DB}}'
    volumes:
    - database-data:/var/lib/postgresql/data
volumes:
  database-data:
'''

[[variables]]
key = "VERSION"
label = "Cal.com Version"
default = "v5.7.5"
description = "Cal.com image tag. See valid tags at https://hub.docker.com/r/calcom/cal.com/tags"

[[variables]]
key = "APP_URL"
label = "Public URL"
default = ""
description = "Full public URL where Cal.com will be reachable (e.g. https://cal.example.com). Set this after assigning a domain; leave blank to fill in later."

[[variables]]
key = "NEXTAUTH_SECRET"
label = "NextAuth Secret"
generate = true
description = "Random secret used to sign authentication sessions. Generated automatically."

[[variables]]
key = "CALENDSO_ENCRYPTION_KEY"
label = "Encryption Key"
generate = true
description = "Key used to encrypt CalDAV credentials. Generated automatically."

[[variables]]
key = "POSTGRES_VERSION"
label = "PostgreSQL Version"
default = "16"
description = "PostgreSQL image tag."

[[variables]]
key = "POSTGRES_USER"
label = "Postgres user"
default = "calcom"

[[variables]]
key = "POSTGRES_PASSWORD"
label = "Postgres password"
generate = true
description = "Password for the bundled PostgreSQL database. Generated automatically."

[[variables]]
key = "POSTGRES_DB"
label = "Postgres database"
default = "calcom"

[[variables]]
key = "EMAIL_FROM"
label = "Email from address"
default = ""
description = "From address for outgoing email (e.g. notifications@example.com). Required only if you configure SMTP."

[[variables]]
key = "EMAIL_HOST"
label = "SMTP host"
default = ""
description = "SMTP server hostname. Leave blank to disable email."

[[variables]]
key = "EMAIL_PORT"
label = "SMTP port"
default = "587"
description = "SMTP server port."

[[variables]]
key = "EMAIL_SERVER_USER"
label = "SMTP username"
default = ""
description = "SMTP username. Leave blank to disable email."

[[variables]]
key = "EMAIL_SERVER_PASSWORD"
label = "SMTP password"
default = ""
description = "SMTP password (external credential). Leave blank to disable email."
