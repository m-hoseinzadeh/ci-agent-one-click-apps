slug = "splitpro"
name = "SplitPro"
category = "Productivity"
description = "Open-source expense sharing app (Splitwise alternative) backed by PostgreSQL."
keywords = ["splitpro", "expenses", "splitwise", "finance"]
http_port = 3000
compose = '''
services:
  splitpro:
    image: ossapps/splitpro:{{SPLITPRO_VERSION}}
    environment:
      PORT: 3000
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: '{{POSTGRES_PASSWORD}}'
      POSTGRES_DB: splitpro
      DATABASE_URL: postgresql://postgres:{{POSTGRES_PASSWORD}}@splitpro-db:5432/splitpro
      NEXTAUTH_URL: '{{NEXTAUTH_URL}}'
      NEXTAUTH_SECRET: '{{NEXTAUTH_SECRET}}'
      GOOGLE_CLIENT_ID: '{{GOOGLE_CLIENT_ID}}'
      GOOGLE_CLIENT_SECRET: '{{GOOGLE_CLIENT_SECRET}}'
    depends_on:
    - splitpro-db
    ports:
    - '{{HTTP_PORT}}:3000'
    volumes:
    - splitpro-uploads:/app/uploads
  splitpro-db:
    image: ossapps/postgres:17.7-trixie
    environment:
      POSTGRES_DB: splitpro
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: '{{POSTGRES_PASSWORD}}'
    command: >
      postgres
      -c shared_preload_libraries=pg_cron
      -c cron.database_name=splitpro
      -c cron.timezone=UTC
    volumes:
    - splitpro-db-data:/var/lib/postgresql/data
volumes:
  splitpro-db-data:
  splitpro-uploads:
'''

[[variables]]
key = "NEXTAUTH_URL"
label = "Public app URL"
default = ""
description = "Canonical URL SplitPro is served from, used for auth callbacks (e.g. https://splitpro.example.com). Set this after assigning a domain to the project."

[[variables]]
key = "GOOGLE_CLIENT_ID"
label = "Google OAuth Client ID"
default = ""
description = "Client ID from your Google Cloud OAuth 2.0 credentials. Required (SplitPro needs at least one OAuth/OIDC provider; it has no username/password login)."

[[variables]]
key = "GOOGLE_CLIENT_SECRET"
label = "Google OAuth Client Secret"
default = ""
description = "Client secret from your Google Cloud OAuth 2.0 credentials."

[[variables]]
key = "NEXTAUTH_SECRET"
label = "NextAuth secret"
generate = true
description = "Secret used by NextAuth to sign tokens. Auto-generated; only change if you know what you’re doing."

[[variables]]
key = "POSTGRES_PASSWORD"
label = "PostgreSQL password"
generate = true
description = "Password for the internal SplitPro PostgreSQL database."

[[variables]]
key = "SPLITPRO_VERSION"
label = "SplitPro image tag"
default = "v2.1.3"
description = "Docker tag for SplitPro from Docker Hub: https://hub.docker.com/r/ossapps/splitpro/tags"
