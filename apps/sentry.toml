slug = "sentry"
name = "Sentry"
category = "Monitoring"
description = "Open-source error tracking (legacy single-server v9). Create the admin user after first boot with: docker exec -it <sentry-web-container> sentry createuser --superuser"
keywords = ["sentry", "error-tracking", "monitoring", "apm"]
http_port = 9000
compose = '''
services:
  sentry-postgres:
    image: postgres:{{POSTGRES_VERSION}}
    volumes:
    - sentry-postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: sentry
      POSTGRES_PASSWORD: '{{PG_PASS}}'
      POSTGRES_DB: sentry
  sentry-redis:
    image: redis:6-alpine
    volumes:
    - sentry-redis-data:/data
  sentry-init:
    image: sentry:{{SENTRY_VERSION}}
    command: upgrade --noinput
    restart: "no"
    depends_on:
    - sentry-postgres
    - sentry-redis
    environment:
      SENTRY_SECRET_KEY: '{{SENTRY_SECRET}}'
      SENTRY_POSTGRES_HOST: sentry-postgres
      SENTRY_DB_NAME: sentry
      SENTRY_DB_USER: sentry
      SENTRY_DB_PASSWORD: '{{PG_PASS}}'
      SENTRY_REDIS_HOST: sentry-redis
      SENTRY_REDIS_PORT: '6379'
  sentry:
    image: sentry:{{SENTRY_VERSION}}
    command: run web
    depends_on:
    - sentry-init
    - sentry-postgres
    - sentry-redis
    volumes:
    - sentry-data:/var/lib/sentry/files
    environment:
      SENTRY_SECRET_KEY: '{{SENTRY_SECRET}}'
      SENTRY_POSTGRES_HOST: sentry-postgres
      SENTRY_DB_NAME: sentry
      SENTRY_DB_USER: sentry
      SENTRY_DB_PASSWORD: '{{PG_PASS}}'
      SENTRY_REDIS_HOST: sentry-redis
      SENTRY_REDIS_PORT: '6379'
      SENTRY_SERVER_EMAIL: '{{SENTRY_SERVER_MAIL}}'
      SENTRY_EMAIL_HOST: '{{SENTRY_EMAIL_HOST}}'
      SENTRY_EMAIL_PORT: '{{SENTRY_EMAIL_PORT}}'
      SENTRY_EMAIL_USER: '{{SENTRY_EMAIL_USER}}'
      SENTRY_EMAIL_PASSWORD: '{{SENTRY_EMAIL_PASSWORD}}'
      SENTRY_EMAIL_USE_TLS: '{{SENTRY_EMAIL_USE_TLS}}'
    ports:
    - '{{HTTP_PORT}}:9000'
  sentry-cron:
    image: sentry:{{SENTRY_VERSION}}
    command: run cron
    depends_on:
    - sentry
    environment:
      SENTRY_SECRET_KEY: '{{SENTRY_SECRET}}'
      SENTRY_POSTGRES_HOST: sentry-postgres
      SENTRY_DB_NAME: sentry
      SENTRY_DB_USER: sentry
      SENTRY_DB_PASSWORD: '{{PG_PASS}}'
      SENTRY_REDIS_HOST: sentry-redis
      SENTRY_REDIS_PORT: '6379'
  sentry-worker:
    image: sentry:{{SENTRY_VERSION}}
    command: run worker
    depends_on:
    - sentry
    environment:
      SENTRY_SECRET_KEY: '{{SENTRY_SECRET}}'
      SENTRY_POSTGRES_HOST: sentry-postgres
      SENTRY_DB_NAME: sentry
      SENTRY_DB_USER: sentry
      SENTRY_DB_PASSWORD: '{{PG_PASS}}'
      SENTRY_REDIS_HOST: sentry-redis
      SENTRY_REDIS_PORT: '6379'
volumes:
  sentry-postgres-data:
  sentry-redis-data:
  sentry-data:
'''

[[variables]]
key = "PG_PASS"
label = "Postgres Password"
generate = true
description = "Password for the bundled PostgreSQL database. Auto-generated; leave as-is unless you have a reason to set it."

[[variables]]
key = "POSTGRES_VERSION"
label = "Postgres Version Tag"
default = "9.6"
description = "Sentry v9 only supports PostgreSQL 9.6; newer major versions (12+) are incompatible. Keep this at 9.6."

[[variables]]
key = "SENTRY_VERSION"
label = "Sentry Version Tag"
default = "9.1.2"
description = "Tag of the official sentry image. 9.1.2 is the last release of the legacy single-server line. See https://hub.docker.com/_/sentry/tags"

[[variables]]
key = "SENTRY_SECRET"
label = "Sentry Secret Key"
generate = true
description = "Cryptographic secret shared by all Sentry processes. Auto-generated; must stay consistent across web/cron/worker."

[[variables]]
key = "SENTRY_SERVER_MAIL"
label = "Sentry Server Email"
default = "root@localhost"
description = "The From: address used for outbound emails."

[[variables]]
key = "SENTRY_EMAIL_HOST"
label = "SMTP email host (optional)"
default = ""
description = "Outbound SMTP server hostname. Leave blank to disable email."

[[variables]]
key = "SENTRY_EMAIL_PORT"
label = "SMTP email port (optional)"
default = "465"
description = "Outbound SMTP server port."

[[variables]]
key = "SENTRY_EMAIL_USER"
label = "SMTP email user (optional)"
default = ""
description = "Username for the SMTP server. Leave blank if not using email."

[[variables]]
key = "SENTRY_EMAIL_PASSWORD"
label = "SMTP email password (optional)"
default = ""
description = "Password for the SMTP server. External credential; leave blank if not using email."

[[variables]]
key = "SENTRY_EMAIL_USE_TLS"
label = "SMTP use TLS (optional)"
default = "True"
description = "Whether to use TLS for the SMTP connection."
