slug = "affine"
name = "Affine (Community)"
category = "App"
description = "Affine is a next-gen knowledge base that brings planning, sorting, and creating all together."
keywords = ["(community)", "affine"]
http_port = 3010
compose = '''
services:
  affine:
    image: ghcr.io/toeverything/affine:{{AFFINE_VERSION}}
    depends_on:
      affine-redis:
        condition: service_healthy
      affine-postgres:
        condition: service_healthy
      affine-migration:
        condition: service_completed_successfully
    volumes:
    - affine-config:/root/.affine/config
    - affine-storage:/root/.affine/storage
    logging:
      driver: json-file
      options:
        max-size: 1000m
    environment:
      REDIS_SERVER_HOST: affine-redis
      DATABASE_URL: postgres://affine:{{DB_AFFINE_PASSWORD}}@affine-postgres:5432/affine
      NODE_ENV: production
      AFFINE_INDEXER_ENABLED: 'false'
      AFFINE_SERVER_HOST: '{{AFFINE_SERVER_HOST}}'
      AFFINE_SERVER_HTTPS: '{{AFFINE_SERVER_HTTPS}}'
      AFFINE_SERVER_EXTERNAL_URL: '{{AFFINE_SERVER_EXTERNAL_URL}}'
      MAILER_HOST: '{{MAILER_HOST}}'
      MAILER_PORT: '{{MAILER_PORT}}'
      MAILER_USER: '{{MAILER_USER}}'
      MAILER_PASSWORD: '{{MAILER_PASSWORD}}'
      MAILER_SENDER: '{{MAILER_SENDER}}'
    ports:
    - '{{HTTP_PORT}}:3010'
  affine-migration:
    image: ghcr.io/toeverything/affine:{{AFFINE_VERSION}}
    command:
    - sh
    - -c
    - node ./scripts/self-host-predeploy.js
    depends_on:
      affine-redis:
        condition: service_healthy
      affine-postgres:
        condition: service_healthy
    volumes:
    - affine-config:/root/.affine/config
    - affine-storage:/root/.affine/storage
    restart: "no"
    environment:
      REDIS_SERVER_HOST: affine-redis
      DATABASE_URL: postgres://affine:{{DB_AFFINE_PASSWORD}}@affine-postgres:5432/affine
      AFFINE_INDEXER_ENABLED: 'false'
  affine-redis:
    image: redis:7
    volumes:
    - affine-redis-data:/data
    healthcheck:
      test:
      - CMD
      - redis-cli
      - --raw
      - incr
      - ping
      interval: 10s
      timeout: 5s
      retries: 5
  affine-postgres:
    image: pgvector/pgvector:pg16
    volumes:
    - affine-db-data:/var/lib/postgresql/data
    healthcheck:
      test:
      - CMD
      - pg_isready
      - -U
      - affine
      - -d
      - affine
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_DB: affine
      POSTGRES_USER: affine
      POSTGRES_PASSWORD: '{{DB_AFFINE_PASSWORD}}'
      PGDATA: /var/lib/postgresql/data/pgdata
      POSTGRES_INITDB_ARGS: --data-checksums
      POSTGRES_HOST_AUTH_METHOD: trust
volumes:
  affine-config:
  affine-storage:
  affine-redis-data:
  affine-db-data:
'''

[[variables]]
key = "AFFINE_SERVER_EXTERNAL_URL"
label = "AFFINE_SERVER_EXTERNAL_URL"
default = ""
description = "Public URL used to build links to server resources (e.g., https://affine.yourdomain.com). Set after the domain is assigned; leave blank initially."

[[variables]]
key = "AFFINE_SERVER_HOST"
label = "AFFINE_SERVER_HOST"
default = ""
description = "Default access domain of AFFiNE. Must match the URL in the browser (e.g., affine.yourdomain.com). Set after the domain is assigned."

[[variables]]
key = "AFFINE_SERVER_HTTPS"
label = "AFFINE_SERVER_HTTPS"
default = "true"
description = "Use https prefix in URLs. Must match the URL in the browser (true|false)."

[[variables]]
key = "AFFINE_VERSION"
label = "Affine Version Tag"
default = "0.25.5"
description = "Check out their Docker page for valid tags https://github.com/toeverything/AFFiNE/pkgs/container/affine"

[[variables]]
key = "DB_AFFINE_PASSWORD"
label = "Database Password"
generate = true
description = "Database password for the affine user."

[[variables]]
key = "MAILER_HOST"
label = "MAILER_HOST (Optional)"
default = ""
description = "Email (SMTP) server domain (optional)."

[[variables]]
key = "MAILER_PASSWORD"
label = "MAILER_PASSWORD (Optional)"
default = ""
description = "Email (SMTP) password (optional). External credential — supply your own, leave blank if unused."

[[variables]]
key = "MAILER_PORT"
label = "MAILER_PORT (Optional)"
default = ""
description = "Email (SMTP) server port (optional)."

[[variables]]
key = "MAILER_SENDER"
label = "MAILER_SENDER (Optional)"
default = ""
description = "Email sender address (optional, not available for consumer mail services)."

[[variables]]
key = "MAILER_USER"
label = "MAILER_USER (Optional)"
default = ""
description = "Email (SMTP) login user (optional)."
