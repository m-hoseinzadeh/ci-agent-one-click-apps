slug = "bitwardenrs"
name = "vaultwarden"
category = "App"
description = "Lightweight fully featured Rust implementation of Bitwarden."
keywords = ["bitwardenrs", "vaultwarden"]
http_port = 80
compose = '''
services:
  bitwardenrs:
    image: vaultwarden/server:{{BITWARDENRS_VERSION}}
    environment:
      DOMAIN: '{{APP_URL}}'
      SIGNUPS_ALLOWED: '{{REGISTER_ENABLED}}'
      ADMIN_TOKEN: '{{ADMIN_TOKEN}}'
    ports:
    - '{{HTTP_PORT}}:80'
    volumes:
    - bitwardenrs-data:/data
volumes:
  bitwardenrs-data:
'''

[[variables]]
key = "ADMIN_TOKEN"
label = "admin password"
description = "Token that enables the admin zone on /admin. Leave empty to disable the admin interface (the safest option). The app mints this itself if you generate one."

[[variables]]
key = "APP_URL"
label = "Public URL"
default = ""
description = "Full base URL where this instance is reachable (e.g. https://vault.example.com). Required for WebAuthn/U2F two-factor and attachment links. Leave empty now and set it after a domain is assigned."

[[variables]]
key = "BITWARDENRS_VERSION"
label = "vaultwarden Version"
default = "1.30.1"
description = "Check out their Docker page for the valid tags https://hub.docker.com/r/vaultwarden/server/tags"

[[variables]]
key = "REGISTER_ENABLED"
label = "enabled open registration"
default = "true"
description = "If true, all visitors can create an account. If false, only the administrator can invite other users."
