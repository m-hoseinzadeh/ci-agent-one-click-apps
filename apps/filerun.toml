slug = "filerun"
name = "FileRun"
category = "App"
description = "FileRun is a self-hosted Google Drive alternative: a full-featured web-based file manager with an easy to use interface. This template bundles a MariaDB database."
keywords = ["filerun", "files", "storage", "drive"]
http_port = 80
compose = '''
services:
  filerun:
    image: filerun/filerun:{{FILERUN_VERSION}}
    ports:
    - '{{HTTP_PORT}}:80'
    volumes:
    - filerun-html:/var/www/html
    - filerun-userfiles:/user-files
    environment:
      FR_DB_HOST: db
      FR_DB_PORT: '3306'
      FR_DB_NAME: '{{DB_NAME}}'
      FR_DB_USER: '{{DB_USER}}'
      FR_DB_PASS: '{{DB_PASS}}'
      APACHE_RUN_USER: www-data
      APACHE_RUN_USER_ID: '33'
      APACHE_RUN_GROUP: www-data
      APACHE_RUN_GROUP_ID: '33'
    depends_on:
    - db
  db:
    image: mariadb:{{MARIADB_VERSION}}
    volumes:
    - filerun-db:/var/lib/mysql
    environment:
      MARIADB_ROOT_PASSWORD: '{{DB_ROOT_PASS}}'
      MYSQL_DATABASE: '{{DB_NAME}}'
      MYSQL_USER: '{{DB_USER}}'
      MYSQL_PASSWORD: '{{DB_PASS}}'
      MARIADB_AUTO_UPGRADE: '1'
volumes:
  filerun-html:
  filerun-userfiles:
  filerun-db:
'''

[[variables]]
key = "FILERUN_VERSION"
label = "FileRun Version"
default = "latest"
description = "FileRun image tag. Use 'latest' for a normal installation. See https://hub.docker.com/r/filerun/filerun/tags for valid tags."

[[variables]]
key = "MARIADB_VERSION"
label = "MariaDB Version"
default = "12.2"
description = "MariaDB image tag used for the bundled database."

[[variables]]
key = "DB_NAME"
label = "Database Name"
default = "filerun"
description = "Name of the FileRun database."

[[variables]]
key = "DB_USER"
label = "Database User"
default = "filerunuser"
description = "Username for the FileRun database."

[[variables]]
key = "DB_PASS"
label = "Database Password"
description = "Password for the FileRun database user. Auto-generated if left blank."
generate = true

[[variables]]
key = "DB_ROOT_PASS"
label = "Database Root Password"
description = "Root password for the bundled MariaDB. Auto-generated if left blank."
generate = true
