slug = "outline"
name = "Outline"
category = "CMS"
description = "An open, extensible, wiki for your team built using React and Node.js."
keywords = ["outline", "wiki", "knowledge-base"]
http_port = 3000
compose = '''
services:
  outline-redis:
    image: redis:{{REDIS_VERSION}}
    volumes:
    - outline-redis-data:/data
  outline-db:
    image: postgres:{{POSTGRES_VERSION}}
    volumes:
    - outline-db-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: '{{DB_USER}}'
      POSTGRES_PASSWORD: '{{DB_PASS}}'
      POSTGRES_DB: outline
  outline:
    image: outlinewiki/outline:{{OUTLINE_VERSION}}
    depends_on:
    - outline-redis
    - outline-db
    environment:
      NODE_ENV: production
      SECRET_KEY: '{{SECRET_KEY}}'
      UTILS_SECRET: '{{UTILS_SECRET}}'
      DATABASE_URL: postgres://{{DB_USER}}:{{DB_PASS}}@outline-db:5432/outline
      PGSSLMODE: disable
      REDIS_URL: redis://outline-redis:6379
      URL: '{{APP_URL}}'
      PORT: '3000'
      AWS_S3_UPLOAD_BUCKET_URL: '{{S3_STORAGE_URL}}'
      AWS_REGION: '{{S3_STORAGE_REGION}}'
      AWS_S3_UPLOAD_BUCKET_NAME: '{{S3_STORAGE_BUCKET_NAME}}'
      AWS_ACCESS_KEY_ID: '{{S3_STORAGE_ACCESS_KEY_ID}}'
      AWS_SECRET_ACCESS_KEY: '{{S3_STORAGE_SECRET_ACCESS_KEY}}'
      AWS_S3_UPLOAD_MAX_SIZE: '26214400'
      AWS_S3_FORCE_PATH_STYLE: 'true'
      AWS_S3_ACL: private
      GOOGLE_CLIENT_ID: '{{GOOGLE_CLIENT_ID}}'
      GOOGLE_CLIENT_SECRET: '{{GOOGLE_CLIENT_SECRET}}'
      FORCE_HTTPS: 'false'
      ENABLE_UPDATES: 'false'
      SMTP_HOST: '{{SMTP_HOST}}'
      SMTP_PORT: '{{SMTP_PORT}}'
      SMTP_USERNAME: '{{SMTP_USERNAME}}'
      SMTP_PASSWORD: '{{SMTP_PASSWORD}}'
      SMTP_FROM_EMAIL: '{{SMTP_FROM_EMAIL}}'
      SMTP_REPLY_EMAIL: '{{SMTP_REPLY_EMAIL}}'
      SMTP_TLS_CIPHERS: '{{SMTP_TLS_CIPHERS}}'
      SMTP_SECURE: '{{SMTP_SECURE}}'
      DEFAULT_LANGUAGE: '{{DEFAULT_LANGUAGE}}'
    ports:
    - '{{HTTP_PORT}}:3000'
volumes:
  outline-redis-data:
  outline-db-data:
'''

[[variables]]
key = "OUTLINE_VERSION"
label = "Outline Version"
default = "0.85.1"
description = "Outline image tag. See https://hub.docker.com/r/outlinewiki/outline/tags for valid tags."

[[variables]]
key = "DB_PASS"
label = "Database password"
generate = true

[[variables]]
key = "DB_USER"
label = "Database user"
default = "outline_user"

[[variables]]
key = "DEFAULT_LANGUAGE"
label = "The default interface language"
default = "en_US"
description = "See translate.getoutline.com for a list of available language codes and their rough percentage translated."

[[variables]]
key = "APP_URL"
label = "Public URL"
default = ""
description = "Full public URL where Outline will be reachable (e.g. https://wiki.example.com). Set after the project is assigned a domain; required for login redirects and links."

[[variables]]
key = "GOOGLE_CLIENT_ID"
label = "Google Client ID"
default = ""
description = "Optional. OAuth client ID from Google Cloud Console for Google sign-in. Leave blank if unused."

[[variables]]
key = "GOOGLE_CLIENT_SECRET"
label = "Google Client Secret"
default = ""
description = "Optional. OAuth client secret from Google Cloud Console. Leave blank if unused."

[[variables]]
key = "POSTGRES_VERSION"
label = "Postgres Version"
default = "16"
description = "Check out their page for the valid tags https://hub.docker.com/_/postgres?tab=tags"

[[variables]]
key = "REDIS_VERSION"
label = "Redis Version"
default = "7"
description = "Check out their Docker page for the valid tags https://hub.docker.com/_/redis?tab=tags"

[[variables]]
key = "S3_STORAGE_ACCESS_KEY_ID"
label = "S3 storage Access Key ID"
default = ""
description = "Optional. Access key ID for an S3-compatible store (Minio, AWS, etc.) used for file uploads. Leave blank if not using object storage."

[[variables]]
key = "S3_STORAGE_BUCKET_NAME"
label = "S3 Storage bucket name"
default = "outline-data"
description = "Bucket name for uploads (e.g. outline-data). Create it in your S3-compatible store with read/write access for the configured key."

[[variables]]
key = "S3_STORAGE_REGION"
label = "S3 Storage region"
default = "us-east-1"
description = "Region of the S3-compatible server e.g. \"us-west-rack2\"."

[[variables]]
key = "S3_STORAGE_SECRET_ACCESS_KEY"
label = "S3 storage Secret Access Key"
default = ""
description = "Optional. Secret access key paired with the S3 access key ID above. Leave blank if not using object storage."

[[variables]]
key = "S3_STORAGE_URL"
label = "S3 Storage compatible API URL for instance Minio, AWS, etc."
default = ""
description = "Optional. Endpoint URL of your S3-compatible API (e.g. https://minio.example.com). Leave blank if not using object storage."

[[variables]]
key = "SECRET_KEY"
label = "SECRET_KEY"
generate = true
description = "Internal app encryption key (equivalent to `openssl rand -hex 32`). Auto-generated."

[[variables]]
key = "SMTP_FROM_EMAIL"
label = "SMTP from email"
default = ""
description = "Optional. From address for outgoing email. Leave blank if email is not configured."

[[variables]]
key = "SMTP_HOST"
label = "SMTP host"
default = ""
description = "Optional. SMTP server host for transactional emails (invites, notifications). Leave blank if email is not configured."

[[variables]]
key = "SMTP_PASSWORD"
label = "SMTP password"
default = ""
description = "Optional. Password for the SMTP account. Leave blank if email is not configured."

[[variables]]
key = "SMTP_PORT"
label = "SMTP port"
default = ""
description = "Optional. SMTP server port (e.g. 587). Leave blank if email is not configured."

[[variables]]
key = "SMTP_REPLY_EMAIL"
label = "SMTP reply email"
default = ""
description = "Optional. Reply-to address for outgoing email. Leave blank if email is not configured."

[[variables]]
key = "SMTP_SECURE"
label = "SMTP Secure"
default = "true"
description = "Whether to use TLS for the SMTP connection."

[[variables]]
key = "SMTP_TLS_CIPHERS"
label = "SMTP TLS ciphers"
default = ""
description = "Optional. Override TLS ciphers for the SMTP connection. Leave blank for defaults."

[[variables]]
key = "SMTP_USERNAME"
label = "SMTP username"
default = ""
description = "Optional. Username for the SMTP account. Leave blank if email is not configured."

[[variables]]
key = "UTILS_SECRET"
label = "UTILS_SECRET"
generate = true
description = "Internal utility secret (equivalent to `openssl rand -hex 32`). Auto-generated."
