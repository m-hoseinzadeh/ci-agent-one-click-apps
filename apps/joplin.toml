slug = "joplin"
name = "Joplin"
category = "App"
description = "Joplin - an open source note taking and to-do application with synchronization capabilities for Windows, macOS, Linux, Android and iOS."
keywords = ["joplin"]
compose = '''
services:
  joplin-db:
    image: postgres:{{POSTGRES_VERSION}}
    volumes:
    - joplin-db-data:/var/lib/postgresql/data
    restart: unless-stopped
    environment:
      APP_PORT: 22300
      POSTGRES_PASSWORD: '{{POSTGRES_PASSWORD}}'
      POSTGRES_USER: '{{POSTGRES_USER}}'
      POSTGRES_DB: '{{POSTGRES_DB}}'
  joplin:
    image: joplin/server:{{JOPLIN_TAG}}
    depends_on:
    - joplin-db
    restart: unless-stopped
    environment:
      APP_BASE_URL: http://joplin.{{ROOT_DOMAIN}}
      DB_CLIENT: pg
      POSTGRES_PASSWORD: '{{POSTGRES_PASSWORD}}'
      POSTGRES_DATABASE: '{{POSTGRES_DB}}'
      POSTGRES_USER: '{{POSTGRES_USER}}'
      POSTGRES_HOST: joplin-db
    ports:
    - '{{HTTP_PORT}}:22300'
volumes:
  joplin-db-data:
'''

[[variables]]
key = "JOPLIN_TAG"
label = "Joplin Version"
default = "1.7.2"
description = "Check out their docker page for the valid tags https://hub.docker.com/r/joplin/server/tags"

[[variables]]
key = "POSTGRES_DB"
label = "Postgres DB"
default = "joplin"

[[variables]]
key = "POSTGRES_PASSWORD"
label = "Postgres Password"
default = "cA3rS2oK"

[[variables]]
key = "POSTGRES_USER"
label = "Postgres User"
default = "joplin"

[[variables]]
key = "POSTGRES_VERSION"
label = "Postgres Version"
default = "13.1"

[[variables]]
key = "ROOT_DOMAIN"
label = "Public domain"
default = ""
description = "Domain used to build public URLs (set your project domain)."
