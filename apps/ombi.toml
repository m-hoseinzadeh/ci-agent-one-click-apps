slug = "ombi"
name = "Ombi"
category = "App"
description = "Ombi is a self-hosted web application that automatically gives your shared Plex or Emby users the ability to request content by themselves"
keywords = ["ombi"]
compose = '''
services:
  ombi:
    image: linuxserver/ombi:{{OMBI_VERSION}}
    environment:
      TZ: '{{TZ}}'
      PUID: '1000'
      PGID: '1000'
    restart: unless-stopped
    volumes:
    - ombi-config:/config
    ports:
    - '{{HTTP_PORT}}:3579'
volumes:
  ombi-config:
'''

[[variables]]
key = "OMBI_VERSION"
label = "Ombi Version"
default = "development-v4.0.1446-ls143"
description = "Check out their Docker page for the valid tags https://hub.docker.com/r/linuxserver/ombi/tags"

[[variables]]
key = "TZ"
label = "Time Zone"
default = "Asia/Kolkata"
description = "Get yours from https://en.wikipedia.org/wiki/List_of_tz_database_time_zones"
