slug = "stirling-pdf"
name = "stirling"
category = "App"
description = "stirling is a locally hosted web application that allows you to perform various operations on PDF files"
keywords = ["pdf", "stirling"]
compose = '''
services:
  stirling-pdf:
    image: frooodle/s-pdf:{{STIRLING_VERSION}}
    environment:
    - DOCKER_ENABLE_SECURITY=false
    volumes:
    - stirling-pdf-training-data:/usr/share/tesseract-ocr/5/tessdata
    - stirling-pdf-extra-configs:/extraConfigs
    - stirling-pdf-custom-files:/customFiles
    - stirling-pdf-logs:/logs
    restart: always
    ports:
    - '{{HTTP_PORT}}:8080'
volumes:
  stirling-pdf-training-data:
  stirling-pdf-extra-configs:
  stirling-pdf-custom-files:
  stirling-pdf-logs:
'''

[[variables]]
key = "STIRLING_VERSION"
label = "stirling version tag"
default = "0.19.1"
description = "Check out their docker page for the valid tags @ https://hub.docker.com/r/frooodle/s-pdf"
