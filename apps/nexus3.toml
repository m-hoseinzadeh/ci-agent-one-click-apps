slug = "nexus3"
name = "Nexus3"
category = "Storage"
description = "Nexus is a repository manager. It allows you to proxy, collect, and manage your dependencies"
keywords = ["nexus3"]
compose = '''
services:
  nexus3:
    image: sonatype/nexus3:{{_VERSION}}
    volumes:
    - nexus3-data:/nexus-data
    restart: always
    environment: {}
    ports:
    - '{{HTTP_PORT}}:8081'
volumes:
  nexus3-data:
'''

[[variables]]
key = "_VERSION"
label = "Version"
default = "3.15.2"
description = "Additional tags can be found here: https://hub.docker.com/r/sonatype/nexus3/tags"
