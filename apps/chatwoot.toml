slug = "chatwoot"
name = "Chatwoot"
category = "Communication"
description = "Open-source customer support SaaS alternative to Intercom, Drift, Crisp"
keywords = ["chatwoot", "support", "chat", "helpdesk"]
http_port = 3000
compose = '''
services:
  chatwoot-postgres:
    image: pgvector/pgvector:pg16
    volumes:
    - chatwoot-postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: chatwoot
      POSTGRES_PASSWORD: '{{CHATWOOT_POSTGRES_PASSWORD}}'
      POSTGRES_DB: chatwoot
  chatwoot-redis:
    image: redis:7-alpine
    command: redis-server --requirepass "{{CHATWOOT_REDIS_PASSWORD}}"
    volumes:
    - chatwoot-redis-data:/data
  chatwoot-migrate:
    image: chatwoot/chatwoot:{{CHATWOOT_VERSION}}
    command: bundle exec rails db:chatwoot_prepare
    restart: "no"
    depends_on:
    - chatwoot-postgres
    - chatwoot-redis
    environment:
      RAILS_ENV: production
      RAILS_LOG_TO_STDOUT: 'true'
      INSTALLATION_ENV: docker
      NODE_ENV: production
      SECRET_KEY_BASE: '{{CHATWOOT_SECRET_KEY_BASE}}'
      POSTGRES_HOST: chatwoot-postgres
      POSTGRES_DATABASE: chatwoot
      POSTGRES_USERNAME: chatwoot
      POSTGRES_PASSWORD: '{{CHATWOOT_POSTGRES_PASSWORD}}'
      REDIS_URL: redis://chatwoot-redis:6379
      REDIS_PASSWORD: '{{CHATWOOT_REDIS_PASSWORD}}'
  chatwoot-web:
    image: chatwoot/chatwoot:{{CHATWOOT_VERSION}}
    command: bundle exec rails s -p 3000 -b 0.0.0.0
    depends_on:
    - chatwoot-postgres
    - chatwoot-redis
    environment:
      RAILS_ENV: production
      RAILS_LOG_TO_STDOUT: 'true'
      INSTALLATION_ENV: docker
      NODE_ENV: production
      FRONTEND_URL: '{{FRONTEND_URL}}'
      SECRET_KEY_BASE: '{{CHATWOOT_SECRET_KEY_BASE}}'
      POSTGRES_HOST: chatwoot-postgres
      POSTGRES_DATABASE: chatwoot
      POSTGRES_USERNAME: chatwoot
      POSTGRES_PASSWORD: '{{CHATWOOT_POSTGRES_PASSWORD}}'
      REDIS_URL: redis://chatwoot-redis:6379
      REDIS_PASSWORD: '{{CHATWOOT_REDIS_PASSWORD}}'
    ports:
    - '{{HTTP_PORT}}:3000'
  chatwoot-worker:
    image: chatwoot/chatwoot:{{CHATWOOT_VERSION}}
    command: bundle exec sidekiq -C config/sidekiq.yml
    depends_on:
    - chatwoot-postgres
    - chatwoot-redis
    environment:
      RAILS_ENV: production
      RAILS_LOG_TO_STDOUT: 'true'
      INSTALLATION_ENV: docker
      NODE_ENV: production
      FRONTEND_URL: '{{FRONTEND_URL}}'
      SECRET_KEY_BASE: '{{CHATWOOT_SECRET_KEY_BASE}}'
      POSTGRES_HOST: chatwoot-postgres
      POSTGRES_DATABASE: chatwoot
      POSTGRES_USERNAME: chatwoot
      POSTGRES_PASSWORD: '{{CHATWOOT_POSTGRES_PASSWORD}}'
      REDIS_URL: redis://chatwoot-redis:6379
      REDIS_PASSWORD: '{{CHATWOOT_REDIS_PASSWORD}}'
volumes:
  chatwoot-postgres-data:
  chatwoot-redis-data:
'''

[[variables]]
key = "CHATWOOT_VERSION"
label = "Chatwoot Version"
default = "v4.7.0"
description = "Chatwoot image tag to deploy."

[[variables]]
key = "CHATWOOT_POSTGRES_PASSWORD"
label = "Postgres Password"
generate = true
description = "Internal database password. Auto-generated; use at least 12 characters."

[[variables]]
key = "CHATWOOT_REDIS_PASSWORD"
label = "Redis Password"
generate = true
description = "Internal Redis password. Auto-generated; use at least 12 characters."

[[variables]]
key = "CHATWOOT_SECRET_KEY_BASE"
label = "Chatwoot Secret Key Base"
generate = true
description = "Randomized string used to verify signed cookies. Auto-generated; use 64+ characters."

[[variables]]
key = "FRONTEND_URL"
label = "Frontend URL"
default = ""
description = "Public base URL of this Chatwoot instance (e.g. https://chat.example.com). Leave blank until a domain is assigned, then set it so links and webhooks resolve correctly."
