slug = "rsync-looped"
name = "RSync Container"
category = "App"
description = "A simple container that runs rsync over SSH on a loop to periodically pull content from a remote server into a local volume."
keywords = ["container", "looped", "rsync"]
compose = '''
services:
  rsync-looped:
    image: instrumentisto/rsync-ssh:alpine3.23
    environment:
      REMOTE_SOURCE_DIRECTORY: '{{REMOTE_SOURCE_DIRECTORY}}'
      PRIVATE_KEY_BASE_64: '{{PRIVATE_KEY_BASE_64}}'
      REMOTE_SSH_PORT: '{{REMOTE_SSH_PORT}}'
      REMOTE_SSH_ADDRESS: '{{REMOTE_SSH_ADDRESS}}'
      REMOTE_SSH_USER: '{{REMOTE_SSH_USER}}'
      RSYNC_SLEEP_GAP: '{{RSYNC_SLEEP_GAP}}'
    entrypoint: ["/bin/sh", "-c"]
    command:
    - |
      set -e
      mkdir -p /root/.ssh
      echo "$PRIVATE_KEY_BASE_64" | base64 -d > /root/.ssh/id_rsa
      chmod 600 /root/.ssh/id_rsa
      ssh-keyscan -p "$REMOTE_SSH_PORT" "$REMOTE_SSH_ADDRESS" >> /root/.ssh/known_hosts 2>/dev/null || true
      while true; do
        echo "Starting rsync at $(date)"
        rsync -avz --delete -e "ssh -p $REMOTE_SSH_PORT -i /root/.ssh/id_rsa" \
          "$REMOTE_SSH_USER@$REMOTE_SSH_ADDRESS:$REMOTE_SOURCE_DIRECTORY" /target-dir/ || echo "rsync failed, will retry"
        echo "Sleeping for $RSYNC_SLEEP_GAP"
        sleep "$RSYNC_SLEEP_GAP"
      done
    volumes:
    - rsync-looped-target-directory:/target-dir
volumes:
  rsync-looped-target-directory:
'''

[[variables]]
key = "PRIVATE_KEY_BASE_64"
label = "Base64-encoded SSH private key"
description = "The base64-encoded private key used to establish the SSH connection. Generate it with: cat private.key | openssl base64 | tr -d '\\n'. Leave blank to fill later. External credential."
default = ""

[[variables]]
key = "REMOTE_SOURCE_DIRECTORY"
label = "Remote source location"
default = "/backup-files/"
description = "The remote directory from which the content will be downloaded"

[[variables]]
key = "REMOTE_SSH_ADDRESS"
label = "Remote SSH address"
description = "Either an IP or a host such as example.com - DO NOT add HTTP(S)"
default = ""

[[variables]]
key = "REMOTE_SSH_PORT"
label = "Remote SSH port"
default = "22"

[[variables]]
key = "REMOTE_SSH_USER"
label = "Remote SSH user"
default = "root"
description = "Usually root, unless you set up another user"

[[variables]]
key = "RSYNC_SLEEP_GAP"
label = "Sleep gap between sync runs"
default = "30s"
description = "How long to wait between rsync passes (e.g. 30s, 5m, 1h)"
