slug = "linkace"
name = "LinkAce"
category = "App"
description = "LinkAce is a self-hosted tool for effortlessly archiving, organizing, and sharing your favorite web links."
keywords = ["bookmarks", "links", "self-hosted", "linkace"]
http_port = 80
compose = '''
services:
  linkace:
    image: linkace/linkace:{{LINKACE_VERSION}}
    depends_on:
    - linkace-db
    - linkace-redis
    environment:
      APP_URL: '{{APP_URL}}'
      APP_KEY: '{{APP_KEY}}'
      DB_CONNECTION: mysql
      DB_HOST: linkace-db
      DB_PORT: 3306
      DB_DATABASE: '{{LINKACE_DB_NAME}}'
      DB_USERNAME: '{{LINKACE_DB_USER}}'
      DB_PASSWORD: '{{LINKACE_DB_PASS}}'
      SESSION_DRIVER: redis
      CACHE_DRIVER: redis
      REDIS_HOST: linkace-redis
      REDIS_PASSWORD: '{{LINKACE_REDIS_PASS}}'
      REDIS_PORT: 6379
      MAIL_MAILER: smtp
      MAIL_HOST: '{{LINKACE_MAIL_HOST}}'
      MAIL_PORT: '{{LINKACE_MAIL_PORT}}'
      MAIL_USERNAME: '{{LINKACE_MAIL_USERNAME}}'
      MAIL_PASSWORD: '{{LINKACE_MAIL_PASSWORD}}'
      MAIL_ENCRYPTION: '{{LINKACE_MAIL_ENCRYPTION}}'
      MAIL_FROM_ADDRESS: '{{LINKACE_MAIL_FROM_ADDRESS}}'
      MAIL_FROM_NAME: '{{LINKACE_MAIL_FROM_NAME}}'
    volumes:
    - linkace-data:/app
    ports:
    - '{{HTTP_PORT}}:80'
  linkace-db:
    image: mariadb:{{MARIADB_VERSION}}
    environment:
      MYSQL_ROOT_PASSWORD: '{{LINKACE_DB_ROOT_PASS}}'
      MYSQL_DATABASE: '{{LINKACE_DB_NAME}}'
      MYSQL_USER: '{{LINKACE_DB_USER}}'
      MYSQL_PASSWORD: '{{LINKACE_DB_PASS}}'
    volumes:
    - linkace-db:/var/lib/mysql
  linkace-redis:
    image: redis:{{LINKACE_REDIS_VERSION}}
    command: redis-server --requirepass "{{LINKACE_REDIS_PASS}}"
    volumes:
    - linkace-redis:/data
volumes:
  linkace-data:
  linkace-db:
  linkace-redis:
'''

[[variables]]
key = "LINKACE_VERSION"
label = "LinkAce Version"
default = "simple"
description = "LinkAce image tag. The 'simple' tag is the all-in-one container that serves the app on port 80. See https://hub.docker.com/r/linkace/linkace/tags"

[[variables]]
key = "MARIADB_VERSION"
label = "MariaDB Version"
default = "11.2"
description = "MariaDB image tag for the LinkAce database."

[[variables]]
key = "APP_URL"
label = "App URL"
default = ""
description = "Public base URL LinkAce uses to build links (e.g. https://links.example.com). Leave empty and set it after assigning a domain."

[[variables]]
key = "APP_KEY"
label = "App Key"
generate = true
description = "Laravel application encryption key. Generated automatically."

[[variables]]
key = "LINKACE_DB_NAME"
label = "Database Name"
default = "linkace"
description = "Database name for LinkAce"

[[variables]]
key = "LINKACE_DB_USER"
label = "Database User"
default = "linkace"
description = "Database user for LinkAce"

[[variables]]
key = "LINKACE_DB_PASS"
label = "Database Password"
generate = true
description = "Database password for LinkAce"

[[variables]]
key = "LINKACE_DB_ROOT_PASS"
label = "Database Root Password"
generate = true
description = "MariaDB root password. Generated automatically."

[[variables]]
key = "LINKACE_REDIS_VERSION"
label = "Redis Version"
default = "7.2-alpine"
description = "Redis image tag. See https://hub.docker.com/_/redis/tags"

[[variables]]
key = "LINKACE_REDIS_PASS"
label = "Redis Password"
generate = true
description = "Redis password for LinkAce"

[[variables]]
key = "LINKACE_MAIL_ENCRYPTION"
label = "Mail Encryption"
default = "ssl"
description = "SMTP server encryption"

[[variables]]
key = "LINKACE_MAIL_FROM_ADDRESS"
label = "Mail From Address"
default = ""
description = "Email address to send emails from"

[[variables]]
key = "LINKACE_MAIL_FROM_NAME"
label = "Mail From Name"
default = "LinkAce"
description = "Name to send emails from"

[[variables]]
key = "LINKACE_MAIL_HOST"
label = "Mail Host"
default = "smtp.example.com"
description = "SMTP server hostname"

[[variables]]
key = "LINKACE_MAIL_PASSWORD"
label = "Mail Password"
default = ""
description = "SMTP server password. Obtain from your mail provider; leave blank if email is unused."

[[variables]]
key = "LINKACE_MAIL_PORT"
label = "Mail Port"
default = "465"
description = "SMTP server port"

[[variables]]
key = "LINKACE_MAIL_USERNAME"
label = "Mail Username"
default = ""
description = "SMTP server username. Obtain from your mail provider; leave blank if email is unused."
