slug = "matrix-synapse"
name = "Matrix Synapse"
category = "Communication"
description = "Server for the matrix protocol"
keywords = ["matrix", "synapse"]
http_port = 8008
compose = '''
services:
  matrix-synapse-db:
    image: postgres:{{POSTGRES_VERSION}}
    environment:
      POSTGRES_DB: synapse_db
      POSTGRES_PASSWORD: '{{DB_PASSWORD}}'
      POSTGRES_USER: synapse_user
      POSTGRES_INITDB_ARGS: --encoding='UTF8' --lc-collate='C' --lc-ctype='C'
    volumes:
    - matrix-synapse-db:/var/lib/postgresql/data
  matrix-synapse:
    image: matrixdotorg/synapse:{{SYNAPSE_VERSION}}
    environment:
      SYNAPSE_SERVER_NAME: '{{SERVER_NAME}}'
      SYNAPSE_REPORT_STATS: '{{REPORT_STATS}}'
      SYNAPSE_CONFIG_PATH: /data/homeserver.yaml
      POSTGRES_HOST: matrix-synapse-db
      POSTGRES_DB: synapse_db
      POSTGRES_USER: synapse_user
      POSTGRES_PASSWORD: '{{DB_PASSWORD}}'
      TZ: '{{TIME_ZONE}}'
    volumes:
    - matrix-synapse-data:/data
    ports:
    - '{{HTTP_PORT}}:8008'
volumes:
  matrix-synapse-db:
  matrix-synapse-data:
'''

[[variables]]
key = "DB_PASSWORD"
label = "Database password"
generate = true
description = "The password for the Synapse database."

[[variables]]
key = "SYNAPSE_VERSION"
label = "Synapse version"
default = "latest"
description = "The matrixdotorg/synapse image tag to deploy. See https://hub.docker.com/r/matrixdotorg/synapse/tags"

[[variables]]
key = "SERVER_NAME"
label = "Server name"
default = ""
description = "The public domain of your Matrix homeserver (e.g. matrix.example.com). Used as your user-id suffix and cannot be changed later. Leave blank only if you will generate the config manually."

[[variables]]
key = "REPORT_STATS"
label = "Report anonymous statistics"
default = "no"
description = "Whether to report anonymous usage statistics to matrix.org (yes/no)."

[[variables]]
key = "POSTGRES_VERSION"
label = "Postgres version"
default = "14"
description = "The version of postgres that you want to use. You can find the valid versions here: https://hub.docker.com/r/postgres/postgres/tags"

[[variables]]
key = "TIME_ZONE"
label = "Time zone"
default = "Europe/Berlin"
description = "The time zone of your server https://en.wikipedia.org/wiki/List_of_tz_database_time_zones"
