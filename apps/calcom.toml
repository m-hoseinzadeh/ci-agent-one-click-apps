slug = "calcom"
name = "Cal.com"
category = "App"
description = "Scheduling Infrastructure For Everyone"
keywords = ["cal.com", "calcom"]
http_port = 3000
compose = '''
services:
  calcom:
    image: calcom/cal.com:{{CALCOM_VERSION}}
    environment:
      NEXT_PUBLIC_WEBAPP_URL: '{{CALCOM_APP_URL}}'
      NEXTAUTH_SECRET: '{{CALCOM_NEXTAUTH_SECRET}}'
      CALENDSO_ENCRYPTION_KEY: '{{CALCOM_CALENDSO_ENCRYPTION_KEY}}'
      CALCOM_TELEMETRY_DISABLED: '{{CALCOM_TELEMETRY_DISABLED}}'
      NODE_TLS_REJECT_UNAUTHORIZED: '{{CALCOM_NODE_TLS_REJECT_UNAUTHORIZED}}'
      DATABASE_URL: postgresql://{{POSTGRES_USER}}:{{POSTGRES_PASSWORD}}@calcom-db/{{POSTGRES_DATABASE}}
      DATABASE_DIRECT_URL: postgresql://{{POSTGRES_USER}}:{{POSTGRES_PASSWORD}}@calcom-db/{{POSTGRES_DATABASE}}
      EMAIL_FROM: '{{CALCOM_EMAIL_FROM}}'
      EMAIL_SERVER_HOST: '{{CALCOM_EMAIL_SERVER_HOST}}'
      EMAIL_SERVER_PORT: '{{CALCOM_EMAIL_SERVER_PORT}}'
      EMAIL_SERVER_USER: '{{CALCOM_EMAIL_SERVER_USER}}'
      EMAIL_SERVER_PASSWORD: '{{CALCOM_EMAIL_SERVER_PASSWORD}}'
    ports:
    - '{{HTTP_PORT}}:3000'
  calcom-db:
    image: postgres:{{POSTGRES_VERSION}}
    environment:
      POSTGRES_DB: '{{POSTGRES_DATABASE}}'
      POSTGRES_USER: '{{POSTGRES_USER}}'
      POSTGRES_PASSWORD: '{{POSTGRES_PASSWORD}}'
    volumes:
    - calcom-db:/var/lib/postgresql/data
volumes:
  calcom-db:
'''

[[variables]]
key = "CALCOM_CALENDSO_ENCRYPTION_KEY"
label = "Application | Authentication Secret"
generate = true
description = "Authentication Encryption Key"

[[variables]]
key = "CALCOM_EMAIL_FROM"
label = "Email | From"
description = "Sender email address. Optional"

[[variables]]
key = "CALCOM_EMAIL_SERVER_HOST"
label = "Email | Host"
description = "SMTP Host. Optional"

[[variables]]
key = "CALCOM_EMAIL_SERVER_PASSWORD"
label = "Email | Password"
description = "SMTP Password. Optional"

[[variables]]
key = "CALCOM_EMAIL_SERVER_PORT"
label = "Email | Port"
description = "SMTP Port. Optional"

[[variables]]
key = "CALCOM_EMAIL_SERVER_USER"
label = "Email | User"
description = "SMTP User. Optional"

[[variables]]
key = "CALCOM_NEXTAUTH_SECRET"
label = "Application | Cookie Secret"
generate = true
description = "Cookie Encryption Key"

[[variables]]
key = "CALCOM_NODE_TLS_REJECT_UNAUTHORIZED"
label = "Application | Reject Unauthorized Requests"
default = "0"
description = "Whether to reject unauthorized requests. Set to `0` if running behind a load balancer or reverse proxy"

[[variables]]
key = "CALCOM_TELEMETRY_DISABLED"
label = "Application | Usage Data Collection"
default = "1"
description = "Allow cal.com to collect anonymous usage data. Set to `1` to disable"

[[variables]]
key = "CALCOM_VERSION"
label = "Application | Version"
default = "v3.1.3"
description = "Cal.com version. Check out their valid tags at https://hub.docker.com/r/calcom/cal.com/tags"

[[variables]]
key = "POSTGRES_DATABASE"
label = "Database | Name"
default = "calcom"
description = "Name of the PostgreSQL database"

[[variables]]
key = "POSTGRES_PASSWORD"
label = "Database | User Password"
generate = true
description = "Password of the PostgreSQL user"

[[variables]]
key = "POSTGRES_USER"
label = "Database | User Name"
default = "calcom"
description = "Name of the PostgreSQL user"

[[variables]]
key = "POSTGRES_VERSION"
label = "Database | Version"
default = "15.0-alpine"
description = "PostgreSQL version. Check out their valid tags at https://hub.docker.com/_/postgres/tags"

[[variables]]
key = "CALCOM_APP_URL"
label = "Application | Public URL"
default = ""
description = "Public base URL of this Cal.com instance (e.g. https://cal.example.com). Set after the project domain is assigned; needed for correct links and OAuth callbacks."
