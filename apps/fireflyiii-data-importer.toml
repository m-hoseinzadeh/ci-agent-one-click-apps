slug = "fireflyiii-data-importer"
name = "Firefly III Data Importer"
category = "App"
description = "Firefly III Data Importer (FIDI) is a tool to import data into Firefly III."
keywords = ["data", "firefly", "fireflyiii", "iii", "importer"]
http_port = 8080
compose = '''
services:
  fireflyiii-data-importer:
    image: fireflyiii/data-importer:{{FIDI_VERSION}}
    environment:
      FIREFLY_III_ACCESS_TOKEN: '{{FF_TOKEN}}'
      FIREFLY_III_URL: '{{FF_URL}}'
      NORDIGEN_ID: '{{NORDIGEN_ID}}'
      NORDIGEN_KEY: '{{NORDIGEN_KEY}}'
      SPECTRE_APP_ID: '{{SPECTRE_APP_ID}}'
      SPECTRE_SECRET: '{{SPECTRE_SECRET}}'
    ports:
    - '{{HTTP_PORT}}:8080'
'''

[[variables]]
key = "FF_TOKEN"
label = "Firefly III Access Token"
default = ""
description = "Personal Access Token generated in your Firefly III instance (Profile > OAuth). Required to import data."

[[variables]]
key = "FF_URL"
label = "Firefly III URL"
default = ""
description = "Your Firefly III instance URL, e.g. https://firefly.example.com (set after your Firefly III project has a domain)."

[[variables]]
key = "FIDI_VERSION"
label = "FIDI Version"
default = "version-v1.0.1"
description = "Check out their Docker page for the valid tags https://hub.docker.com/r/fireflyiii/data-importer/tags"

[[variables]]
key = "NORDIGEN_ID"
label = "Nordigen ID"
default = ""
description = "Your GoCardless/Nordigen ID (optional, only for bank import via Nordigen)."

[[variables]]
key = "NORDIGEN_KEY"
label = "Nordigen Key"
default = ""
description = "Your GoCardless/Nordigen Key (optional, only for bank import via Nordigen)."

[[variables]]
key = "SPECTRE_APP_ID"
label = "Spectre App ID"
default = ""
description = "Your Spectre/Salt Edge App ID (optional, only for bank import via Spectre)."

[[variables]]
key = "SPECTRE_SECRET"
label = "Spectre Secret"
default = ""
description = "Your Spectre/Salt Edge Secret (optional, only for bank import via Spectre)."
