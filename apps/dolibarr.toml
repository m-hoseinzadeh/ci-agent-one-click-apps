slug = "dolibarr"
name = "Dolibarr"
category = "App"
description = "Open Source ERP & CRM for Business (SME or large companies, freelancers, foundations)"
keywords = ["dolibarr", "erp", "crm"]
http_port = 80
compose = '''
services:
  dolibarr-db:
    image: mariadb:{{MARIADB_VERSION}}
    volumes:
    - dolibarr-db:/var/lib/mysql
    environment:
      MARIADB_ROOT_PASSWORD: '{{DB_ROOT_PASSWORD}}'
      MARIADB_DATABASE: dolibarr
      MARIADB_USER: dolibarr
      MARIADB_PASSWORD: '{{DB_PASSWORD}}'
  dolibarr:
    image: dolibarr/dolibarr:{{DOLIBARR_VERSION}}
    depends_on:
    - dolibarr-db
    volumes:
    - dolibarr-html:/var/www/html
    - dolibarr-docs:/var/www/documents
    environment:
      DOLI_DB_TYPE: mysqli
      DOLI_DB_HOST: dolibarr-db
      DOLI_DB_HOST_PORT: 3306
      DOLI_DB_NAME: dolibarr
      DOLI_DB_USER: dolibarr
      DOLI_DB_PASSWORD: '{{DB_PASSWORD}}'
      DOLI_INSTALL_AUTO: 1
      DOLI_ADMIN_LOGIN: '{{ADMIN_LOGIN}}'
      DOLI_ADMIN_PASSWORD: '{{ADMIN_PASSWORD}}'
    ports:
    - '{{HTTP_PORT}}:80'
volumes:
  dolibarr-db:
  dolibarr-html:
  dolibarr-docs:
'''

[[variables]]
key = "ADMIN_LOGIN"
label = "Admin username"
default = "admin"
description = "Login for the initial Dolibarr administrator account."

[[variables]]
key = "ADMIN_PASSWORD"
label = "Admin password"
generate = true
description = "Password for the initial Dolibarr administrator account."

[[variables]]
key = "DB_PASSWORD"
label = "Database password"
generate = true
description = "Password for the dolibarr database user."

[[variables]]
key = "DB_ROOT_PASSWORD"
label = "Database root password"
generate = true
description = "Root password for the MariaDB server."

[[variables]]
key = "MARIADB_VERSION"
label = "MariaDB version"
default = "11"
description = "MariaDB image tag."

[[variables]]
key = "DOLIBARR_VERSION"
label = "Dolibarr version"
default = "21"
description = "Dolibarr image tag."
