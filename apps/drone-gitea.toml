slug = "drone-gitea"
name = "Drone.io"
category = "Dev tools"
description = "Drone is a self-service Continuous Delivery platform for busy development teams"
keywords = ["drone", "drone.io", "gitea"]
http_port = 80
compose = '''
services:
  drone-gitea-agent:
    image: drone/drone-runner-docker:{{DRONE_RUNNER_VERSION}}
    volumes:
    - /var/run/docker.sock:/var/run/docker.sock
    environment:
      DRONE_RPC_HOST: drone-gitea:80
      DRONE_RPC_SECRET: '{{DRONE_SECRET}}'
      DRONE_RPC_PROTO: http
      DRONE_RUNNER_CAPACITY: '{{DRONE_RUNNER_CAPACITY}}'
  drone-gitea:
    depends_on:
    - drone-gitea-agent
    image: drone/drone:{{DRONE_VERSION}}
    ports:
    - '{{HTTP_PORT}}:80'
    volumes:
    - /var/run/docker.sock:/var/run/docker.sock
    - drone-gitea-server:/data
    environment:
      DRONE_GITEA_SERVER: '{{DRONE_GITEA_SERVER}}'
      DRONE_GIT_ALWAYS_AUTH: '{{DRONE_GITEA_ALWAYS_AUTH}}'
      DRONE_RUNNER_CAPACITY: '{{DRONE_RUNNER_CAPACITY}}'
      DRONE_SERVER_PROTO: '{{DRONE_SERVER_PROTO}}'
      DRONE_SERVER_HOST: '{{DRONE_SERVER_HOST}}'
      DRONE_GITEA_CLIENT_ID: '{{DRONE_GITEA_CLIENT_ID}}'
      DRONE_GITEA_CLIENT_SECRET: '{{DRONE_GITEA_CLIENT_SECRET}}'
      DRONE_RPC_SECRET: '{{DRONE_SECRET}}'
volumes:
  drone-gitea-server:
'''

[[variables]]
key = "DRONE_GITEA_ALWAYS_AUTH"
label = "DRONE_GIT_ALWAYS_AUTH"
default = "false"
description = "Boolean value configures Drone to authenticate when cloning public repositories. This is only required when your source code management system (e.g. GitHub Enterprise) has private mode enabled."

[[variables]]
key = "DRONE_GITEA_CLIENT_ID"
label = "client ID created previously in Gitea"
default = ""
description = "External OAuth2 credential from Gitea. Get from Gitea settings -> Applications -> OAuth2 Applications."

[[variables]]
key = "DRONE_GITEA_CLIENT_SECRET"
label = "Client Secret created previously in Gitea"
default = ""
description = "External OAuth2 credential from Gitea. Get from Gitea settings -> Applications -> OAuth2 Applications."

[[variables]]
key = "DRONE_GITEA_SERVER"
label = "Gitea server URL"
default = ""
description = "The full base URL of your Gitea server, e.g. https://git.example.com. Set this to the address operators use to reach Gitea."

[[variables]]
key = "DRONE_RUNNER_CAPACITY"
label = "DRONE_RUNNER_CAPACITY"
default = "4"
description = "An integer defining the maximum number of pipelines the agent should execute concurrently. The default value is two pipelines."

[[variables]]
key = "DRONE_RUNNER_VERSION"
label = "Drone Docker runner Version"
default = "1.8.3"
description = "Check out their Docker page for the valid tags https://hub.docker.com/r/drone/drone-runner-docker/tags"

[[variables]]
key = "DRONE_SECRET"
label = "RPC secret linking the Drone server and runner"
generate = true
description = "Shared secret used for server-to-runner RPC. Generated automatically; the same value is used by both the server and the runner."

[[variables]]
key = "DRONE_SERVER_HOST"
label = "DRONE_SERVER_HOST"
default = ""
description = "The external hostname (and optional port) Drone is reached at, e.g. drone.example.com. ci-agent assigns a domain after creation; set this to that domain."

[[variables]]
key = "DRONE_SERVER_PROTO"
label = "DRONE_SERVER_PROTO"
default = "https"
description = "The protocol scheme Drone is served with, http or https. Defaults to https; use http if no TLS is configured yet."

[[variables]]
key = "DRONE_VERSION"
label = "Drone Version"
default = "2.25.0"
description = "Check out their Docker page for the valid tags https://hub.docker.com/r/drone/drone/tags"
