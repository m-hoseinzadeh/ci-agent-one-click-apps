slug = "minio"
name = "MinIO"
category = "Storage"
description = "MinIO is a cloud storage server compatible with Amazon S3"
keywords = ["minio"]
compose = '''
services:
  minio:
    image: minio/minio:{{MINIO_VERSION}}
    command:
    - server
    - /data
    - --console-address
    - ':9001'
    volumes:
    - minio-db-data:/data
    - minio-config-data:/root/.minio
    environment:
      MINIO_ROOT_USER: '{{ACCESS_KEY}}'
      MINIO_ROOT_PASSWORD: '{{SECRET_KEY}}'
      MINIO_REGION_NAME: '{{MINIO_REGION_NAME}}'
    ports:
    - '{{HTTP_PORT}}:9001'
    - '{{API_PORT}}:9000'
volumes:
  minio-db-data:
  minio-config-data:
'''

[[variables]]
key = "ACCESS_KEY"
label = "MinIO Root User Access Key"
generate = true
description = "Access key for `MINIO_ROOT_USER`. If unset, minio defaults to `minioadmin`. MinIO strongly recommends specifying a unique, long, and random value for all environments."

[[variables]]
key = "SECRET_KEY"
label = "Minio Secret Key"
generate = true
description = "Secret key for `MINIO_ROOT_PASSWORD`. If unset, minio defaults to `minioadmin`. MinIO strongly recommends specifying a unique, long, and random value for all environments."

[[variables]]
key = "API_PORT"
label = "S3 API port"
default = "9000"
description = "Host port published for the S3-compatible API (container port 9000). The web console is published on the HTTP port above (container port 9001)."

[[variables]]
key = "MINIO_REGION_NAME"
label = "Region name"
default = "us-east-1"
description = "Region reported by the S3 API."

[[variables]]
key = "MINIO_VERSION"
label = "MinIO Version Tag"
default = "RELEASE.2025-09-07T16-13-09Z"
description = "Check out their Docker page for the valid tags https://hub.docker.com/r/minio/minio/tags"
