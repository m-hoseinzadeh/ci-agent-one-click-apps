slug = "iredmail"
name = "iRedMail"
category = "Communication"
description = "iRedMail - Open Source Mail Server, built in one container. Set the mail domain and hostname to your own domain before deploying."
keywords = ["iredmail", "mail", "email", "smtp", "imap"]
http_port = 80
compose = '''
services:
  iredmail:
    image: iredmail/mariadb:{{IREDMAIL_VERSION}}
    ports:
    - '{{HTTP_PORT}}:80'
    - '25:25'
    - '110:110'
    - '143:143'
    - '465:465'
    - '587:587'
    - '993:993'
    - '995:995'
    volumes:
    - /etc/localtime:/etc/localtime
    - iredmail-data-backup-mysql:/var/vmail/backup/mysql
    - iredmail-data-mailboxes:/var/vmail/vmail1
    - iredmail-data-mlmmj:/var/vmail/mlmmj
    - iredmail-data-mlmmj-archive:/var/vmail/mlmmj-archive
    - iredmail-data-imapsieve-copy:/var/vmail/imapsieve_copy
    - iredmail-data-custom:/opt/iredmail/custom
    - iredmail-data-ssl:/opt/iredmail/ssl
    - iredmail-data-mysql:/var/lib/mysql
    - iredmail-data-clamav:/var/lib/clamav
    - iredmail-data-sa-rules:/var/lib/spamassassin
    - iredmail-data-postfix-queue:/var/spool/postfix
    environment:
      MLMMJADMIN_API_TOKEN: '{{MLMMJADMIN_API_TOKEN}}'
      ROUNDCUBE_DES_KEY: '{{ROUNDCUBE_DES_KEY}}'
      FIRST_MAIL_DOMAIN: '{{FIRST_MAIL_DOMAIN}}'
      HOSTNAME: '{{MAIL_HOSTNAME}}'
      FIRST_MAIL_DOMAIN_ADMIN_PASSWORD: '{{IREDMAIL_DEFAULT_PASSWORD}}'
volumes:
  iredmail-data-backup-mysql:
  iredmail-data-mailboxes:
  iredmail-data-mlmmj:
  iredmail-data-mlmmj-archive:
  iredmail-data-imapsieve-copy:
  iredmail-data-custom:
  iredmail-data-ssl:
  iredmail-data-mysql:
  iredmail-data-clamav:
  iredmail-data-sa-rules:
  iredmail-data-postfix-queue:
'''

[[variables]]
key = "IREDMAIL_VERSION"
label = "iRedMail image tag"
default = "stable"
description = "Tag of the iredmail/mariadb image. Check the valid tags at https://hub.docker.com/r/iredmail/mariadb/tags"

[[variables]]
key = "FIRST_MAIL_DOMAIN"
label = "Mail domain"
default = ""
description = "Primary email domain to serve (e.g. example.com). You must set this to your own domain."

[[variables]]
key = "MAIL_HOSTNAME"
label = "Mail hostname (FQDN)"
default = ""
description = "Fully-qualified hostname for the mail server (e.g. mail.example.com). Must resolve to this server's public IP."

[[variables]]
key = "IREDMAIL_DEFAULT_PASSWORD"
label = "Postmaster password"
generate = true
description = "Password for the postmaster admin login (you can change it later from the admin panel)."

[[variables]]
key = "MLMMJADMIN_API_TOKEN"
label = "mlmmjadmin API token"
generate = true
description = "Internal API token for the mailing-list backend. Generated automatically."

[[variables]]
key = "ROUNDCUBE_DES_KEY"
label = "Roundcube DES key"
generate = true
description = "Internal Roundcube webmail session encryption key. Generated automatically."
