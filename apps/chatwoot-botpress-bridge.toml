slug = "chatwoot-botpress-bridge"
name = "Chatwoot Botpress Bridge"
category = "Communication"
description = "Bridge to connect Chatwoot and Botpress. Provide your Chatwoot and Botpress endpoints, the Chatwoot bot token, and the Botpress bot ID after deploy."
keywords = ["botpress", "bridge", "chatwoot"]
http_port = 3000
compose = '''
services:
  chatwoot-botpress-bridge:
    image: douglara/chatwoot-botpress-bridge:{{VERSION}}
    volumes:
    - chatwoot-botpress-bridge-data:/rails/storage
    environment:
      RAILS_ENV: production
      RAILS_LOG_TO_STDOUT: 'true'
      CHATWOOT_ENDPOINT: '{{CHATWOOT_ENDPOINT}}'
      CHATWOOT_BOT_TOKEN: '{{CHATWOOT_BOT_TOKEN}}'
      BOTPRESS_ENDPOINT: '{{BOTPRESS_ENDPOINT}}'
      BOTPRESS_BOT_ID: '{{BOTPRESS_BOT_ID}}'
      SECRET_KEY_BASE: '{{SECRET_KEY_BASE}}'
    ports:
    - '{{HTTP_PORT}}:3000'
volumes:
  chatwoot-botpress-bridge-data:
'''

[[variables]]
key = "BOTPRESS_BOT_ID"
label = "Botpress Bot ID"
default = ""
description = "ID of the bot you created in Botpress. Obtain it from your Botpress workspace."

[[variables]]
key = "BOTPRESS_ENDPOINT"
label = "Botpress endpoint"
default = ""
description = "Botpress URL, e.g. https://app.botpress.com"

[[variables]]
key = "CHATWOOT_BOT_TOKEN"
label = "Chatwoot Bot Token"
default = ""
description = "Chatwoot agent-bot access token. To generate, follow https://github.com/douglara/chatwoot-botpress-bridge"

[[variables]]
key = "CHATWOOT_ENDPOINT"
label = "Chatwoot endpoint"
default = ""
description = "Chatwoot URL, e.g. https://app.chatwoot.com"

[[variables]]
key = "SECRET_KEY_BASE"
label = "Secret Key Base"
generate = true
description = "Randomized string used to verify the integrity of signed cookies. Generated automatically; you may leave it blank."

[[variables]]
key = "VERSION"
label = "Chatwoot Botpress Bridge Version"
default = "1"
description = "Image tag. Check the Docker Hub page for valid tags: https://hub.docker.com/r/douglara/chatwoot-botpress-bridge/tags"
