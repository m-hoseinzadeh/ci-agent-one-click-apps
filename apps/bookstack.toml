slug = "bookstack"
name = "BookStack"
category = "CMS"
description = "A platform to create documentation/wiki content built with PHP & Laravel"
keywords = ["bookstack"]
http_port = 80
compose = '''
services:
  bookstack-db:
    image: lscr.io/linuxserver/mariadb:{{MARIADB_VERSION}}
    environment:
      PGID: 1000
      PUID: 1000
      MYSQL_ROOT_PASSWORD: '{{DB_PASS}}'
      TZ: '{{TIMEZONE}}'
      MYSQL_DATABASE: '{{DATABASE_NAME}}'
      MYSQL_USER: '{{DATABASE_USER}}'
      MYSQL_PASSWORD: '{{DB_PASS}}'
    volumes:
    - bookstack-db-config:/config
  bookstack:
    environment:
      PUID: 1000
      PGID: 1000
      APP_URL: '{{APP_URL}}'
      APP_KEY: '{{APP_KEY}}'
      DB_HOST: bookstack-db
      DB_PORT: 3306
      DB_USERNAME: '{{DATABASE_USER}}'
      DB_PASSWORD: '{{DB_PASS}}'
      DB_DATABASE: '{{DATABASE_NAME}}'
    image: lscr.io/linuxserver/bookstack:{{BOOKSTACK_VERSION}}
    ports:
    - '{{HTTP_PORT}}:80'
    volumes:
    - bookstack-config:/config
volumes:
  bookstack-db-config:
  bookstack-config:
'''

[[variables]]
key = "APP_KEY"
label = "Bookstack application key"
description = "Generate bookstack session encryption key by running `docker run -it --rm --entrypoint /bin/bash lscr.io/linuxserver/bookstack:latest appkey` or using online generator on https://laravel-encryption-key-generator.vercel.app/"

[[variables]]
key = "BOOKSTACK_VERSION"
label = "Version Tag"
default = "v24.10-ls172"
description = "Check out their Docker page for the valid tags https://hub.docker.com/r/linuxserver/bookstack/tags"

[[variables]]
key = "DATABASE_NAME"
label = "Database schema name"
default = "bookstackapp"
description = "Database schema that will be use for the bookstack app"

[[variables]]
key = "DATABASE_USER"
label = "Database user name"
default = "bookstack"
description = "Database user that will be use for the bookstack app"

[[variables]]
key = "DB_PASS"
label = "Database Password"
generate = true
description = "Password to connect to the database"

[[variables]]
key = "MARIADB_VERSION"
label = "MariaDB Version Tag"
default = "10.11.10-r0-ls161"
description = "Check out their Docker page for the valid tags https://hub.docker.com/r/linuxserver/mariadb/tags"

[[variables]]
key = "APP_URL"
label = "Application URL"
default = ""
description = "Base URL BookStack uses to build links (e.g. https://docs.example.com). Set this to your project domain after the app is created; leave blank to fill in later."

[[variables]]
key = "TIMEZONE"
label = "Timezone"
default = "Etc/UTC"
description = "This is the timezone for the application, find yours at https://en.wikipedia.org/wiki/List_of_tz_database_time_zones"
