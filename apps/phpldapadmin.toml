slug = "phpldapadmin"
name = "OpenLDAP + phpLDAPadmin"
category = "App"
description = "OpenLDAP directory server with the phpLDAPadmin web administration interface."
keywords = ["openldap", "phpldapadmin", "ldap", "directory"]
http_port = 80
compose = '''
services:
  phpldapadmin:
    image: osixia/openldap:{{OPENLDAP_VERSION}}
    volumes:
    - phpldapadmin-db:/var/lib/ldap
    - phpldapadmin-config:/etc/ldap/slapd.d
    environment:
      LDAP_ORGANISATION: '{{LDAP_ORGANISATION}}'
      LDAP_DOMAIN: '{{LDAP_DOMAIN}}'
      LDAP_ADMIN_PASSWORD: '{{LDAP_ADMIN_PASSWORD}}'
  phpldapadmin-admin:
    image: osixia/phpldapadmin:{{PHPLDAPADMIN_VERSION}}
    depends_on:
    - phpldapadmin
    ports:
    - '{{HTTP_PORT}}:80'
    environment:
      PHPLDAPADMIN_TRUST_PROXY_SSL: "true"
      PHPLDAPADMIN_LDAP_HOSTS: phpldapadmin
      PHPLDAPADMIN_SERVER_ADMIN: '{{PHPLDAPADMIN_SERVER_ADMIN}}'
      PHPLDAPADMIN_HTTPS: "false"
volumes:
  phpldapadmin-db:
  phpldapadmin-config:
'''

[[variables]]
key = "LDAP_ORGANISATION"
label = "LDAP organisation name"
default = "Example Inc."
description = "Human-readable name of your organisation, stored in the directory root."

[[variables]]
key = "LDAP_DOMAIN"
label = "LDAP domain"
default = "example.org"
description = "Base DNS domain for the directory; it becomes the LDAP base DN (e.g. example.org -> dc=example,dc=org)."

[[variables]]
key = "LDAP_ADMIN_PASSWORD"
label = "LDAP admin password"
generate = true
description = "Password for the OpenLDAP admin account (cn=admin); used to log in to phpLDAPadmin."

[[variables]]
key = "OPENLDAP_VERSION"
label = "OpenLDAP version"
default = "1.5.0"
description = "Check the valid tags at https://hub.docker.com/r/osixia/openldap/tags"

[[variables]]
key = "PHPLDAPADMIN_VERSION"
label = "phpLDAPadmin version"
default = "0.9.0"
description = "Check the valid tags at https://hub.docker.com/r/osixia/phpldapadmin/tags"

[[variables]]
key = "PHPLDAPADMIN_SERVER_ADMIN"
label = "Support email"
default = ""
description = "Optional contact email shown in the phpLDAPadmin interface; leave blank if unused."
