slug = "joplin"
name = "Joplin"
category = "App"
description = "Joplin - an open source note taking and to-do application with synchronization capabilities for Windows, macOS, Linux, Android and iOS."
keywords = ["joplin", "notes", "todo"]
http_port = 22300
compose = '''
services:
  joplin-db:
    image: postgres:{{POSTGRES_VERSION}}
    volumes:
    - joplin-db-data:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: '{{POSTGRES_PASSWORD}}'
      POSTGRES_USER: '{{POSTGRES_USER}}'
      POSTGRES_DB: '{{POSTGRES_DB}}'
  joplin:
    image: joplin/server:{{JOPLIN_TAG}}
    depends_on:
    - joplin-db
    environment:
      APP_PORT: 22300
      APP_BASE_URL: '{{APP_URL}}'
      DB_CLIENT: pg
      POSTGRES_PASSWORD: '{{POSTGRES_PASSWORD}}'
      POSTGRES_DATABASE: '{{POSTGRES_DB}}'
      POSTGRES_USER: '{{POSTGRES_USER}}'
      POSTGRES_HOST: joplin-db
      POSTGRES_PORT: 5432
    ports:
    - '{{HTTP_PORT}}:22300'
volumes:
  joplin-db-data:
'''

[[variables]]
key = "JOPLIN_TAG"
label = "Joplin Version"
default = "3.7.1"
description = "Check out their docker page for the valid tags https://hub.docker.com/r/joplin/server/tags"

[[variables]]
key = "APP_URL"
label = "Public base URL"
default = ""
description = "Public URL Joplin will be reached at (e.g. https://joplin.example.com). Required for sync/login to work; set it after assigning a domain to this project."

[[variables]]
key = "POSTGRES_DB"
label = "Postgres DB"
default = "joplin"

[[variables]]
key = "POSTGRES_PASSWORD"
label = "Postgres Password"
generate = true
description = "Internal database password, generated automatically."

[[variables]]
key = "POSTGRES_USER"
label = "Postgres User"
default = "joplin"

[[variables]]
key = "POSTGRES_VERSION"
label = "Postgres Version"
default = "16"
