slug = "planka"
name = "Planka"
category = "App"
description = "Realtime Kanban Board for Workgroups"
keywords = ["planka", "kanban", "project-management"]
http_port = 1337
compose = '''
services:
  planka:
    image: ghcr.io/plankanban/planka:{{PLANKA_VERSION}}
    environment:
      BASE_URL: '{{APP_URL}}'
      TRUST_PROXY: '{{PLANKA_TRUST_PROXY}}'
      DATABASE_URL: postgresql://{{POSTGRES_USER}}:{{POSTGRES_PASSWORD}}@planka-db/{{POSTGRES_DB}}
      SECRET_KEY: '{{PLANKA_SECRET_KEY}}'
      DEFAULT_ADMIN_EMAIL: '{{DEFAULT_ADMIN_EMAIL}}'
      DEFAULT_ADMIN_PASSWORD: '{{DEFAULT_ADMIN_PASSWORD}}'
      DEFAULT_ADMIN_NAME: '{{DEFAULT_ADMIN_NAME}}'
      DEFAULT_ADMIN_USERNAME: '{{DEFAULT_ADMIN_USERNAME}}'
    depends_on:
    - planka-db
    volumes:
    - planka-data:/app/data
    ports:
    - '{{HTTP_PORT}}:1337'
  planka-db:
    image: postgres:{{POSTGRES_VERSION}}
    volumes:
    - planka-db:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: '{{POSTGRES_USER}}'
      POSTGRES_PASSWORD: '{{POSTGRES_PASSWORD}}'
      POSTGRES_DB: '{{POSTGRES_DB}}'
volumes:
  planka-data:
  planka-db:
'''

[[variables]]
key = "PLANKA_SECRET_KEY"
label = "Application | Secret Key"
generate = true
description = "Secret key for data encryption (generated automatically)."

[[variables]]
key = "PLANKA_TRUST_PROXY"
label = "Application | Trust Proxy"
default = "true"
description = "Trust the X-Forwarded-* headers from the reverse proxy."

[[variables]]
key = "APP_URL"
label = "Application | Base URL"
default = ""
description = "Public base URL of this Planka instance (e.g. https://planka.example.com). Set after assigning a domain; required for correct links."

[[variables]]
key = "DEFAULT_ADMIN_EMAIL"
label = "Admin | Email"
default = ""
description = "Optional. Email of the initial admin account created on first boot. Leave blank to skip."

[[variables]]
key = "DEFAULT_ADMIN_PASSWORD"
label = "Admin | Password"
generate = true
description = "Password for the initial admin account created on first boot."

[[variables]]
key = "DEFAULT_ADMIN_NAME"
label = "Admin | Display Name"
default = "Admin"
description = "Display name of the initial admin account."

[[variables]]
key = "DEFAULT_ADMIN_USERNAME"
label = "Admin | Username"
default = "admin"
description = "Username of the initial admin account."

[[variables]]
key = "POSTGRES_DB"
label = "Database | Name"
default = "planka"
description = "Name of the PostgreSQL database."

[[variables]]
key = "POSTGRES_PASSWORD"
label = "Database | User Password"
generate = true
description = "User password of the PostgreSQL database (generated automatically)."

[[variables]]
key = "POSTGRES_USER"
label = "Database | User Name"
default = "planka"
description = "User name of the PostgreSQL database."

[[variables]]
key = "POSTGRES_VERSION"
label = "General | PostgreSQL Version"
default = "16-alpine"
description = "PostgreSQL image tag. See https://hub.docker.com/_/postgres/tags"

[[variables]]
key = "PLANKA_VERSION"
label = "General | Planka Version"
default = "latest"
description = "Planka image tag. See https://github.com/orgs/plankanban/packages/container/package/planka"
