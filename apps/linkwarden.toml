slug = "linkwarden"
name = "Linkwarden"
category = "App"
description = "Self-hosted collaborative bookmark manager to collect, read, annotate, and fully preserve what matters, all in one place."
keywords = ["linkwarden"]
compose = '''
services:
  linkwarden-postgres:
    image: postgres:16-alpine
    restart: always
    volumes:
    - linkwarden-pg-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: '{{PG_USER}}'
      POSTGRES_PASSWORD: '{{PG_PASS}}'
      POSTGRES_DB: '{{PG_DB}}'
  linkwarden-meilisearch:
    image: getmeili/meilisearch:v1.12.8
    restart: always
    volumes:
    - linkwarden-meili-data:/meili_data
    environment:
      MEILI_MASTER_KEY: '{{MEILI_MASTER_KEY}}'
  linkwarden:
    image: ghcr.io/linkwarden/linkwarden:v2.13.1
    restart: always
    depends_on:
    - linkwarden-postgres
    - linkwarden-meilisearch
    volumes:
    - linkwarden-data:/data/data
    environment:
      NEXTAUTH_URL: http://linkwarden.{{ROOT_DOMAIN}}
      NEXTAUTH_SECRET: '{{NEXTAUTH_SECRET}}'
      DATABASE_URL: postgresql://{{PG_USER}}:{{PG_PASS}}@linkwarden-postgres:5432/{{PG_DB}}
      MEILISEARCH_URL: http://linkwarden-meilisearch:7700
      MEILISEARCH_MASTER_KEY: '{{MEILI_MASTER_KEY}}'
    ports:
    - '{{HTTP_PORT}}:3000'
volumes:
  linkwarden-pg-data:
  linkwarden-meili-data:
  linkwarden-data:
'''

[[variables]]
key = "MEILI_MASTER_KEY"
label = "Meilisearch Master Key"
generate = true
description = "A master key for Meilisearch access. A random one is generated by default."

[[variables]]
key = "NEXTAUTH_SECRET"
label = "NextAuth Secret"
generate = true
description = "A random secret string for securing sessions. A random one is generated by default."

[[variables]]
key = "PG_DB"
label = "Default Database"
default = "postgres"

[[variables]]
key = "PG_PASS"
label = "Password"
generate = true

[[variables]]
key = "PG_USER"
label = "Username"
default = "postgres"

[[variables]]
key = "ROOT_DOMAIN"
label = "Public domain"
default = ""
description = "Domain used to build public URLs (set your project domain)."
