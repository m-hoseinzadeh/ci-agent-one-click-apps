slug = "immich"
name = "Immich"
category = "App"
description = "Open source (AGPLv3) Google Photos alternative. Backup your phone's photos and videos to your private server."
keywords = ["immich"]
compose = '''
services:
  immich:
    environment:
      DB_PASSWORD: '{{APP_DB_PASS}}'
      DB_USERNAME: '{{APP_DB_USER}}'
      DB_DATABASE_NAME: '{{APP_DB_NAME}}'
      DB_HOSTNAME: immich-db
      REDIS_HOSTNAME: immich-redis
      UPLOAD_LOCATION: '{{APP_UPLOAD_LOCATION}}'
      IMMICH_MACHINE_LEARNING_URL: http://immich-machine-learning:3003
    volumes:
    - '{{APP_UPLOAD_LOCATION}}:/usr/src/app/upload'
    - /etc/localtime:/etc/localtime:ro
    depends_on:
    - immich-redis
    - immich-db
    ports:
    - '{{HTTP_PORT}}:2283'
  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:{{VERSION}}
    environment:
      DB_PASSWORD: '{{APP_DB_PASS}}'
      DB_USERNAME: '{{APP_DB_USER}}'
      DB_DATABASE_NAME: '{{APP_DB_NAME}}'
      DB_HOSTNAME: immich-db
      REDIS_HOSTNAME: immich-redis
      UPLOAD_LOCATION: '{{APP_UPLOAD_LOCATION}}'
    volumes:
    - immich-model-cache:/cache
  immich-redis:
    image: redis:{{REDIS_VERSION}}
  immich-db:
    image: ghcr.io/immich-app/postgres:{{POSTGRES_VERSION}}
    environment:
      POSTGRES_PASSWORD: '{{APP_DB_PASS}}'
      POSTGRES_USER: '{{APP_DB_USER}}'
      POSTGRES_DB: '{{APP_DB_NAME}}'
      POSTGRES_INITDB_ARGS: --data-checksums
      PG_DATA: /var/lib/postgresql/data
      DB_STORAGE_TYPE: '{{DB_STORAGE_TYPE}}'
    volumes:
    - immich-db-data:/var/lib/postgresql/data
volumes:
  immich-model-cache:
  immich-db-data:
'''

[[variables]]
key = "APP_DB_NAME"
label = "Database name"
default = "immich"
description = "A name for the database used by Immich"

[[variables]]
key = "APP_DB_PASS"
label = "Database password"
generate = true
description = "Password for accessing the database. A random one has been generated for you."

[[variables]]
key = "APP_DB_USER"
label = "Database username"
default = "immich"
description = "Username to access the database"

[[variables]]
key = "APP_UPLOAD_LOCATION"
label = "Upload directory"
default = "immich-data"
description = "Full path to the directory where you plan to store all your files. It should be created beforehand. If you want caprover to create it for you just leave the default 'immich-data'"

[[variables]]
key = "DB_STORAGE_TYPE"
label = "Database storage type"
default = ""
description = "Set to 'HDD' if your database is stored on a hard drive (not SSD). Leave empty for SSD (default)."

[[variables]]
key = "POSTGRES_VERSION"
label = "PostgreSQL database version"
default = "14-vectorchord0.4.3-pgvectors0.2.0"
description = "Check valid tags at https://github.com/immich-app/base-images/pkgs/container/postgres"

[[variables]]
key = "REDIS_VERSION"
label = "Redis version"
default = "8.4"
description = "Check out their valid tags at https://hub.docker.com/_/redis/tags"

[[variables]]
key = "VERSION"
label = "Immich version"
default = "v2.5.2"
description = "Check out their valid tags at https://github.com/immich-app/immich/releases"
