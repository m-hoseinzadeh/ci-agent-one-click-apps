slug = "activepieces"
name = "Activepieces"
category = "Automation"
description = "Your friendliest open source all-in-one automation tool, designed to be extensible through a type-safe pieces framework written in Typescript."
keywords = ["activepieces"]
http_port = 80
compose = '''
services:
  activepieces:
    image: activepieces/activepieces:{{ACTIVEPIECES_VERSION}}
    environment:
      AP_DB_TYPE: PGLITE
      AP_REDIS_TYPE: MEMORY
      AP_ENCRYPTION_KEY: '{{AP_ENCRYPTION_KEY}}'
      AP_JWT_SECRET: '{{AP_JWT_SECRET}}'
      AP_FRONTEND_URL: '{{AP_FRONTEND_URL}}'
    volumes:
    - activepieces-data:/root/.activepieces
    ports:
    - '{{HTTP_PORT}}:80'
volumes:
  activepieces-data:
'''

[[variables]]
key = "ACTIVEPIECES_VERSION"
label = "Activepieces Version"
default = "0.83.0"
description = "Check out their Docker page for the valid tags https://hub.docker.com/r/activepieces/activepieces/tags"

[[variables]]
key = "AP_ENCRYPTION_KEY"
label = "Encryption Key"
default = "0123456789abcdef0123456789abcdef"
description = "Internal secret used to encrypt stored connections. MUST be exactly 32 hex characters (16 bytes). Change this default to your own value, e.g. the output of `openssl rand -hex 16`."

[[variables]]
key = "AP_JWT_SECRET"
label = "JWT Secret"
generate = true
description = "Internal secret used to sign authentication tokens. Auto-generated; leave blank to mint a fresh one."

[[variables]]
key = "AP_FRONTEND_URL"
label = "Frontend URL"
default = "http://localhost:80"
description = "Base URL used to build webhook and redirect URLs. Set this to your project's public URL (e.g. https://your-domain) after the domain is assigned, otherwise app triggers and webhooks will not work."
