slug = "wallabag"
name = "Wallabag"
category = "App"
description = "Wallabag is a self hostable application for saving web pages, Save and classify articles. Read them later. Freely."
keywords = ["wallabag"]
http_port = 80
compose = '''
services:
  wallabag:
    depends_on:
    - wallabag-mariadb
    image: wallabag/wallabag:{{WALLABAG_VERSION}}
    environment:
      MYSQL_ROOT_PASSWORD: '{{MARIADB_ROOT_PASSWORD}}'
      SYMFONY__ENV__DATABASE_DRIVER: pdo_mysql
      SYMFONY__ENV__DATABASE_HOST: wallabag-mariadb
      SYMFONY__ENV__DATABASE_PORT: 3306
      SYMFONY__ENV__DATABASE_NAME: '{{MARIADB_DATABASE}}'
      SYMFONY__ENV__DATABASE_USER: '{{MARIADB_USER}}'
      SYMFONY__ENV__DATABASE_PASSWORD: '{{MARIADB_PASSWORD}}'
      SYMFONY__ENV__SECRET: '{{SYMFONY_SECRET}}'
      SYMFONY__ENV__DOMAIN_NAME: '{{APP_URL}}'
      SYMFONY__ENV__DATABASE_CHARSET: utf8mb4
    volumes:
    - wallabag-images:/var/www/wallabag/web/assets/images
    ports:
    - '{{HTTP_PORT}}:80'
  wallabag-mariadb:
    image: mariadb:{{MARIADB_VERSION}}
    environment:
      MYSQL_ROOT_PASSWORD: '{{MARIADB_ROOT_PASSWORD}}'
      MYSQL_DATABASE: '{{MARIADB_DATABASE}}'
      MYSQL_USER: '{{MARIADB_USER}}'
      MYSQL_PASSWORD: '{{MARIADB_PASSWORD}}'
    volumes:
    - wallabag-mariadb-data:/var/lib/mysql
volumes:
  wallabag-images:
  wallabag-mariadb-data:
'''

[[variables]]
key = "APP_URL"
label = "Public URL"
default = ""
description = "Base URL Wallabag uses to build links (e.g. https://wallabag.example.com). Leave blank to set after the project domain is assigned."

[[variables]]
key = "SYMFONY_SECRET"
label = "Symfony Secret"
generate = true

[[variables]]
key = "MARIADB_ROOT_PASSWORD"
label = "MariaDB Root Password"
generate = true

[[variables]]
key = "MARIADB_DATABASE"
label = "MariaDB Database"
default = "wallabag"

[[variables]]
key = "MARIADB_USER"
label = "MariaDB User"
default = "wallabag"

[[variables]]
key = "MARIADB_PASSWORD"
label = "MariaDB Password"
generate = true

[[variables]]
key = "MARIADB_VERSION"
label = "MariaDB Version"
default = "10.5.6"
description = "Check out their docker page for the valid tags https://hub.docker.com/r/library/mariadb/tags/"

[[variables]]
key = "WALLABAG_VERSION"
label = "Version Tag"
default = "2.4.0"
description = "Check out their Docker page for the valid tags https://hub.docker.com/r/wallabag/wallabag/tags"
