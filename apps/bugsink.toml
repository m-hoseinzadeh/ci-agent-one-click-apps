slug = "bugsink"
name = "Bugsink"
category = "Monitoring"
description = "Bugsink is a self-hosted error tracker. Full control over your data. Compatible with Sentry SDKs, easy to set up, scalable & reliable."
keywords = ["bugsink", "error-tracking", "sentry", "monitoring"]
http_port = 8000
compose = '''
services:
  bugsink-mysql:
    image: mysql:{{MYSQL_VERSION}}
    environment:
      MYSQL_ROOT_PASSWORD: '{{MYSQL_PASSWORD}}'
      MYSQL_DATABASE: bugsink
    volumes:
    - bugsink-mysql-data:/var/lib/mysql
    healthcheck:
      test:
      - CMD-SHELL
      - exit | mysql -h localhost -P 3306 -u root -p$$MYSQL_ROOT_PASSWORD
      interval: 1s
      timeout: 20s
      retries: 30
  bugsink:
    image: bugsink/bugsink:{{BUGSINK_VERSION}}
    depends_on:
      bugsink-mysql:
        condition: service_healthy
    ports:
    - '{{HTTP_PORT}}:8000'
    environment:
      SECRET_KEY: '{{SECRET_KEY}}'
      CREATE_SUPERUSER: '{{SUPERUSER_EMAIL}}:{{SUPERUSER_PASSWORD}}'
      PORT: 8000
      DATABASE_URL: mysql://root:{{MYSQL_PASSWORD}}@bugsink-mysql:3306/bugsink
      BASE_URL: '{{BASE_URL}}'
      BEHIND_HTTPS_PROXY: 'true'
    healthcheck:
      test:
      - CMD-SHELL
      - python -c 'import requests; requests.get("http://localhost:8000/").raise_for_status()'
      interval: 5s
      timeout: 20s
      retries: 10
volumes:
  bugsink-mysql-data:
'''

[[variables]]
key = "BUGSINK_VERSION"
label = "Bugsink Version"
default = "2"
description = "Bugsink image tag. See https://hub.docker.com/r/bugsink/bugsink/tags"

[[variables]]
key = "MYSQL_VERSION"
label = "MySQL Version"
default = "8.4"
description = "MySQL version. See https://hub.docker.com/_/mysql/tags"

[[variables]]
key = "MYSQL_PASSWORD"
label = "MySQL Root Password"
generate = true
description = "Password for the internal MySQL root user (used by Bugsink to connect)."

[[variables]]
key = "SECRET_KEY"
label = "Secret Key"
generate = true
description = "Django secret key used by Bugsink to sign sessions and tokens."

[[variables]]
key = "SUPERUSER_EMAIL"
label = "Bugsink Admin Email"
default = "admin@example.com"
description = "Email/login for the initial Bugsink admin account."

[[variables]]
key = "SUPERUSER_PASSWORD"
label = "Bugsink Admin Password"
generate = true
description = "Password for the initial Bugsink admin account."

[[variables]]
key = "BASE_URL"
label = "Base URL"
default = ""
description = "Public base URL Bugsink uses to build links (e.g. https://bugsink.example.com). Leave blank to set after the project domain is assigned."
