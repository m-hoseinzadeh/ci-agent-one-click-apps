slug = "nextcloud"
name = "Nextcloud"
category = "Storage"
description = "Nextcloud is a suite of client-server software for creating and using file hosting services"
keywords = ["nextcloud"]
compose = '''
services:
  nextcloud-db:
    documentation: Taken from https://hub.docker.com/_/mariadb
    image: mariadb:{{MARIADB_VERSION}}
    volumes:
    - nextcloud-db-data:/var/lib/mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: '{{DB_PASS}}'
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: '{{DB_USER}}'
      MYSQL_PASSWORD: '{{DB_PASS}}'
    ports:
    - '{{HTTP_PORT}}:3306'
  nextcloud-redis:
    documentation: Taken from https://github.com/nextcloud/docker/blob/master/.examples/docker-compose/with-nginx-proxy/mariadb-cron-redis/apache/docker-compose.yml
    image: redis:{{REDIS_VERSION}}
    restart: always
    volumes:
    - nextcloud-redis-data:/data
  nextcloud:
    depends_on:
    - nextcloud-db
    - nextcloud-redis
    documentation: Taken from https://hub.docker.com/_/nextcloud
    image: nextcloud:{{NEXTCLOUD_VERSION}}
    volumes:
    - nextcloud-data:/var/www/html
    - nextcloud-conf:/usr/local/etc/php/conf.d
    restart: always
    environment:
      OVERWRITEPROTOCOL: '{{HTTP_HTTPS_CORS}}'
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: '{{DB_USER}}'
      MYSQL_PASSWORD: '{{DB_PASS}}'
      MYSQL_HOST: nextcloud-db
      REDIS_HOST: nextcloud-redis
      NEXTCLOUD_ADMIN_USER: '{{ADMIN_USER}}'
      NEXTCLOUD_ADMIN_PASSWORD: '{{ADMIN_PASS}}'
      NEXTCLOUD_TRUSTED_DOMAINS: nextcloud.{{ROOT_DOMAIN}} {{HOSTNAMES}}
      PHP_UPLOAD_LIMIT: '{{PHP_UPLOAD}}'
      PHP_MEMORY_LIMIT: '{{PHP_MEMORY}}'
      PHP_OPCACHE_MEMORY_CONSUMPTION: '{{PHP_OPCACHE}}'
  nextcloud-cron:
    depends_on:
    - nextcloud-db
    - nextcloud-redis
    - nextcloud
    documentation: https://github.com/nextcloud/docker/blob/master/.examples/docker-compose/with-nginx-proxy/mariadb-cron-redis/apache/docker-compose.yml
    restart: always
    volumes:
    - nextcloud-data:/var/www/html
    image: nextcloud:{{NEXTCLOUD_VERSION}}
    command:
    - sh
    - -c
    - /cron.sh
volumes:
  nextcloud-db-data:
  nextcloud-redis-data:
  nextcloud-data:
  nextcloud-conf:
'''

[[variables]]
key = "ADMIN_PASS"
label = "admin password"
generate = true
description = "Password for the Nextcloud admin user."

[[variables]]
key = "ADMIN_USER"
label = "admin name"
default = "admin"
description = "Name of the Nextcloud admin user."

[[variables]]
key = "DB_PASS"
label = "database password"
generate = true
description = "Password for the database user and root using mysql."

[[variables]]
key = "DB_USER"
label = "database user"
default = "nextcloud"
description = "Username for the database using mysql."

[[variables]]
key = "HOSTNAMES"
label = "hostnames"
description = "Add all your additional hostnames where nextcloud will be exposed separated by space char. After first run, this variables are not reloaded by nextcloud and you will have to change the configuration according to the nextcloud's documentation."

[[variables]]
key = "HTTP_HTTPS_CORS"
label = "Protocol of proxy"
default = "https"
description = "Choose either http or https. cors configuration to login are set by the docker image, if you do not set this same as your proxy configuration, login will fail."

[[variables]]
key = "MARIADB_VERSION"
label = "MariaDB (database) version"
default = "10.11.14"
description = "Check out their Docker page for the valid tags https://hub.docker.com/_/mariadb?tab=tags"

[[variables]]
key = "NEXTCLOUD_VERSION"
label = "Nextcloud Version"
default = "31.0.14"
description = "Check out their Docker page for the valid tags https://hub.docker.com/_/nextcloud?tab=tags  Do not use fpm versions."

[[variables]]
key = "PHP_MEMORY"
label = "PHP memory limit"
default = "512M"
description = "Define the memory limit."

[[variables]]
key = "PHP_OPCACHE"
label = "PHP Opcache limit"
default = "128"
description = "The size of the shared memory storage used by OPcache, in megabytes."

[[variables]]
key = "PHP_UPLOAD"
label = "PHP upload limit"
default = "512M"
description = "Define the maximum upload limit. You need also to increase the nginx upload limit (`client_max_body_size 1024M` in the server block of nginx config) for WebDav."

[[variables]]
key = "REDIS_VERSION"
label = "Redis Version"
default = "7.2.12"
description = "Check out their Docker page for the valid tags https://hub.docker.com/_/redis?tab=tags"

[[variables]]
key = "ROOT_DOMAIN"
label = "Public domain"
default = ""
description = "Domain used to build public URLs (set your project domain)."
