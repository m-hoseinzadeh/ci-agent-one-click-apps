slug = "vscode-coder"
name = "vscode via code-server"
category = "Dev tools"
description = "code-server by Coder is VS Code running on a remote server, accessible through the browser."
keywords = ["code", "coder", "server", "via", "vscode"]
compose = '''
services:
  vscode-coder:
    environment:
      PASSWORD: '{{CODER_PASSWORD}}'
    image: ''
    restart: always
    volumes:
    - vscode-coder-config-data:/home/coder/.local/share/code-server
    - vscode-coder-project-directory:/home/coder/project
    - vscode-coder-keys-directory:/root/.ssh
    - vscode-coder-theme-and-plugin-directory:/root/.local/share/code-server
    ports:
    - '{{HTTP_PORT}}:8080'
volumes:
  vscode-coder-config-data:
  vscode-coder-project-directory:
  vscode-coder-keys-directory:
  vscode-coder-theme-and-plugin-directory:
'''

[[variables]]
key = "CODER_PASSWORD"
label = "Password"
description = "Password for accessing VS Code"
