slug = "airflow"
name = "Airflow"
category = "Automation"
description = "A tool to express and execute workflows as directed acyclic graphs (DAGs)."
keywords = ["airflow", "workflow", "dag", "scheduler"]
http_port = 8080
compose = '''
services:
  airflow-db:
    image: bitnamilegacy/postgresql:{{POSTGRESQL_VERSION}}
    environment:
      POSTGRESQL_DATABASE: '{{POSTGRESQL_NAME}}'
      POSTGRESQL_USERNAME: '{{POSTGRESQL_USER}}'
      POSTGRESQL_PASSWORD: '{{POSTGRESQL_PASSWORD}}'
    volumes:
    - airflow-postgresql-persistance:/bitnami/postgresql
  airflow-redis:
    image: bitnamilegacy/redis:{{REDIS_VERSION}}
    environment:
      REDIS_PASSWORD: '{{REDIS_PASSWORD}}'
    volumes:
    - airflow-redis-persistance:/bitnami
  airflow:
    depends_on:
    - airflow-db
    - airflow-redis
    image: bitnamilegacy/airflow:{{AIRFLOW_VERSION}}
    environment:
      AIRFLOW_EXECUTOR: CeleryExecutor
      AIRFLOW_DATABASE_HOST: airflow-db
      AIRFLOW_DATABASE_NAME: '{{POSTGRESQL_NAME}}'
      AIRFLOW_DATABASE_USERNAME: '{{POSTGRESQL_USER}}'
      AIRFLOW_DATABASE_PASSWORD: '{{POSTGRESQL_PASSWORD}}'
      REDIS_HOST: airflow-redis
      REDIS_PASSWORD: '{{REDIS_PASSWORD}}'
      AIRFLOW_FERNET_KEY: '{{AIRFLOW_FERNET_KEY}}'
      AIRFLOW_WEBSERVER_SECRET_KEY: '{{AIRFLOW_SECRET_KEY}}'
      AIRFLOW_LOAD_EXAMPLES: '{{AIRFLOW_EXAMPLES}}'
      AIRFLOW_USERNAME: '{{AIRFLOW_USER}}'
      AIRFLOW_PASSWORD: '{{AIRFLOW_PASSWORD}}'
      AIRFLOW_EMAIL: '{{AIRFLOW_EMAIL}}'
      AIRFLOW__SMTP__SMTP_HOST: '{{SMTP_HOST}}'
      AIRFLOW__SMTP__SMTP_PORT: '{{SMTP_PORT}}'
      AIRFLOW__SMTP__SMTP_STARTTLS: '{{SMTP_STARTTLS}}'
      AIRFLOW__SMTP__SMTP_SSL: '{{SMTP_SSL}}'
      AIRFLOW__SMTP__SMTP_USER: '{{SMTP_USER}}'
      AIRFLOW__SMTP__SMTP_PASSWORD: '{{SMTP_PASSWORD}}'
      AIRFLOW__SMTP__SMTP_MAIL_FROM: '{{SMTP_MAIL_FROM}}'
    volumes:
    - '{{AIRFLOW_DAG_PATH}}:/opt/bitnami/airflow/dags'
    ports:
    - '{{HTTP_PORT}}:8080'
  airflow-scheduler:
    depends_on:
    - airflow
    image: bitnamilegacy/airflow:{{AIRFLOW_VERSION}}
    environment:
      AIRFLOW_COMPONENT_TYPE: scheduler
      AIRFLOW_EXECUTOR: CeleryExecutor
      AIRFLOW_DATABASE_HOST: airflow-db
      AIRFLOW_DATABASE_NAME: '{{POSTGRESQL_NAME}}'
      AIRFLOW_DATABASE_USERNAME: '{{POSTGRESQL_USER}}'
      AIRFLOW_DATABASE_PASSWORD: '{{POSTGRESQL_PASSWORD}}'
      REDIS_HOST: airflow-redis
      REDIS_PASSWORD: '{{REDIS_PASSWORD}}'
      AIRFLOW_FERNET_KEY: '{{AIRFLOW_FERNET_KEY}}'
      AIRFLOW_WEBSERVER_SECRET_KEY: '{{AIRFLOW_SECRET_KEY}}'
      AIRFLOW_LOAD_EXAMPLES: '{{AIRFLOW_EXAMPLES}}'
      AIRFLOW_APISERVER_HOST: airflow
    volumes:
    - '{{AIRFLOW_DAG_PATH}}:/opt/bitnami/airflow/dags'
  airflow-worker:
    depends_on:
    - airflow
    image: bitnamilegacy/airflow:{{AIRFLOW_VERSION}}
    environment:
      AIRFLOW_COMPONENT_TYPE: worker
      AIRFLOW_EXECUTOR: CeleryExecutor
      AIRFLOW_DATABASE_HOST: airflow-db
      AIRFLOW_DATABASE_NAME: '{{POSTGRESQL_NAME}}'
      AIRFLOW_DATABASE_USERNAME: '{{POSTGRESQL_USER}}'
      AIRFLOW_DATABASE_PASSWORD: '{{POSTGRESQL_PASSWORD}}'
      REDIS_HOST: airflow-redis
      REDIS_PASSWORD: '{{REDIS_PASSWORD}}'
      AIRFLOW_FERNET_KEY: '{{AIRFLOW_FERNET_KEY}}'
      AIRFLOW_WEBSERVER_SECRET_KEY: '{{AIRFLOW_SECRET_KEY}}'
      AIRFLOW_LOAD_EXAMPLES: '{{AIRFLOW_EXAMPLES}}'
      AIRFLOW_APISERVER_HOST: airflow
    volumes:
    - airflow-data:/opt/bitnami/airflow/data
    - '{{AIRFLOW_DAG_PATH}}:/opt/bitnami/airflow/dags'
  airflow-triggerer:
    depends_on:
    - airflow
    image: bitnamilegacy/airflow:{{AIRFLOW_VERSION}}
    environment:
      AIRFLOW_COMPONENT_TYPE: triggerer
      AIRFLOW_EXECUTOR: CeleryExecutor
      AIRFLOW_DATABASE_HOST: airflow-db
      AIRFLOW_DATABASE_NAME: '{{POSTGRESQL_NAME}}'
      AIRFLOW_DATABASE_USERNAME: '{{POSTGRESQL_USER}}'
      AIRFLOW_DATABASE_PASSWORD: '{{POSTGRESQL_PASSWORD}}'
      REDIS_HOST: airflow-redis
      REDIS_PASSWORD: '{{REDIS_PASSWORD}}'
      AIRFLOW_FERNET_KEY: '{{AIRFLOW_FERNET_KEY}}'
      AIRFLOW_WEBSERVER_SECRET_KEY: '{{AIRFLOW_SECRET_KEY}}'
      AIRFLOW_LOAD_EXAMPLES: '{{AIRFLOW_EXAMPLES}}'
      AIRFLOW_APISERVER_HOST: airflow
    volumes:
    - '{{AIRFLOW_DAG_PATH}}:/opt/bitnami/airflow/dags'
  airflow-dag-processor:
    depends_on:
    - airflow
    image: bitnamilegacy/airflow:{{AIRFLOW_VERSION}}
    environment:
      AIRFLOW_COMPONENT_TYPE: dag-processor
      AIRFLOW_EXECUTOR: CeleryExecutor
      AIRFLOW_DATABASE_HOST: airflow-db
      AIRFLOW_DATABASE_NAME: '{{POSTGRESQL_NAME}}'
      AIRFLOW_DATABASE_USERNAME: '{{POSTGRESQL_USER}}'
      AIRFLOW_DATABASE_PASSWORD: '{{POSTGRESQL_PASSWORD}}'
      REDIS_HOST: airflow-redis
      REDIS_PASSWORD: '{{REDIS_PASSWORD}}'
      AIRFLOW_FERNET_KEY: '{{AIRFLOW_FERNET_KEY}}'
      AIRFLOW_WEBSERVER_SECRET_KEY: '{{AIRFLOW_SECRET_KEY}}'
      AIRFLOW_LOAD_EXAMPLES: '{{AIRFLOW_EXAMPLES}}'
      AIRFLOW_APISERVER_HOST: airflow
    volumes:
    - '{{AIRFLOW_DAG_PATH}}:/opt/bitnami/airflow/dags'
volumes:
  airflow-postgresql-persistance:
  airflow-redis-persistance:
  airflow-data:
'''

[[variables]]
key = "AIRFLOW_DAG_PATH"
label = "DAGs Volume"
default = "airflow-dags"
description = "Name of the DAG volume or path to a custom DAGs folder mounted into every Airflow component. Make sure the folder is accessible."

[[variables]]
key = "AIRFLOW_EMAIL"
label = "Airflow admin email"
default = "admin@example.com"
description = "Email address for the Airflow admin account."

[[variables]]
key = "AIRFLOW_EXAMPLES"
label = "Load Airflow DAG Examples?"
default = "no"
description = "Whether to load the bundled example DAGs (yes/no)."

[[variables]]
key = "AIRFLOW_FERNET_KEY"
label = "Airflow Fernet Key"
generate = true
description = "Fernet key Airflow uses to encrypt connection/variable secrets at rest. Generated automatically."

[[variables]]
key = "AIRFLOW_PASSWORD"
label = "Airflow admin password"
generate = true
description = "Password for the Airflow web admin account. Generated automatically."

[[variables]]
key = "AIRFLOW_SECRET_KEY"
label = "Airflow Webserver Secret Key"
generate = true
description = "Secret key used to sign the Airflow web session. Should be as random as possible. Generated automatically."

[[variables]]
key = "AIRFLOW_USER"
label = "Airflow admin user"
default = "airflow_user"
description = "Username for the Airflow web admin account."

[[variables]]
key = "AIRFLOW_VERSION"
label = "Bitnami Airflow version"
default = "3.0.5"
description = "Image tag for every Airflow component. See https://hub.docker.com/r/bitnamilegacy/airflow/tags"

[[variables]]
key = "POSTGRESQL_NAME"
label = "PostgreSQL database name"
default = "airflow_db"
description = "Name of the PostgreSQL database backing Airflow."

[[variables]]
key = "POSTGRESQL_PASSWORD"
label = "PostgreSQL password"
generate = true
description = "Password for the PostgreSQL database. Generated automatically."

[[variables]]
key = "POSTGRESQL_USER"
label = "PostgreSQL database user"
default = "airflow_db_user"
description = "Username for the PostgreSQL database."

[[variables]]
key = "POSTGRESQL_VERSION"
label = "Bitnami PostgreSQL version"
default = "17.6.0"
description = "Image tag for PostgreSQL. See https://hub.docker.com/r/bitnamilegacy/postgresql/tags"

[[variables]]
key = "REDIS_PASSWORD"
label = "Redis password"
generate = true
description = "Password for the Redis broker. Generated automatically."

[[variables]]
key = "REDIS_VERSION"
label = "Bitnami Redis version"
default = "8.2.1"
description = "Image tag for Redis. See https://hub.docker.com/r/bitnamilegacy/redis/tags"

[[variables]]
key = "SMTP_HOST"
label = "SMTP Host"
default = ""
description = "Hostname of the SMTP server for email notifications. Leave blank to disable email (external credential)."

[[variables]]
key = "SMTP_MAIL_FROM"
label = "Mail from address"
default = ""
description = "From address used on outgoing Airflow emails."

[[variables]]
key = "SMTP_PASSWORD"
label = "SMTP Password"
default = ""
description = "Password for the SMTP account. External credential you provide; leave blank if email is unused."

[[variables]]
key = "SMTP_PORT"
label = "SMTP Port"
default = "587"
description = "Port for the SMTP connection."

[[variables]]
key = "SMTP_SSL"
label = "Use SSL?"
default = "no"
description = "Whether to connect to SMTP over SSL (yes/no)."

[[variables]]
key = "SMTP_STARTTLS"
label = "Use startTLS?"
default = "yes"
description = "Whether to use STARTTLS for the SMTP connection (yes/no)."

[[variables]]
key = "SMTP_USER"
label = "SMTP User"
default = ""
description = "Username for the SMTP account. External credential you provide; leave blank if email is unused."
