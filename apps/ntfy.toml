slug = "ntfy"
name = "ntfy.sh"
category = "App"
description = "Send push notifications to your phone or desktop via PUT/POST"
keywords = ["ntfy", "ntfy.sh"]
http_port = 80
compose = '''
services:
  ntfy:
    image: binwiederhier/ntfy:{{NTFY_VERSION}}
    command:
    - serve
    environment:
      NTFY_BASE_URL: "{{NTFY_BASE_URL}}"
      NTFY_BEHIND_PROXY: "true"
      NTFY_CACHE_FILE: /var/cache/ntfy/cache.db
      NTFY_ATTACHMENT_CACHE_DIR: /var/cache/ntfy/attachments
      NTFY_AUTH_FILE: /var/lib/ntfy/user.db
      NTFY_AUTH_DEFAULT_ACCESS: "{{NTFY_AUTH_DEFAULT_ACCESS}}"
    ports:
    - '{{HTTP_PORT}}:80'
    volumes:
    - ntfy-cache:/var/cache/ntfy
    - ntfy-lib:/var/lib/ntfy
    - ntfy-etc:/etc/ntfy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 http://localhost:80/v1/health -O - | grep -Eo '\"healthy\"\\s*:\\s*true' || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 40s
volumes:
  ntfy-cache:
  ntfy-lib:
  ntfy-etc:
'''

[[variables]]
key = "NTFY_VERSION"
label = "ntfy image tag"
default = "latest"
description = "binwiederhier/ntfy image tag to deploy."

[[variables]]
key = "NTFY_BASE_URL"
label = "Base URL"
default = ""
description = "Public base URL of this ntfy server (e.g. https://ntfy.example.com). Required for attachments, web push and links to work; set it after assigning a domain. Leave blank to configure later."

[[variables]]
key = "NTFY_AUTH_DEFAULT_ACCESS"
label = "Default access"
default = "read-write"
description = "Access for anonymous users when no auth rule matches: read-write, read-only, write-only or deny-all."
