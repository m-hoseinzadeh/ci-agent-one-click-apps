      _APP_DB_HOST: appwrite-mariadb
      _APP_DB_PORT: '{{APP_DB_PORT}}'
      _APP_DB_SCHEMA: '{{APP_DB_SCHEMA}}'
      _APP_DB_USER: '{{APP_DB_USER}}'
      _APP_DB_PASS: '{{APP_DB_PASS}}'
      _APP_LOGGING_PROVIDER: '{{APP_LOGGING_PROVIDER}}'
      _APP_LOGGING_CONFIG: '{{APP_LOGGING_CONFIG}}'
  appwrite-worker-migrations:
    image: appwrite/appwrite:{{APP_VERSION}}
    entrypoint: worker-migrations
    depends_on:
    - appwrite-mariadb
    environment:
      _APP_ENV: '{{APP_ENV}}'
      _APP_WORKER_PER_CORE: '{{APP_WORKER_PER_CORE}}'
      _APP_OPENSSL_KEY_V1: '{{APP_OPENSSL_KEY_V1}}'
      _APP_DOMAIN: '{{APP_DOMAIN_NAME}}'
      _APP_DOMAIN_TARGET: '{{APP_DOMAIN_TARGET}}'
      _APP_SYSTEM_SECURITY_EMAIL_ADDRESS: '{{APP_SYSTEM_SECURITY_EMAIL_ADDRESS}}'
      _APP_REDIS_HOST: '{{APP_REDIS_HOST}}'
      _APP_REDIS_PORT: '{{APP_REDIS_PORT}}'
      _APP_REDIS_USER: '{{APP_REDIS_USER}}'
      _APP_REDIS_PASS: '{{APP_REDIS_PASS}}'
      _APP_DB_HOST: '{{APP_DB_HOST}}'
      _APP_DB_PORT: '{{APP_DB_PORT}}'
      _APP_DB_SCHEMA: '{{APP_DB_SCHEMA}}'
      _APP_DB_USER: '{{APP_DB_USER}}'
      _APP_DB_PASS: '{{APP_DB_PASS}}'
      _APP_LOGGING_PROVIDER: '{{APP_LOGGING_PROVIDER}}'
      _APP_LOGGING_CONFIG: '{{APP_LOGGING_CONFIG}}'
