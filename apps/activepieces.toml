slug = "activepieces"
name = "Activepieces"
category = "Automation"
description = "Your friendliest open source all-in-one automation tool, designed to be extensible through a type-safe pieces framework written in Typescript."
keywords = ["activepieces"]
compose = '''
services:
  activepieces:
    image: index.docker.io/activepieces/activepieces:{{ACTIVEPIECES_VERSION}}
    environment:
      AP_QUEUE_MODE: MEMORY
      AP_DB_TYPE: SQLITE3
      AP_FRONTEND_URL: http://activepieces.{{ROOT_DOMAIN}}
    volumes:
    - activepieces-data:/root/.activepieces
    restart: always
    ports:
    - '{{HTTP_PORT}}:80'
volumes:
  activepieces-data:
'''

[[variables]]
key = "ACTIVEPIECES_VERSION"
label = "Activepieces Version"
default = "0.12.2"
description = "Check out their Docker page for the valid tags https://hub.docker.com/r/activepieces/activepieces/tags"

[[variables]]
key = "ROOT_DOMAIN"
label = "Public domain"
default = ""
description = "Domain used to build public URLs (set your project domain)."
