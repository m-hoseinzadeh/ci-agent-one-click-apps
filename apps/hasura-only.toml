slug = "hasura-only"
name = "Hasura - No Database"
category = "Database"
description = "Instant realtime GraphQL APIs on any existing Postgres database (bring your own Postgres connection URL)"
keywords = ["database", "hasura", "graphql", "postgres"]
http_port = 8080
compose = '''
services:
  hasura-only:
    image: hasura/graphql-engine:{{HASURA_VERSION}}
    environment:
      HASURA_GRAPHQL_DATABASE_URL: '{{DATABASE_URL}}'
      HASURA_GRAPHQL_ENABLE_CONSOLE: 'true'
      HASURA_GRAPHQL_ADMIN_SECRET: '{{ADMIN_SECRET}}'
      HASURA_GRAPHQL_ENABLED_LOG_TYPES: startup, http-log, webhook-log, websocket-log, query-log
    ports:
    - '{{HTTP_PORT}}:8080'
'''

[[variables]]
key = "ADMIN_SECRET"
label = "Hasura admin secret (password)"
generate = true
description = "The admin secret gives you access to the console. A strong random secret is generated for you."

[[variables]]
key = "DATABASE_URL"
label = "Postgres Connection URL"
default = ""
description = "Connection URL for your existing Postgres database, e.g. postgres://username:password@host:5432/database. This app does not include a database."

[[variables]]
key = "HASURA_VERSION"
label = "Hasura Version"
default = "v2.45.5"
description = "Check out their GitHub page for the latest version https://github.com/hasura/graphql-engine"
