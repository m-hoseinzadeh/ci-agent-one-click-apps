slug = "guacamole"
name = "Guacamole"
category = "App"
description = "Apache Guacamole is a clientless HTML5 remote desktop gateway supporting VNC, RDP and SSH. Default login after first boot is guacadmin / guacadmin (change it immediately)."
keywords = ["guacamole", "remote-desktop", "vnc", "rdp", "ssh"]
http_port = 8080
compose = '''
services:
  guacamole-init:
    image: guacamole/guacamole:{{GUACAMOLE_VERSION}}
    command: ["/bin/sh", "-c", "test -f /schema/initdb.sql || /opt/guacamole/bin/initdb.sh --mysql > /schema/initdb.sql"]
    restart: "no"
    volumes:
    - guacamole-db-init:/schema
  guacamole-db:
    image: mysql:{{MYSQL_VERSION}}
    depends_on:
    - guacamole-init
    volumes:
    - guacamole-db-data:/var/lib/mysql
    - guacamole-db-init:/docker-entrypoint-initdb.d
    environment:
      MYSQL_ROOT_PASSWORD: '{{MYSQL_ROOT_PASSWORD}}'
      MYSQL_DATABASE: guacamole
      MYSQL_USER: guacamole
      MYSQL_PASSWORD: '{{MYSQL_PASSWORD}}'
  guacamole-guacd:
    image: guacamole/guacd:{{GUACD_VERSION}}
  guacamole:
    image: guacamole/guacamole:{{GUACAMOLE_VERSION}}
    depends_on:
    - guacamole-db
    - guacamole-guacd
    environment:
      GUACD_HOSTNAME: guacamole-guacd
      MYSQL_HOSTNAME: guacamole-db
      MYSQL_DATABASE: guacamole
      MYSQL_USER: guacamole
      MYSQL_PASSWORD: '{{MYSQL_PASSWORD}}'
    ports:
    - '{{HTTP_PORT}}:8080'
volumes:
  guacamole-db-data:
  guacamole-db-init:
'''

[[variables]]
key = "MYSQL_ROOT_PASSWORD"
label = "MySQL root password"
generate = true
description = "Auto-generated MySQL root password."

[[variables]]
key = "MYSQL_PASSWORD"
label = "Guacamole database password"
generate = true
description = "Auto-generated password for the guacamole database user."

[[variables]]
key = "GUACAMOLE_VERSION"
label = "Guacamole Version"
default = "1.5.5"
description = "Check out their Docker page for the valid tags https://hub.docker.com/r/guacamole/guacamole/tags"

[[variables]]
key = "GUACD_VERSION"
label = "Guacd Version"
default = "1.5.5"
description = "Check out their Docker page for the valid tags https://hub.docker.com/r/guacamole/guacd/tags"

[[variables]]
key = "MYSQL_VERSION"
label = "MySQL Version"
default = "8.0"
description = "Check out their Docker page for the valid tags https://hub.docker.com/_/mysql?tab=tags"
