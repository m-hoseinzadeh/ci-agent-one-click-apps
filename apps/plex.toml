slug = "plex"
name = "Plex Media Server"
category = "App"
description = "Plex organizes video, music and photos from personal media libraries and streams them to smart TVs, streaming boxes and mobile devices."
keywords = ["media", "plex", "server"]
http_port = 32400
compose = '''
services:
  plex:
    image: plexinc/pms-docker:{{PLEX_VERSION}}
    environment:
      TZ: '{{TZ}}'
      PLEX_CLAIM: '{{PLEX_TOKEN}}'
      ADVERTISE_IP: '{{ADVERTISE_IP}}'
    ports:
    - '{{HTTP_PORT}}:32400'
    - '3005:3005'
    - '8324:8324'
    - '32469:32469'
    - '1900:1900/udp'
    - '32410:32410/udp'
    - '32412:32412/udp'
    - '32413:32413/udp'
    - '32414:32414/udp'
    volumes:
    - plex-config:/config
    - plex-transcode:/transcode
    - plex-media:/data
volumes:
  plex-config:
  plex-transcode:
  plex-media:
'''

[[variables]]
key = "PLEX_TOKEN"
label = "Plex Claim Token"
default = ""
description = "Claim token to link this server to your Plex account. Get one from https://www.plex.tv/claim (valid for 4 minutes). Leave blank to claim the server manually later."

[[variables]]
key = "PLEX_VERSION"
label = "Plex Version"
default = "latest"
description = "Image tag for plexinc/pms-docker. See valid tags at https://hub.docker.com/r/plexinc/pms-docker/tags"

[[variables]]
key = "ADVERTISE_IP"
label = "Advertise URL"
default = ""
description = "Optional URL Plex advertises to clients for direct connections, e.g. http://your-host-ip:32400. Leave blank to let Plex auto-detect."

[[variables]]
key = "TZ"
label = "Time Zone"
default = "America/New_York"
description = "Get yours from https://en.wikipedia.org/wiki/List_of_tz_database_time_zones"
