slug = "mixpost"
name = "Mixpost"
category = "App"
description = "Self-Hosted Social Media Management Software"
keywords = ["mixpost"]
http_port = 80
compose = '''
services:
  mixpost:
    image: inovector/mixpost:{{MIXPOST_VERSION}}
    environment:
      APP_NAME: '{{MIXPOST_APP_NAME}}'
      APP_KEY: '{{MIXPOST_APP_KEY}}'
      APP_URL: '{{APP_URL}}'
      APP_ENV: '{{MIXPOST_APP_ENV}}'
      APP_DEBUG: '{{MIXPOST_APP_DEBUG}}'
      DB_HOST: mixpost-db
      DB_PORT: '3306'
      DB_DATABASE: '{{MYSQL_DATABASE}}'
      DB_USERNAME: '{{MYSQL_USER}}'
      DB_PASSWORD: '{{MYSQL_PASSWORD}}'
      REDIS_HOST: mixpost-cache
      REDIS_PORT: '6379'
      REDIS_PASSWORD: '{{REDIS_PASSWORD}}'
    depends_on:
    - mixpost-db
    - mixpost-cache
    volumes:
    - mixpost-storage:/var/www/html/storage/app
    - mixpost-logs:/var/www/html/storage/logs
    ports:
    - '{{HTTP_PORT}}:80'
  mixpost-db:
    image: mysql:{{MYSQL_VERSION}}
    environment:
      MYSQL_ROOT_PASSWORD: '{{MYSQL_ROOT_PASSWORD}}'
      MYSQL_DATABASE: '{{MYSQL_DATABASE}}'
      MYSQL_USER: '{{MYSQL_USER}}'
      MYSQL_PASSWORD: '{{MYSQL_PASSWORD}}'
    volumes:
    - mixpost-db:/var/lib/mysql
  mixpost-cache:
    image: redis:{{REDIS_VERSION}}
    command: redis-server --requirepass {{REDIS_PASSWORD}}
    volumes:
    - mixpost-cache:/data
volumes:
  mixpost-storage:
  mixpost-logs:
  mixpost-db:
  mixpost-cache:
'''

[[variables]]
key = "APP_URL"
label = "Application | URL"
default = ""
description = "Public base URL of your Mixpost instance (e.g. https://mixpost.example.com). Leave blank to set after the project domain is assigned."

[[variables]]
key = "MIXPOST_APP_DEBUG"
label = "Application | Debug Information"
default = "false"
description = "Whether to show debug information."

[[variables]]
key = "MIXPOST_APP_ENV"
label = "Application | Environment"
default = "production"
description = "Application environment. Possible values are `local`, `production` and `testing`."

[[variables]]
key = "MIXPOST_APP_KEY"
label = "Application | Key"
generate = true
description = "Base64 encoded application key used for encryption. A fresh key is generated automatically."

[[variables]]
key = "MIXPOST_APP_NAME"
label = "Application | Name"
default = "Mixpost"
description = "Name of the application."

[[variables]]
key = "MIXPOST_VERSION"
label = "Application | Version"
default = "v1.1.3"
description = "Mixpost version. Check out their valid tags at https://hub.docker.com/r/inovector/mixpost"

[[variables]]
key = "MYSQL_DATABASE"
label = "Database | Name"
default = "mixpost"
description = "Name of the MySQL database."

[[variables]]
key = "MYSQL_PASSWORD"
label = "Database | User Password"
generate = true
description = "Password of the MySQL user."

[[variables]]
key = "MYSQL_ROOT_PASSWORD"
label = "Database | Root Password"
generate = true
description = "Root password of the MySQL server."

[[variables]]
key = "MYSQL_USER"
label = "Database | User Name"
default = "mixpost"
description = "Name of the MySQL user."

[[variables]]
key = "MYSQL_VERSION"
label = "Database | Version"
default = "8.0.32"
description = "MySQL version. Check out their valid tags at https://hub.docker.com/_/mysql/tags"

[[variables]]
key = "REDIS_PASSWORD"
label = "Cache | Password"
generate = true
description = "Password of the Redis instance."

[[variables]]
key = "REDIS_VERSION"
label = "Cache | Version"
default = "7-alpine"
description = "Redis version. Check out their valid tags at https://hub.docker.com/_/redis/tags"
