      _APP_DOMAIN: '{{APP_DOMAIN_NAME}}'
      _APP_DOMAIN_FUNCTIONS: '{{APP_DOMAIN_FUNCTIONS}}'
      _APP_DOMAIN_TARGET: '{{APP_DOMAIN_TARGET}}'
      _APP_REDIS_HOST: appwrite-redis
      _APP_REDIS_PORT: '{{APP_REDIS_PORT}}'
      _APP_REDIS_USER: '{{APP_REDIS_USER}}'
      _APP_REDIS_PASS: '{{APP_REDIS_PASS}}'
      _APP_DB_HOST: appwrite-mariadb
      _APP_DB_PORT: '{{APP_DB_PORT}}'
      _APP_DB_SCHEMA: '{{APP_DB_SCHEMA}}'
      _APP_DB_USER: '{{APP_DB_USER}}'
      _APP_DB_PASS: '{{APP_DB_PASS}}'
      _APP_SMTP_HOST: '{{APP_SMTP_HOST}}'
      _APP_SMTP_PORT: '{{APP_SMTP_PORT}}'
      _APP_SMTP_SECURE: '{{APP_SMTP_SECURE}}'
      _APP_SMTP_USERNAME: '{{APP_SMTP_USERNAME}}'
      _APP_SMTP_PASSWORD: '{{APP_SMTP_PASSWORD}}'
      _APP_USAGE_STATS: '{{APP_USAGE_STATS}}'
      _APP_INFLUXDB_HOST: appwrite-influxdb
      _APP_INFLUXDB_PORT: '{{APP_INFLUXDB_PORT}}'
      _APP_STORAGE_LIMIT: '{{APP_STORAGE_LIMIT}}'
