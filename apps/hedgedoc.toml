slug = "hedgedoc"
name = "HedgeDoc"
category = "App"
description = "HedgeDoc lets you create real-time collaborative markdown notes"
keywords = ["hedgedoc"]
http_port = 3000
compose = '''
services:
  hedgedoc:
    depends_on:
    - hedgedoc-db
    image: quay.io/hedgedoc/hedgedoc:{{VERSION}}
    environment:
      CMD_DB_URL: postgres://{{DBUSER}}:{{DBPASS}}@hedgedoc-db:5432/{{DBNAME}}
      CMD_DOMAIN: '{{APP_DOMAIN}}'
      CMD_URL_ADDPORT: 'false'
      PLUGIN_INSTALLER: '{{PLUGIN_INSTALLER}}'
    volumes:
    - hedgedoc-uploads:/hedgedoc/public/uploads
    ports:
    - '{{HTTP_PORT}}:3000'
  hedgedoc-db:
    image: postgres:{{PGVERSION}}
    volumes:
    - hedgedoc-db:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: '{{DBNAME}}'
      POSTGRES_USER: '{{DBUSER}}'
      POSTGRES_PASSWORD: '{{DBPASS}}'
volumes:
  hedgedoc-uploads:
  hedgedoc-db:
'''

[[variables]]
key = "DBNAME"
label = "Database Name"
default = "hedgedoc"

[[variables]]
key = "DBPASS"
label = "Database Password"
generate = true

[[variables]]
key = "DBUSER"
label = "Database User"
default = "hedgedoc"

[[variables]]
key = "PGVERSION"
label = "Postgresql Version"
default = "17.7-alpine"
description = "Check out their Docker page for the valid tags https://hub.docker.com/r/library/postgres/tags/"

[[variables]]
key = "PLUGIN_INSTALLER"
label = "Plugin Installer"
default = ""
description = "Optional comma-separated list of HedgeDoc plugins to install at boot; leave blank for none."

[[variables]]
key = "APP_DOMAIN"
label = "Public domain"
default = "localhost"
description = "Domain HedgeDoc uses to build public URLs; set this to your project domain after deployment, otherwise links may break."

[[variables]]
key = "VERSION"
label = "HedgeDoc Version"
default = "1.10.8"
description = "Make sure to use the latest release from https://hedgedoc.org/latest-release"
