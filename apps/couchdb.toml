slug = "couchdb"
name = "CouchDB"
category = "Database"
description = "Apache CouchDB is an open-source document-oriented NoSQL database, implemented in Erlang"
keywords = ["couchdb"]
compose = '''
services:
  couchdb:
    image: couchdb:{{COUCHDB_VERSION}}
    volumes:
    - couchdb-db-data:/opt/couchdb/data
    - couchdb-db-etc:/opt/couchdb/etc
    environment:
      COUCHDB_USER: '{{COUCHDB_USER}}'
      COUCHDB_PASSWORD: '{{COUCHDB_PASSWORD}}'
    ports:
    - '{{HTTP_PORT}}:5984'
volumes:
  couchdb-db-data:
  couchdb-db-etc:
'''

[[variables]]
key = "COUCHDB_PASSWORD"
label = "CouchDB Password"
generate = true
description = "Admin password for the CouchDB instance. A random one is generated; you may override it."

[[variables]]
key = "COUCHDB_USER"
label = "CouchDB Username"
default = "mainuser"

[[variables]]
key = "COUCHDB_VERSION"
label = "CouchDB Version Tag"
default = "3.3"
description = "Check out their Docker page for the valid tags https://hub.docker.com/r/library/couchdb/tags/"
