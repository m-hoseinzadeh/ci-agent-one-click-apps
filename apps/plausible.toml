slug = "plausible"
name = "Plausible v2.1.4"
category = "Analytics"
description = "Plausible is a lightweight and open-source website analytics tool."
keywords = ["plausible", "v2.1.4"]
http_port = 8000
compose = '''
services:
  plausible-postgres:
    image: postgres:{{POSTGRES_VERSION}}
    volumes:
    - plausible-postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: plausible
      POSTGRES_DB: plausible
      POSTGRES_PASSWORD: '{{POSTGRES_PASSWORD}}'
  plausible-clickhouse:
    image: clickhouse/clickhouse-server:{{CLICKHOUSE_VERSION}}
    volumes:
    - plausible-clickhouse-data:/var/lib/clickhouse
    - plausible-clickhouse-logs:/var/log/clickhouse-server
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
  plausible:
    image: ghcr.io/plausible/community-edition:v2.1.4
    command: sh -c "/entrypoint.sh db createdb && /entrypoint.sh db migrate && /entrypoint.sh run"
    depends_on:
    - plausible-postgres
    - plausible-clickhouse
    volumes:
    - plausible-data:/var/lib/plausible
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    environment:
      BASE_URL: '{{APP_URL}}'
      SECRET_KEY_BASE: '{{SECRET_KEY_BASE}}'
      TOTP_VAULT_KEY: '{{TOTP_VAULT_KEY}}'
      DATABASE_URL: postgres://plausible:{{POSTGRES_PASSWORD}}@plausible-postgres:5432/plausible
      CLICKHOUSE_DATABASE_URL: http://plausible-clickhouse:8123/plausible
      DISABLE_REGISTRATION: 'true'
      MAILER_ADAPTER: Bamboo.Mua
      MAILER_EMAIL: '{{MAILER_EMAIL}}'
      SMTP_HOST_ADDR: '{{RELAY_HOST}}'
      SMTP_HOST_PORT: '{{RELAY_PORT}}'
      SMTP_USER_NAME: '{{RELAY_USERNAME}}'
      SMTP_USER_PWD: '{{RELAY_PASSWORD}}'
    ports:
    - '{{HTTP_PORT}}:8000'
volumes:
  plausible-postgres-data:
  plausible-clickhouse-data:
  plausible-clickhouse-logs:
  plausible-data:
'''

[[variables]]
key = "APP_URL"
label = "Base URL"
default = ""
description = "Public base URL used to build links (e.g. https://analytics.example.com). Leave blank to set after assigning a domain; required for production use."

[[variables]]
key = "CLICKHOUSE_VERSION"
label = "CLICKHOUSE_VERSION"
default = "24.3.3.102-alpine"
description = "Clickhouse version (from https://hub.docker.com/r/clickhouse/clickhouse-server/tags, e.g. 24.3.3.102-alpine)"

[[variables]]
key = "SECRET_KEY_BASE"
label = "Secret key base"
generate = true
description = "Secret used to sign sessions and cookies. Auto-generated; keep it private."

[[variables]]
key = "TOTP_VAULT_KEY"
label = "TOTP vault key"
generate = true
description = "Key used to encrypt TOTP secrets at rest. Auto-generated; keep it private."

[[variables]]
key = "MAILER_EMAIL"
label = "MAILER_EMAIL"
default = ""
description = "The 'from' email address used to send mail, often the same as the SMTP username."

[[variables]]
key = "POSTGRES_PASSWORD"
label = "POSTGRES_PASSWORD"
generate = true
description = "PostgreSQL password for user 'plausible'. Auto-generated."

[[variables]]
key = "POSTGRES_VERSION"
label = "POSTGRES_VERSION"
default = "16-alpine"
description = "Postgres version (from https://hub.docker.com/_/postgres?tab=tags, Plausible v2.1.4 was tested against PostgreSQL versions 15 and 16)"

[[variables]]
key = "RELAY_HOST"
label = "RELAY_HOST"
default = "smtp.mailgun.org"
description = "SMTP host for sending email. Use Mailgun or another provider."

[[variables]]
key = "RELAY_PASSWORD"
label = "RELAY_PASSWORD"
default = ""
description = "Password for the SMTP host. External credential; obtain it from your mail provider."

[[variables]]
key = "RELAY_PORT"
label = "RELAY_PORT"
default = "587"
description = "Port for the SMTP host. Change if needed."

[[variables]]
key = "RELAY_USERNAME"
label = "RELAY_USERNAME"
default = ""
description = "Username for the SMTP host. External credential; obtain it from your mail provider."
