slug = "verdaccio"
name = "Verdaccio"
category = "Dev tools"
description = "Verdaccio is a lightweight private npm proxy registry that allows you to have your own npm registry for free"
keywords = ["verdaccio"]
compose = '''
services:
  verdaccio:
    image: verdaccio/verdaccio:{{_VERDACCIO_VERSION}}
    volumes:
    - verdaccio-storage:/verdaccio/storage
    - verdaccio-conf:/verdaccio/conf
    - verdaccio-plugins:/verdaccio/plugins
    restart: always
    environment: {}
    ports:
    - '{{HTTP_PORT}}:4873'
volumes:
  verdaccio-storage:
  verdaccio-conf:
  verdaccio-plugins:
'''

[[variables]]
key = "_VERDACCIO_VERSION"
label = "Verdaccio Version"
default = "3.11.6"
description = "Additional tags can be found here: https://hub.docker.com/r/verdaccio/verdaccio/tags"
