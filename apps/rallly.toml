slug = "rallly"
name = "Rallly"
category = "Productivity"
description = "Doodle poll alternative. Find the best date for a meeting with your colleagues or friends without the back and forth emails. This app is packaged with PostgreSQL."
keywords = ["rallly", "scheduling", "polls", "meetings"]
http_port = 3000
compose = '''
services:
  rallly:
    depends_on:
    - rallly-postgres
    image: lukevella/rallly:{{RALLLY_VERSION}}
    environment:
      NEXT_PUBLIC_BASE_URL: '{{APP_URL}}'
      DATABASE_URL: postgres://rallly:{{RALLLY_POSTGRES_PASSWORD}}@rallly-postgres:5432/db
      SECRET_PASSWORD: '{{RALLLY_PASSWD}}'
      SUPPORT_EMAIL: '{{RALLLY_EMAIL}}'
      SMTP_HOST: '{{RALLLY_SMTP_HOST}}'
      SMTP_PORT: '{{RALLLY_SMTP_PORT}}'
      SMTP_SECURE: '{{RALLLY_SMTP_SECURE}}'
      SMTP_USER: '{{RALLLY_SMTP_USER}}'
      SMTP_PWD: '{{RALLLY_SMTP_PWD}}'
    ports:
    - '{{HTTP_PORT}}:3000'
  rallly-postgres:
    image: postgres:{{POSTGRES_VERSION}}
    volumes:
    - rallly-postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: rallly
      POSTGRES_PASSWORD: '{{RALLLY_POSTGRES_PASSWORD}}'
      POSTGRES_DB: db
volumes:
  rallly-postgres-data:
'''

[[variables]]
key = "APP_URL"
label = "Public Base URL"
default = ""
description = "Base URL where this instance is reachable, including scheme (e.g. https://rallly.example.com). Leave blank to set after the project domain is assigned."

[[variables]]
key = "RALLLY_EMAIL"
label = "Rallly From Email"
default = ""
description = "An email address that will appear as the FROM email for all emails being sent out."

[[variables]]
key = "RALLLY_PASSWD"
label = "Rallly Secret Password"
generate = true
description = "A long string (minimum 32 characters) that is used to encrypt session data."

[[variables]]
key = "RALLLY_POSTGRES_PASSWORD"
label = "Postgres Password"
generate = true
description = "Postgres password (minimum 12 characters)."

[[variables]]
key = "RALLLY_SMTP_HOST"
label = "Rallly SMTP Host"
default = ""
description = "Host name of your SMTP server. Required to send login and notification emails."

[[variables]]
key = "RALLLY_SMTP_PORT"
label = "Rallly SMTP Port"
default = "587"
description = "Port of your SMTP server (e.g. 25, 465, 587)."

[[variables]]
key = "RALLLY_SMTP_PWD"
label = "Rallly SMTP Password"
default = ""
description = "Password to use for your SMTP connection. Obtain this from your email provider."

[[variables]]
key = "RALLLY_SMTP_SECURE"
label = "Requires secure SMTP connection? true/false"
default = "false"
description = "Set to \"true\" if SSL is enabled for your SMTP connection."

[[variables]]
key = "RALLLY_SMTP_USER"
label = "Rallly SMTP User"
default = ""
description = "Username to use for your SMTP connection."

[[variables]]
key = "RALLLY_VERSION"
label = "Rallly Version"
default = "4"
description = "Image tag for lukevella/rallly. See https://hub.docker.com/r/lukevella/rallly/tags"

[[variables]]
key = "POSTGRES_VERSION"
label = "PostgreSQL Version"
default = "14-alpine"
description = "PostgreSQL image tag used for the bundled database."
